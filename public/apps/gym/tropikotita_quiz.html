<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Τροπικότητα &amp; Εγκλίσεις</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Ink & neutrals */
  --ink:#2a2420; --ink2:#4a3f38; --muted:#8a7d73; --border:#e8e1d6;
  --bg:#f7f2e8; --white:#fff;

  /* Energy Insights palette */
  --cream:#f5f0e1; --cream-soft:#faf6ea; --cream-accent:#e8dfc4; --cream-text:#3d3a2e; --cream-deep:#8a7d4a;
  --peach:#f9e4d4; --peach-soft:#fcf0e5; --peach-accent:#f0c9a8; --peach-text:#5c3826; --peach-deep:#c97b5a;
  --mustard:#efe5b8; --mustard-soft:#f7f0d0; --mustard-accent:#d4b348; --mustard-text:#4a3f1a; --mustard-deep:#a68a2e;

  /* Semantic aliases — Energy Insights */
  --accent:#a68a2e;            /* Ώχρα deep — κύριο accent */
  --accent-l:#f7f0d0;          /* mustard-soft */
  --accent-d:#7d6820;          /* darker mustard */

  --ok:#7d6f1e;                /* Ήπιο σκούρο ώχρα/λαδί */
  --ok-l:#efe5b8;
  --ok-bg:#f7f0d0;

  --ko:#b54a2a;                /* Terracotta */
  --ko-l:#f9e4d4;
  --ko-bg:#fcf0e5;

  --warn:#c97b5a;              /* peach-deep */
  --warn-l:#fcf0e5;

  /* Legacy aliases — διατηρούνται για συμβατότητα με υπολειπόμενα inline styles του JS */
  --indigo:var(--accent); --indigo-l:var(--accent-l); --indigo-d:var(--accent-d);
  --green:var(--ok); --green-l:var(--ok-bg);
  --red:var(--ko); --red-l:var(--ko-bg);
  --amber:var(--warn); --amber-l:var(--warn-l);
  --teal:var(--accent); --teal-l:var(--accent-l);

  --r:18px;
  --r-sm:12px;
  --sh:0 2px 12px rgba(166,138,46,.06);
  --sh-h:0 4px 18px rgba(166,138,46,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden;width:100%;scroll-behavior:auto}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding:20px 16px 48px;line-height:1.6;overflow-x:hidden;width:100%;max-width:100vw}
.wrap{max-width:860px;margin:0 auto}
.setup-screen{display:flex;flex-direction:column;min-height:calc(100vh - 68px)}
.setup-card{flex:1;display:flex;flex-direction:column;justify-content:space-between}
.setup-sections{flex:1;display:flex;flex-direction:column;justify-content:space-evenly;gap:0}

/* card */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:24px;margin-bottom:14px}

/* loading */
.loading{text-align:center;padding:60px 20px}
.spin{width:42px;height:42px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ HOME ══ */
.home-title{font-family:'IBM Plex Serif',serif;font-size:1.7rem;font-weight:700;margin-bottom:6px;letter-spacing:-.015em}
.home-sub{color:var(--muted);font-size:.92rem;margin-bottom:28px}
.home-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:8px}
@media(max-width:540px){.home-cards{grid-template-columns:1fr}}
.home-card{border-radius:var(--r);padding:26px 22px;cursor:pointer;border:none;transition:all .2s;text-align:left;font-family:inherit;box-shadow:var(--sh);min-height:200px;display:flex;flex-direction:column}
@media(hover:hover) and (pointer:fine){
  .home-card:hover{transform:translateY(-2px);box-shadow:var(--sh-h)}
}
.home-card .hc-icon-wrap{border-radius:14px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:1.4rem}
.home-card .hc-title{font-family:'IBM Plex Serif',serif;font-size:1.15rem;font-weight:700;margin-bottom:6px;letter-spacing:-.01em}
.home-card .hc-desc{font-size:.84rem;line-height:1.55;flex:1}
.home-card .hc-arrow{display:inline-block;margin-top:16px;font-size:.82rem;font-weight:700}

/* c1 — Βήμα-Βήμα: ώχρα (πρωταρχικό) */
.home-card.c1{background:var(--mustard)}
.home-card.c1 .hc-icon-wrap{background:var(--mustard-accent);color:var(--mustard-text)}
.home-card.c1 .hc-title{color:var(--mustard-text)}
.home-card.c1 .hc-desc{color:var(--mustard-text);opacity:.72}
.home-card.c1 .hc-arrow{color:var(--mustard-deep)}

/* c4 — Γρήγορη Εξάσκηση: κρεμ (αντιστοιχεί στο "Επιλογή" του index) */
.home-card.c4{background:var(--cream)}
.home-card.c4 .hc-icon-wrap{background:var(--cream-accent);color:var(--cream-deep)}
.home-card.c4 .hc-title{color:var(--cream-text)}
.home-card.c4 .hc-desc{color:var(--cream-text);opacity:.72}
.home-card.c4 .hc-arrow{color:var(--cream-deep)}

/* c3 — Παρουσίαση: peach */
.home-card.c3{background:var(--peach)}
.home-card.c3 .hc-icon-wrap{background:var(--peach-accent);color:var(--peach-text)}
.home-card.c3 .hc-title{color:var(--peach-text)}
.home-card.c3 .hc-desc{color:var(--peach-text);opacity:.72}
.home-card.c3 .hc-arrow{color:var(--peach-deep)}

/* ══ ADAPTIVE LEARNING SCREEN ══ */
.adp-header{background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#fff;border-radius:var(--r);padding:18px 22px;margin-bottom:14px;box-shadow:var(--sh)}
.adp-header h2{font-family:'IBM Plex Serif',serif;font-size:1.25rem;font-weight:700;margin-bottom:4px;letter-spacing:-.01em}
.adp-header p{font-size:.84rem;opacity:.88}

/* phase badge */
.ph{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.ph.main{background:var(--accent-l);color:var(--accent)}
.ph.retry{background:var(--warn-l);color:var(--warn)}
.ph.fb{background:var(--ko-bg);color:var(--ko)}

/* progress dots */
.prog-dots{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.prog-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);background:var(--white);transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:.6rem}
.prog-dot.ok{background:var(--ok);border-color:var(--ok);color:#fff}
.prog-dot.ko{background:var(--ko);border-color:var(--ko);color:#fff}
.prog-dot.cur{border-color:var(--accent);background:var(--accent-l)}

/* answers card */
.answers-card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:24px;margin-bottom:14px;border-top:3px solid var(--border);transition:border-color .3s}
.answers-card.answered-ok{border-top-color:var(--ok);background:linear-gradient(to bottom,var(--ok-bg),var(--white))}
.answers-card.answered-ko{border-top-color:var(--ko);background:linear-gradient(to bottom,var(--ko-bg),var(--white))}

/* excerpt */
.exc-lbl{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--accent);margin-bottom:8px}
.exc{font-family:'IBM Plex Serif',serif;background:var(--cream-soft);border-left:3px solid var(--accent);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:18px 22px;line-height:1.85;letter-spacing:.005em;font-size:1rem;color:var(--ink);text-align:justify;margin-bottom:0}
.exc.clk{cursor:default}
.tok{cursor:pointer;padding:1px 3px;border-radius:4px;transition:background .12s}
.tok:hover{background:var(--accent-l)}
.tok.sel{background:var(--accent);color:#fff}
.tok.hit{background:var(--ok);color:#fff}
.tok.miss{background:var(--ko);color:#fff}

/* question */
.q-lbl{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px}
.q-txt{font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:16px;line-height:1.5;letter-spacing:-.005em}

/* MC/YN */
.opts{display:flex;flex-direction:column;gap:8px}
.opt{padding:22px 18px;border:2px solid var(--border);border-radius:var(--r-sm);background:var(--white);text-align:left;cursor:pointer;font-size:1rem;font-family:inherit;color:var(--ink);transition:all .2s;display:flex;align-items:center;gap:10px;position:relative;min-height:62px}
@media(hover:hover) and (pointer:fine){
  .opt:hover:not(:disabled){border-color:var(--mustard-accent);transform:translateX(2px)}
}
.opt.sel{border-color:var(--accent);background:var(--accent-l)}
.opt.ok{border-color:var(--ok);background:var(--ok);color:#fff;font-weight:600;transform:none}
.opt.ko{border-color:var(--ko);background:var(--ko);color:#fff;font-weight:600;transform:none}
.opt.neutral-ok{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);font-weight:600}
.opt:disabled{cursor:default}
.opt-k{min-width:24px;height:24px;border-radius:50%;background:var(--border);color:var(--ink2);font-size:.72rem;font-weight:700;text-align:center;line-height:24px;flex-shrink:0}
.opt.ok .opt-k,.opt.ko .opt-k{background:rgba(255,255,255,.3);color:#fff}
.opt.neutral-ok .opt-k{background:rgba(125,111,30,.2);color:var(--ok)}
.opt-badge{position:absolute;top:6px;right:8px;font-size:.8rem;font-weight:700;line-height:1}

/* GAP */
.exc-gap{font-family:'IBM Plex Serif',serif;background:var(--cream-soft);border-left:3px solid var(--accent);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:18px 22px;line-height:2.1;letter-spacing:.005em;font-size:1rem;color:var(--ink);text-align:justify;margin-bottom:14px}
.gap-inp{display:inline-block;border:none;border-bottom:2px solid var(--accent);background:transparent;font-family:'IBM Plex Serif',serif;font-size:1rem;color:var(--accent);outline:none;min-width:120px;max-width:100%;padding:0 4px;text-align:center;box-sizing:border-box}
.gap-inp:disabled{color:var(--ok);border-color:var(--ok)}
.gap-inp.ok{color:var(--ok);border-color:var(--ok)}
.gap-inp.ko{color:var(--ko);border-color:var(--ko)}

/* DD */
.dd-wrap{width:100%}
.dd-hint{font-size:.78rem;color:var(--muted);font-style:italic;margin-bottom:12px}
.dd-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;min-height:44px;padding:12px;background:var(--cream-soft);border-radius:var(--r-sm);border:2px dashed var(--cream-accent);overflow:hidden;width:100%;box-sizing:border-box}
.dd-chip{padding:8px 14px;border:2px solid var(--accent);border-radius:var(--r-sm);font-size:.84rem;background:var(--white);cursor:grab;font-family:inherit;color:var(--ink);user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;transition:all .15s;white-space:normal;word-break:break-word;max-width:100%;box-sizing:border-box;line-height:1.4}
.dd-chip:hover{background:var(--accent-l)}
.dd-chip.dragging{opacity:.4;cursor:grabbing}
.dd-chip.used{opacity:.35;cursor:default;border-style:dashed}
.dd-slots{display:flex;flex-direction:column;gap:8px}
.dd-slot-row{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:center}
.dd-slot-lbl{font-size:.875rem;font-weight:600;color:var(--ink2);white-space:nowrap;min-width:100px}
.dd-slot{padding:10px 14px;border:2px dashed var(--border);border-radius:var(--r-sm);font-size:.875rem;background:var(--cream-soft);min-height:44px;display:flex;align-items:center;color:var(--muted);font-style:italic;transition:all .15s;user-select:none;-webkit-user-select:none;width:100%;box-sizing:border-box}
.dd-slot.over{border-color:var(--accent);background:var(--accent-l);border-style:solid}
.dd-slot.filled{border-color:var(--accent);border-style:solid;background:var(--accent-l);color:var(--ink);font-style:normal;font-weight:600;cursor:pointer}
.dd-slot.filled:hover{background:var(--mustard)}
.dd-slot.ok{border-color:var(--ok);border-style:solid;background:var(--ok-bg);color:var(--ok);font-style:normal;font-weight:600}
.dd-slot.ko{border-color:var(--ko);border-style:solid;background:var(--ko-bg);color:var(--ko);font-style:normal}
.dd-correct-show{margin-top:12px;padding:14px;background:var(--ok-bg);border-radius:var(--r-sm);border:1px solid var(--mustard-accent)}
.dd-correct-show p{font-size:.78rem;color:var(--ok);font-weight:700;margin-bottom:8px}
.dd-correct-row{display:grid;grid-template-columns:1fr 20px 1fr;gap:4px;align-items:center;margin-bottom:4px;font-size:.83rem}
.dd-correct-row .dl{padding:6px 10px;background:var(--mustard-soft);border-radius:8px;color:var(--ok)}
.dd-correct-row .dr{padding:6px 10px;background:var(--mustard-soft);border-radius:8px;color:var(--ok)}
.dd-correct-row .da{text-align:center;color:var(--muted)}
@media(max-width:480px){.dd-slot-row{grid-template-columns:1fr}.dd-slot-lbl{font-size:.8rem}}

/* feedback */
.fb-box{border-radius:var(--r-sm);padding:14px 16px;margin-top:14px;font-size:.89rem;line-height:1.65}
.fb-box.ok{background:var(--ok-bg);border-left:3px solid var(--ok)}
.fb-box.ko{background:var(--ko-bg);border-left:3px solid var(--ko)}
.fb-title{font-weight:700;margin-bottom:5px;font-size:.92rem}
.fb-box.ok .fb-title{color:var(--ok)}
.fb-box.ko .fb-title{color:var(--ko)}
.fb-box p{color:var(--ink2)}

/* theory box */
.theory-box{background:var(--cream);border:1px solid var(--cream-accent);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:14px;font-size:.865rem}
.theory-box h4{color:var(--cream-deep);margin-bottom:8px;font-size:.9rem;font-weight:700}
.theory-box ul{margin-left:16px;color:var(--cream-text)}
.theory-box li{margin-bottom:3px}
.theory-toggle{background:none;border:none;color:var(--accent);cursor:pointer;font-size:.83rem;font-weight:600;padding:4px 0;margin-bottom:6px;font-family:inherit}

/* theory needed */
.theory-needed{background:var(--ko-bg);border:1px solid var(--peach-accent);border-radius:var(--r);padding:20px 22px;margin-top:14px}
.theory-needed h4{color:var(--ko);margin-bottom:10px;font-size:1rem;font-weight:700}
.theory-needed p{color:var(--peach-text);font-size:.875rem;margin-bottom:14px}
.theory-needed ul{margin:0 0 14px 16px;color:var(--peach-text)}
.theory-needed li{font-size:.835rem;margin-bottom:3px}
.tn-choices{display:flex;gap:10px;flex-wrap:wrap}
.tn-btn{flex:1;min-width:140px;padding:13px;border:none;border-radius:var(--r-sm);font-size:.92rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.tn-btn.retry{background:var(--warn);color:#fff}
.tn-btn.retry:hover{background:var(--ko)}
.tn-btn.skip{background:var(--accent);color:#fff}
.tn-btn.skip:hover{background:var(--accent-d)}

/* ══ HEADER NAV BUTTONS ══ */
.hbtn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.4);border-radius:999px;color:#fff;font-family:inherit;font-weight:600;cursor:pointer;transition:background .15s;display:inline-flex;align-items:center;gap:5px;padding:7px 12px;font-size:1.1rem;line-height:1}
.hbtn:hover{background:rgba(255,255,255,.28)}
.hbtn .hbtn-lbl{display:none;font-size:.78rem}
@media(min-width:600px){
  .hbtn{font-size:1rem;padding:6px 14px}
  .hbtn .hbtn-lbl{display:inline}
}
.adp-start-header{background:linear-gradient(135deg,var(--mustard-deep),var(--accent-d));color:#fff;border-radius:var(--r);padding:18px 22px;margin-bottom:18px;box-shadow:var(--sh)}
.adp-start-header h2{font-family:'IBM Plex Serif',serif;font-size:1.2rem;font-weight:700;margin-bottom:3px}
.adp-start-header p{font-size:.84rem;opacity:.88}
.btn-adp-from-start{width:100%;padding:18px 20px;border:none;border-radius:var(--r-sm);background:var(--accent);color:#fff;font-size:1.12rem;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:-.01em;transition:background .15s;box-shadow:var(--sh);margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-adp-from-start:hover{background:var(--accent-d)}
.adp-steps-lbl{font-size:.73rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:10px}
.adp-steps-grid{display:flex;flex-direction:column;gap:8px}
.btn-adp-step{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:var(--r-sm);background:var(--white);color:var(--ink);font-size:.92rem;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s;text-align:left}
.btn-adp-step:hover{border-color:var(--mustard-accent);background:var(--mustard-soft)}
.btn-adp-step .step-num{min-width:28px;height:28px;border-radius:50%;background:var(--mustard);color:var(--mustard-text);font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-adp-step .step-name{font-weight:600;flex:1}
.btn-adp-step .step-count{font-size:.75rem;color:var(--muted)}

/* ══ GAP improved ══ */
.gap-panel{background:var(--cream-soft);border-radius:var(--r-sm);padding:16px;margin-top:14px}
.gap-panel-lbl{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:10px}
.gap-inp-large{width:100%;padding:14px 16px;border:2px solid var(--accent);border-radius:var(--r-sm);background:var(--white);font-family:'IBM Plex Serif',serif;font-size:1.05rem;color:var(--ink);outline:none;box-sizing:border-box;transition:border-color .15s;-webkit-appearance:none}
.gap-inp-large:focus{border-color:var(--accent-d);box-shadow:0 0 0 3px rgba(166,138,46,.15)}
.gap-inp-large.ok{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);font-weight:600}
.gap-inp-large.ko{border-color:var(--ko);background:var(--ko-bg);color:var(--ko)}
.cat-complete h3{color:var(--ok);font-family:'IBM Plex Serif',serif;font-size:1.1rem;margin-bottom:6px;font-weight:700}
.cat-complete p{color:var(--ok);font-size:.88rem}

/* buttons */
.btn-check{width:100%;padding:14px;border:none;border-radius:var(--r-sm);background:var(--accent);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;transition:background .15s;letter-spacing:-.005em}
.btn-check:hover{background:var(--accent-d)}
.btn-check:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.btn-next{width:100%;padding:14px;border:none;border-radius:var(--r-sm);background:var(--ok);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;transition:background .15s;letter-spacing:-.005em}
.btn-next:hover{background:var(--accent-d)}

/* FAB check/next icon — ΑΠΟΚΡΥΠΤΕΤΑΙ ΠΑΝΤΟΥ, κανονικά κουμπιά παντού */
.fab-action{display:none!important}
.fab-btn{width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;box-shadow:0 4px 14px rgba(0,0,0,.18);transition:all .2s;font-family:inherit;line-height:1}
.fab-btn.check{background:#2e8b57;color:#fff}
.fab-btn.check:hover{background:#247048;transform:scale(1.05)}
.fab-btn.check:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;box-shadow:none;transform:none}
.fab-btn.next{background:var(--accent);color:#fff}
.fab-btn.next:hover{background:var(--accent-d);transform:scale(1.05)}
/* Κανονικά κουμπιά — ορατά ΠΑΝΤΟΥ (desktop + mobile) */
.quiz-btn-full{display:block}
.btn-sec{width:100%;padding:12px;border:2px solid var(--border);border-radius:var(--r-sm);background:var(--white);color:var(--ink2);font-size:.92rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;transition:all .15s}
.btn-sec:hover{border-color:var(--mustard-accent)}
.btn-go{width:100%;padding:15px;border:none;border-radius:var(--r-sm);background:var(--accent);color:#fff;font-size:1.02rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px;transition:background .15s;letter-spacing:-.005em}
.btn-go:hover{background:var(--accent-d)}
.btn-go:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}

/* final results */
.score-box{background:var(--accent-l);border-radius:var(--r);padding:20px;text-align:center;margin:14px 0}
.score-big{font-size:3rem;font-weight:700;color:var(--accent-d);line-height:1;letter-spacing:-.02em}
.score-pct{color:var(--muted);font-size:.95rem;margin-top:3px}

// ══════════════════════════════════════════════

const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRtbQQ2aTST8pTtO4qavJ4vZossHP6cX7j62ayWqw1pCApG6zvVuX-OBUwOwn1Zzw/pub?gid=1680209737&single=true&output=csv';

// ══════════════════════════════════════════════
// AUDIO — ηχητικά εφέ σωστής/λάθους απάντησης
// ══════════════════════════════════════════════
let soundEnabled = (function(){
  try { const v = localStorage.getItem('syntaxi_sound'); return v === null ? true : v === '1'; }
  catch(e) { return true; }
})();

function playCorrectSound() {
  if (!soundEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 800;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch(e) { /* silent fail */ }
}

function playWrongSound() {
  if (!soundEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 200;
    osc.type = 'sawtooth';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch(e) { /* silent fail */ }
}

function playSound(type) {
  if (type === 'correct') playCorrectSound();
  else if (type === 'wrong') playWrongSound();
}

const SOUND_ICON_ON = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11 5L6 9H2V15H6L11 19V5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M15.54 8.46C16.4774 9.39764 17.0039 10.6692 17.0039 11.995C17.0039 13.3208 16.4774 14.5924 15.54 15.53" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M19.07 4.93C20.9447 6.80528 21.9979 9.34836 21.9979 12C21.9979 14.6516 20.9447 17.1947 19.07 19.07" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const SOUND_ICON_OFF = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11 5L6 9H2V15H6L11 19V5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function updateSoundButton() {
  const btn = document.getElementById('soundToggle');
  if (!btn) return;
  if (soundEnabled) {
    btn.classList.remove('muted');
    btn.innerHTML = SOUND_ICON_ON;
    btn.title = 'Απενεργοποίηση ήχου';
    btn.setAttribute('aria-label', 'Απενεργοποίηση ήχου');
  } else {
    btn.classList.add('muted');
    btn.innerHTML = SOUND_ICON_OFF;
    btn.title = 'Ενεργοποίηση ήχου';
    btn.setAttribute('aria-label', 'Ενεργοποίηση ήχου');
  }
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  try { localStorage.setItem('syntaxi_sound', soundEnabled ? '1' : '0'); } catch(e) {}
  updateSoundButton();
}

// ══ Κλείσιμο εφαρμογής ══
function closeApp() {
  if (!confirm('Κλείσιμο εφαρμογής;')) return;
  // 1η προσπάθεια: άμεσο κλείσιμο (λειτουργεί σε PWA standalone ή σε παράθυρα που άνοιξαν με script)
  try { window.close(); } catch(e) {}
  // 2η προσπάθεια: κόλπο για καρτέλες που δεν άνοιξαν με script
  try { window.open('', '_self'); window.close(); } catch(e) {}
  // Fallback: αν το πρόγραμμα περιήγησης δεν επιτρέψει το κλείσιμο, εμφανίζουμε οθόνη αποχαιρετισμού
  setTimeout(function(){ if (!window.closed) showCloseFallback(); }, 250);
}

function showCloseFallback() {
  if (document.getElementById('closeFallback')) return;
  const ov = document.createElement('div');
  ov.id = 'closeFallback';
  ov.style.cssText = 'position:fixed;inset:0;background:var(--bg);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px';
  ov.innerHTML =
    '<div style="font-size:2.6rem;margin-bottom:14px">👋</div>' +
    '<p style="font-family:\'IBM Plex Serif\',serif;font-size:1.3rem;font-weight:700;color:var(--ink);margin-bottom:10px">Η εφαρμογή έκλεισε</p>' +
    '<p style="color:var(--muted);font-size:.9rem;max-width:340px;line-height:1.55">Το πρόγραμμα περιήγησης δεν επιτρέπει το αυτόματο κλείσιμο αυτής της καρτέλας. Μπορείτε να κλείσετε την καρτέλα ή να επιστρέψετε στην εφαρμογή.</p>' +
    '<button type="button" onclick="var e=document.getElementById(\'closeFallback\');if(e)e.remove()" style="margin-top:22px;padding:11px 28px;background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);cursor:pointer;font-size:.92rem;font-weight:700;font-family:inherit">Επιστροφή στην εφαρμογή</button>';
  document.body.appendChild(ov);
}

function ensureSoundButton() {
  if (document.getElementById('soundToggle')) return;
  const btn = document.createElement('button');
  btn.id = 'soundToggle';
  btn.className = 'sound-toggle';
  btn.type = 'button';
  document.body.appendChild(btn);
  btn.addEventListener('click', toggleSound);
  updateSoundButton();
}

// CSV PARSING
// ══════════════════════════════════════════════
function parseCSVLine(line) {
  const res = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (inQ && line[i+1]==='"'){cur+='"';i++;} else inQ=!inQ; }
    else if (c === ',' && !inQ) { res.push(cur.trim()); cur=''; }
    else cur += c;
  }
  res.push(cur.trim()); return res;
}

function parseCatKey(raw) {
  if (!raw) return null;
  const m = String(raw).match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
  if (m) return `${parseInt(m[2])}.${parseInt(m[3])}`;
  return String(raw).trim();
}

function parseCSV(csv) {
  const lines = csv.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  if (lines.length < 2) return [];
  const hdrs = parseCSVLine(lines[0]).map(h=>h.trim());
  const data = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = parseCSVLine(lines[i]);
    const obj = {};
    hdrs.forEach((h,idx) => {
      let v = (vals[idx]||'').trim();
      obj[h] = (v===''||v.toLowerCase()==='null'||v.toLowerCase()==='false') ? null : v;
    });
    if (!obj['\u0395\u03BD\u03B5\u03C1\u03B3\u03CC'] || obj['\u0395\u03BD\u03B5\u03C1\u03B3\u03CC'].toUpperCase()==='FALSE') continue;
    if (!obj['\u03A4\u03CD\u03C0\u03BF\u03C2'] || !obj['\u039A\u03B1\u03C4\u03B7\u03B3\u03BF\u03C1\u03AF\u03B1'] || !obj['\u039A\u03B5\u03AF\u03BC\u03B5\u03BD\u03BF \u0395\u03C1\u03CE\u03C4\u03B7\u03C3\u03B7\u03C2']) continue;
    obj.catKey = parseCatKey(obj['Κατηγορία']);
    obj.diff = parseInt(obj['Δυσκολία']) || 1;
    obj.theoryKeys = obj['Θεωρία'] ? obj['Θεωρία'].split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n)) : null;
    obj.theory = obj.theoryKeys && obj.theoryKeys.length ? obj.theoryKeys[0] : null;
    obj.id = obj['ID'];
    obj.type = obj['Τύπος'].trim().toUpperCase();
    obj.q = obj['Κείμενο Ερώτησης'];
    obj.excerpt = obj['Απόσπασμα'] || null;
    obj.optA = obj['Επιλογή Α'] || null;
    obj.optB = obj['Επιλογή Β'] || null;
    obj.optC = obj['Επιλογή Γ'] || null;
    obj.optD = obj['Επιλογή Δ'] || null;
    obj.leftItems  = [obj['Αριστερά 1'],obj['Αριστερά 2'],obj['Αριστερά 3'],obj['Αριστερά 4']].filter(Boolean);
    obj.rightItems = [obj['Δεξιά 1'],obj['Δεξιά 2'],obj['Δεξιά 3'],obj['Δεξιά 4']].filter(Boolean);
    obj.targets = obj['Λέξη-Στόχος'] ? obj['Λέξη-Στόχος'].split('|').map(t=>t.trim()).filter(Boolean) : [];
    obj.correct = (obj['Σωστή Απάντηση']||'').trim();
    obj.fb = [obj['Διόρθωση 1'],obj['Διόρθωση 2'],obj['Διόρθωση 3'],obj['Διόρθωση 4']];
    data.push(obj);
  }
  return data;
}

async function loadData() {

    const r = await fetch(CSV_URL);
    if (!r.ok) throw new Error('HTTP '+r.status);
    const csv = await r.text();
    allQ = parseCSV(csv);
    if (!allQ.length) throw new Error('Δεν βρέθηκαν ερωτήσεις');
    catsByKey = {};
    allQ.forEach(q => {
      if (!q.catKey) return;
      if (!catsByKey[q.catKey]) catsByKey[q.catKey] = [];
      catsByKey[q.catKey].push(q);
    });
    catOrder = Object.keys(catsByKey).sort((a,b) => {
      const [a1,a2] = a.split('.').map(Number);
      const [b1,b2] = b.split('.').map(Number);
      return a1!==b1 ? a1-b1 : a2-b2;
    });
    screen = loadSetFromHash() ? 'sel' : 'home';
  } catch(e) {

        <p style="color:var(--ko);font-size:1rem;margin-bottom:12px">⚠️ Αδυναμία φόρτωσης</p>

        <button onclick="loadData()" style="padding:11px 26px;background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);cursor:pointer;font-size:.92rem;font-weight:700">Επανάληψη</button>

}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function getTheoryKeysForCat(catKey) {
  // Fallback: βρίσκουμε ποιες θεωρίες ανήκουν σε αυτή την κατηγορία
  // ψάχνοντας τις ερωτήσεις αυτής της κατηγορίας
  const pool = catsByKey[catKey] || [];
  const keys = new Set();
  pool.forEach(q => { if (q.theory) keys.add(q.theory); });
  return [...keys].sort((a,b)=>a-b);
}

function getTheoryForQuestion(q) {
  // Επιστρέφει τη θεωρία για τη συγκεκριμένη ερώτηση
  if (q && q.theory && THEORY_CARDS[q.theory]) return q.theory;
  return null;
}

function getCatDisplayName(catKey) {
  return CAT_NAMES[catKey] || `Θέμα ${catKey}`;
}

// Επιστρέφει 1 τυχαία ερώτηση ανά βαθμό δυσκολίας, ταξινομημένες αύξουσα (1→2→3→…)
function getQuestionsForCat(catKey, excludeIds=[]) {
  const pool = (catsByKey[catKey]||[]).filter(q => !excludeIds.includes(q.id));
  const byDiff = {};
  pool.forEach(q => { if (!byDiff[q.diff]) byDiff[q.diff] = []; byDiff[q.diff].push(q); });
  const diffs = Object.keys(byDiff).map(Number).sort((a,b)=>a-b);
  const picked = [];
  for (const d of diffs) {
    const arr = byDiff[d];
    if (!arr || !arr.length) continue;
    picked.push(shuffle(arr)[0]);
  }
  return picked; // σειρά: αύξουσα δυσκολία
}

// Επιστρέφει 1 τυχαία ερώτηση συγκεκριμένου βαθμού δυσκολίας (για «τιμωρία»)
function getOneQuestionByDiff(catKey, diff, excludeIds=[]) {
  const pool = (catsByKey[catKey]||[]).filter(q => !excludeIds.includes(q.id) && q.diff === diff);
  if (!pool.length) return null;
  return shuffle(pool)[0];
}

function checkAnswer(q, answer) {
  if (q.type==='MC' || q.type==='YN') {
    return q.correct.trim().toUpperCase() === (answer||'').trim().toUpperCase();
  }
  if (q.type==='GAP') {
    const norm = s => s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const corrects = q.correct.split('|').map(s=>s.trim()).filter(Boolean);
    // Multi-gap: answer is array
    if (Array.isArray(answer)) {
      if (answer.length !== corrects.length) return false;
      return answer.every((ans, i) => {
        const nAns = norm(ans||'');
        if (!nAns) return false;
        const alts = corrects[i].split('/').map(a=>norm(a));
        return alts.some(a => a===nAns || a.includes(nAns) || nAns.includes(a));
      });
    }
    // Single gap fallback
    const ans = norm(answer||'');
    if (!ans) return false;
    return corrects.some(a => { const n=norm(a); return n===ans || n.includes(ans) || ans.includes(n); });
  }
  if (q.type==='CLK') {
    const targets = q.targets.map(t=>t.trim().toLowerCase());
    const s = (answer||[]).map(s=>s.trim().toLowerCase());
    return targets.every(t=>s.includes(t)) && s.length===targets.length;
  }
  if (q.type==='DD') {
    const correctPairs = parseCorrectDD(q.correct, q.leftItems, q.rightItems);
    if (!correctPairs) return false;
    for(const [li, ri] of Object.entries(answer||{})) {
      if(correctPairs[parseInt(li)] !== parseInt(ri)) return false;
    }
    return Object.keys(answer||{}).length === q.rightItems.length;
  }
  return false;
}

function parseCorrectDD(correctStr, lefts, rights) {
  if (!correctStr) return null;
  const result = {};
  const pairs = correctStr.split('|').map(s=>s.trim()).filter(Boolean);
  for(const p of pairs) {
    const [l,r] = p.split('→').map(s=>s.trim());
    const li = lefts.findIndex(x=>x && x.trim()===l);
    const ri = rights.findIndex(x=>x && x.trim()===r);
    if(li!==-1 && ri!==-1) result[li]=ri;
  }
  if(!Object.keys(result).length) {
    for(const p of pairs) {
      const m = p.match(/Αριστερά\s*(\d+)\s*→\s*Δεξιά\s*(\d+)/);
      if(m) result[parseInt(m[1])-1]=parseInt(m[2])-1;
    }
  }
  return result;
}

function getFeedback(q, answer) {
  if (q.type==='MC') {
    const map = {Α:0,Β:1,Γ:2,Δ:3};
    const idx = map[(answer||'').toUpperCase()] ?? 0;
    return q.fb[idx] || q.fb.find(f=>f) || null;
  }
  return q.fb[0] || null;
}

function canCheckAdp(q) {
  if (adp.answered) return false;
  if (q.type==='MC'||q.type==='YN') return adp.answer!==null;
  if (q.type==='CLK') return adp.clkSelected.length>0;
  if (q.type==='DD') return Object.keys(adp.ddPairs).length===q.rightItems.length;
  if (q.type==='GAP') {
    if (Array.isArray(adp.answer)) return adp.answer.every(a=>a&&a.trim());
    return !!(adp.answer && adp.answer.trim());
  }
  return false;
}

// Τύποι με αυτόματο έλεγχο (χωρίς κουμπί «Έλεγξε»): MC, YN, DD.
// Το κουμπί ελέγχου παραμένει μόνο σε GAP (συμπλήρωση κενού) και CLK (εντοπισμός).
function isAutoCheckType(q) {
  return q && (q.type==='MC' || q.type==='YN' || q.type==='DD');
}

// Προγραμματίζει αυτόματο έλεγχο 1 δευτ. μετά την ολοκλήρωση της απάντησης.
// Καλείται μετά από κάθε render(): αν ο χρήστης αλλάξει επιλογή, ο χρόνος μηδενίζεται.
function scheduleAutoCheck() {
  if (adp._chkTimer) { clearTimeout(adp._chkTimer); adp._chkTimer=null; }
  if (sel._chkTimer) { clearTimeout(sel._chkTimer); sel._chkTimer=null; }
  if (screen==='adaptive') {
    const q = adp.queue[adp.qIdx];
    if (q && isAutoCheckType(q) && !adp.answered && canCheckAdp(q)) {
      adp._chkTimer = setTimeout(()=>{ adp._chkTimer=null; doCheck(); }, 1000);
    }
  } else if (screen==='sel') {
    const q = sel.queue[sel.qIdx];
    if (q && isAutoCheckType(q) && !sel.answered && canSelCheck()) {
      sel._chkTimer = setTimeout(()=>{ sel._chkTimer=null; doSelCheck(); }, 1000);
    }
  }
}

function qTypeLabel(type) {
  return type==='CLK'?'Εντοπισμός':type==='DD'?'Αντιστοίχιση':type==='GAP'?'Συμπλήρωση κενού':type==='YN'?'Ναι / Όχι':'Πολλαπλή επιλογή';
}

// ══════════════════════════════════════════════
// ADAPTIVE LOGIC — Γραμμική πορεία με άμεση διόρθωση
// ══════════════════════════════════════════════
let mainQueueLog = {};

function startAdaptive(startCatIdx) {
  adp.catIdx = (typeof startCatIdx === 'number' && startCatIdx >= 0) ? startCatIdx : 0;
  adp.catLog = {}; adp.totalCorrect = 0; adp.totalAnswered = 0; adp.usedIds = {};
  startCatMain();
}

function startCatMain() {
  const catKey = catOrder[adp.catIdx];
  if (!adp.usedIds[catKey]) adp.usedIds[catKey] = new Set();
  const qs = getQuestionsForCat(catKey, [...adp.usedIds[catKey]]);
  if (!qs.length) { adp.catLog[catKey]='pass'; advanceToNextCat(); return; }
  qs.forEach(q => adp.usedIds[catKey].add(q.id));
  mainQueueLog[catKey] = [...qs];
  adp.queue = qs; adp.qIdx = 0;
  adp.answer = null; adp.answered = false;
  adp.ddPairs = {}; adp.ddSelected = null; adp.clkSelected = [];
  adp.roundResults = [];
  adp.phase = 'main';
  adp.showTheory = false;
  // Νέα πεδία για γραμμική διόρθωση
  adp.penaltyMode = false;     // αν βρισκόμαστε σε «τιμωρία»
  adp.penaltyOrigQ = null;     // η αρχική ερώτηση που έγινε λάθος
  adp.penaltyExtraQ = null;    // η «τιμωρητική» ερώτηση ίδιας δυσκολίας
  adp.penaltyStep = 0;         // 0=extra, 1=retry original
  adp.penaltyStrikeCount = 0;  // πόσα λάθη στην τιμωρία (αν ≥1 → θεωρία)
  screen = 'adaptive'; render();
}

function finishRound() {
  // Στη νέα λογική, ολοκληρώθηκε η ουρά χωρίς εκκρεμή λάθη → pass
  const catKey = catOrder[adp.catIdx];
  adp.catLog[catKey] = 'pass';
  advanceToNextCat();
}

function advanceToNextCat() {
  if (adp.catIdx < catOrder.length - 1) { adp.catIdx++; screen = 'cat_transition'; }
  else { screen = 'adp_results'; }
  render();
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  switch(screen) {
    case 'home':           app.innerHTML=renderHome(); break;
    case 'adp_start':      app.innerHTML=renderAdpStart(); break;
    case 'adaptive':       app.innerHTML=renderAdaptive(); break;
    case 'cat_transition': app.innerHTML=renderCatTransition(); break;
    case 'theory_wall':    app.innerHTML=renderTheoryWall(); break;
    case 'adp_results':    app.innerHTML=renderAdpResults(); break;
    case 'sel_setup':      app.innerHTML=renderSelSetup(); break;
    case 'sel':            app.innerHTML=renderSel(); break;
    case 'sel_results':    app.innerHTML=renderSelResults(); break;
    case 'pres_setup':     app.innerHTML=renderPresSetup(); break;
    case 'pres_theory':    app.innerHTML=renderPresTheory(); break;
    case 'pres':           app.innerHTML=renderPres(); break;
  }
  attachEvents();
  scheduleAutoCheck();
  ensureSoundButton();
  // Scroll to top on new question/screen (not after check).
  // Instant scroll + double-rAF ώστε να εκτελείται μετά την ολοκλήρωση του layout
  // — αποτρέπει το μικρό κενό που εμφάνιζε κάποτε ο iOS Safari στην κορυφή.
  const isNewQ = (screen==='adaptive' && !adp.answered) || (screen==='sel' && !sel.answered);
  const isNewScreen = ['home','adp_start','cat_transition','theory_wall','adp_results','sel_setup','sel_results','pres_setup','pres_theory'].includes(screen);
  if (isNewQ || isNewScreen) {
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        window.scrollTo(0, 0);
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
        // Autofocus GAP input — μόνο desktop (αποφεύγουμε virtual keyboard popup σε mobile)
        if (isNewQ && window.matchMedia('(hover:hover) and (pointer:fine)').matches) {
          const gi = document.getElementById('gapInp-0');
          if (gi) gi.focus();
        }
      });
    });
  }
}

// ADAPTIVE QUIZ SCREEN
// ══════════════════════════════════════════════
function renderAdaptive() {
  const catKey = catOrder[adp.catIdx];
  const q = adp.queue[adp.qIdx];
  if (!q) return '<div class="card"><p>Σφάλμα: δεν βρέθηκε ερώτηση.</p></div>';

  const totalInRound = adp.queue.length;
  const isOk = adp.answered ? checkAnswer(q, adp.answer) : false;
  const stepNum = adp.catIdx + 1;

  // Step dots
  let stepDots = '<div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">';
  catOrder.forEach((key, i) => {
    const status = adp.catLog[key];
    const isActive = i === adp.catIdx;
    let bg, border, color;
    if (status === 'pass' || i < adp.catIdx) { bg='rgba(255,255,255,.2)'; border='rgba(255,255,255,.7)'; color='#fff'; }
    else if (status === 'skip') { bg='rgba(251,191,36,.3)'; border='rgba(251,191,36,.8)'; color='#fff'; }
    else if (isActive) { bg='rgba(255,255,255,.95)'; border='#fff'; color='var(--indigo-d)'; }
    else { bg='rgba(255,255,255,.07)'; border='rgba(255,255,255,.2)'; color='rgba(255,255,255,.3)'; }
    const label = (status === 'pass' || i < adp.catIdx) ? '✓' : (i+1);
    stepDots += `<div style="width:24px;height:24px;border-radius:50%;background:${bg};border:2px solid ${border};color:${color};display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700">${label}</div>`;
  });
  stepDots += '</div>';

  // Question dots
  let dots = '<div style="display:flex;gap:5px;align-items:center">';
  for (let i=0; i<totalInRound; i++) {
    let bg, border;
    if (i < adp.roundResults.length) {
      if (adp.roundResults[i]) { bg='rgba(255,255,255,.9)'; border='rgba(255,255,255,.9)'; }
      else { bg='rgba(254,202,202,.8)'; border='rgba(254,202,202,.8)'; }
    } else if (i === adp.qIdx) { bg='rgba(255,255,255,.95)'; border='#fff'; }
    else { bg='rgba(255,255,255,.15)'; border='rgba(255,255,255,.2)'; }
    dots += `<div style="width:9px;height:9px;border-radius:50%;background:${bg};border:2px solid ${border}"></div>`;
  }
  dots += `<span style="color:rgba(255,255,255,.8);font-size:.75rem;font-weight:600;margin-left:5px">${adp.qIdx+1}/${totalInRound}</span></div>`;

  // Theory toggle — εμφανίζεται στη φάση τιμωρίας (fullscreen overlay)
  let theoryHtml = '';
  if (adp.penaltyMode) {
    const tKey = getTheoryForQuestion(adp.penaltyOrigQ || q);
    if (tKey && THEORY_CARDS[tKey]) {
      theoryHtml = `<button class="theory-toggle" id="btnTheory">📖 Οδηγίες θεωρίας →</button>`;
    }
  }

  // Fullscreen theory overlay
  let theoryOverlay = '';
  if (adp.showTheory && adp.penaltyMode) {
    const tKey = getTheoryForQuestion(adp.penaltyOrigQ || q);
    if (tKey && THEORY_CARDS[tKey]) {
      const card = THEORY_CARDS[tKey];
      let pts = '';
      card.points.forEach(t => { pts += `<li style="margin-bottom:14px;line-height:1.65">${t}</li>`; });
      theoryOverlay = `
      <div id="theoryOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:999;overflow-y:auto;padding:20px 16px 48px">
        <div style="max-width:860px;margin:0 auto">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
            <h2 style="font-family:'IBM Plex Serif',serif;font-size:1.2rem;color:var(--ink)">📚 ${card.title}</h2>
            <button id="btnTheoryBack" style="padding:9px 18px;background:var(--accent);color:#fff;border:none;border-radius:999px;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer">← Επιστροφή</button>
          </div>
          <div class="card" style="border-left:5px solid var(--peach-deep)">
            <ul style="margin:0;padding-left:20px;list-style:none">${pts}</ul>
          </div>
        </div>
      </div>`;
    }
  }

  let html = `
  ${theoryOverlay}
  <div class="adp-header">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:.95rem;font-weight:300;color:rgba(255,255,255,.9)">Βήμα ${stepNum}: ${getCatDisplayName(catKey)}</span>
      <button onclick="screen='home';render();" class="hbtn">🏠<span class="hbtn-lbl">Αρχική</span></button>
      <button id="btnAdpRestart" class="hbtn" style="margin-left:6px">⏮<span class="hbtn-lbl">Έναρξη</span></button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      ${stepDots} ${dots}
    </div>
  </div>
  ${theoryHtml}
  ${(q.excerpt && !(q.type==='GAP' && (q.excerpt.includes('__________') || q.excerpt.includes('_____')))) ? `<div class="card" style="margin-bottom:14px">${renderExcerpt(q, 'adp')}</div>` : ''}
  <div class="${'answers-card' + (adp.answered ? (isOk ? ' answered-ok' : ' answered-ko') : '')}" id="answersCard">
    <p class="q-lbl">${qTypeLabel(q.type)}</p>
    ${q.type==='GAP' && (q.q.includes('__________') || q.q.includes('_____')) ? '' : `<p class="q-txt">${q.q}</p>`}`;

  if (q.type==='MC'||q.type==='YN') html += renderMC(q, 'adp');
  else if (q.type==='DD') html += renderDD(q, 'adp');
  else if (q.type==='GAP') html += renderGAPInput(q, 'adp');

  if (adp.answered) {
    html += `<div class="fb-box ${isOk?'ok':'ko'}">
      <p class="fb-title">${isOk?'✅ Σωστά!':'❌ Λάθος'}</p>
      ${!isOk ? `<p>${getFeedback(q, adp.answer)||''}</p>` : ''}
    </div>`;
    html += `<button class="btn-next quiz-btn-full" id="btnNext">Επόμενο →</button>`;
  } else if (!isAutoCheckType(q)) {
    html += `<button class="btn-check quiz-btn-full" id="btnCheck" ${canCheckAdp(q)?'':'disabled'}>Έλεγξε</button>`;
  }
  html += '</div>';
  // FAB action button (mobile only) — outside the answers-card
  if (adp.answered) {
    html += `<div class="fab-action"><button class="fab-btn next" id="btnNextFab" title="Επόμενο">→</button></div>`;
  } else if (!isAutoCheckType(q)) {
    html += `<div class="fab-action"><button class="fab-btn check" id="btnCheckFab" ${canCheckAdp(q)?'':'disabled'} title="Έλεγχος">✓</button></div>`;
  }
  return html;
}

// ΓΡΗΓΟΡΗ ΕΞΑΣΚΗΣΗ — SETUP
// ══════════════════════════════════════════════
function getSelPool() {
  return allQ.filter(q => {
    if (sel.filterTypes.length && !sel.filterTypes.includes(q.type)) return false;
    if (sel.filterDiffs.length && !sel.filterDiffs.includes(q.diff)) return false;
    if (sel.filterCats.length) {
      if (!q.catKey) return false;
      // Κάθε επιλεγμένη κατηγορία: ακέραιος = βήμα (n.*) · πλήρες catKey = ακριβής
      const ok = sel.filterCats.some(fc => {
        const isStep = /^\d+$/.test(fc);
        return isStep ? q.catKey.startsWith(fc + '.') : q.catKey === fc;
      });
      if (!ok) return false;
    }
    return true;
  });
}

function renderSelSetup() {
  const pool = getSelPool();
  const typeMap = [{v:'all',lbl:'Όλοι'},{v:'YN',lbl:'Ναι/Όχι'},{v:'MC',lbl:'Πολλ. Επιλογής'},{v:'DD',lbl:'Αντιστοίχιση'},{v:'GAP',lbl:'Συμπλήρωση'},{v:'CLK',lbl:'Εντοπισμός'}];
  const typeChips = typeMap.map(({v, lbl}) => {
    const cnt = v==='all' ? allQ.length : allQ.filter(q=>q.type===v).length;
    return `<button class="fchip ${(v==='all'?sel.filterTypes.length===0:sel.filterTypes.includes(v))?'active':''}" data-sel-type="${v}">${lbl} <span class="fchip-count">(${cnt})</span></button>`;
  }).join('');

  // Βήματα: ομαδοποίηση ανά πρώτο ψηφίο του catKey
  // ΣΗΜΕΙΩΣΗ: Τα "Βήμα 1" και "Βήμα 2" αφαιρούνται — εμφανίζονται μόνο υποκατηγορίες
  const catMap = [{v:'all',lbl:'Όλα'}];
  // Επίσης υποκατηγορίες
  catOrder.forEach(k => {
    const cnt = (catsByKey[k]||[]).length;
    catMap.push({v:k, lbl:`${getCatDisplayName(k)}`, cnt, sub:false});
  });
  const catChips = catMap.map(({v, lbl, sub}) => {
    const cnt = v==='all' ? allQ.length : allQ.filter(q=>q.catKey && (q.catKey===v || q.catKey.startsWith(v+'.'))).length;
    const style = sub ? 'font-size:.8rem;padding:6px 12px;' : '';
    return `<button class="fchip ${(v==='all'?sel.filterCats.length===0:sel.filterCats.includes(v))?'active':''}" data-sel-cat="${v}" style="${style}">${lbl.trim()} <span class="fchip-count">(${cnt})</span></button>`;
  }).join('');

  const diffMap = [{v:'all',lbl:'Όλοι'},{v:1,lbl:'1 — Εύκολος'},{v:2,lbl:'2 — Μέτριος'},{v:3,lbl:'3 — Δύσκολος'}];
  const diffChips = diffMap.map(({v, lbl}) => {
    const cnt = v==='all' ? allQ.length : allQ.filter(q=>q.diff===v).length;
    return `<button class="fchip ${(v==='all'?sel.filterDiffs.length===0:sel.filterDiffs.includes(v))?'active':''}" data-sel-diff="${v}">${lbl} <span class="fchip-count">(${cnt})</span></button>`;
  }).join('');

  const countMap = [{n:10,lbl:'10'},{n:20,lbl:'20'},{n:0,lbl:'Όλες'}];
  const countChips = countMap.map(({n,lbl}) =>
    `<button class="fchip ${sel.filterCount===n?'active':''}" data-sel-count="${n}">${lbl}</button>`
  ).join('');

  const canStart = pool.length > 0;
  const actualCount = sel.filterCount === 0 ? pool.length : Math.min(sel.filterCount, pool.length);

  return `
  <div class="setup-screen">
  <div class="drll-header" style="display:flex;justify-content:space-between;align-items:center">
    <div><h2>⚡ Εξάσκηση</h2><p>Επίλεξε φίλτρα και ξεκίνα</p></div>
    <button id="btnSelHome" class="hbtn">🏠<span class="hbtn-lbl">Αρχική</span></button>
  </div>
  <div class="card setup-card">
    <div class="setup-sections">
      <div class="drll-setup-section"><h3>📂 Κατηγορία</h3><div class="filter-chips">${catChips}</div></div>
      <div class="drll-setup-section"><h3>❓ Τύπος Ερώτησης</h3><div class="filter-chips">${typeChips}</div></div>
      <div class="drll-setup-section"><h3>🔢 Αριθμός Ερωτήσεων</h3><div class="filter-chips">${countChips}</div></div>
    </div>
    <div>
      <div class="info ${canStart?'success':'warn'}" style="margin-top:4px">
        ${canStart ? `✅ Βρέθηκαν <strong>${pool.length}</strong> ερωτήσεις (θα εμφανιστούν <strong>${actualCount}</strong>)` : '⚠️ Δεν βρέθηκαν ερωτήσεις με αυτά τα φίλτρα'}
      </div>
      <button class="btn-go" id="btnSelStart" ${canStart?'':'disabled'} style="margin-top:6px">Ξεκινήστε →</button>
      <button class="btn-sec" id="btnSelPrint" ${canStart?'':'disabled'} style="margin-top:6px">🖨️ Εκτύπωση</button>
    </div>
  </div>
  </div>`;
}

// ══════════════════════════════════════════════
// QUESTION RENDERERS (shared)
// ══════════════════════════════════════════════
function renderExcerpt(q, mode) {
  if (q.type==='GAP') return renderExcerptGAP(q, mode);
  if (q.type==='CLK') return renderExcerptCLK(q, mode);
  return `<div class="exc">${q.excerpt}</div>`;
}

function renderMC(q, mode) {
  const st = mode==='adp' ? adp : sel;
  const keys = ['Α','Β','Γ','Δ'];
  const vals = [q.optA,q.optB,q.optC,q.optD].filter(Boolean);
  let html = '<div class="opts">';
  vals.forEach((v,i) => {
    const k = keys[i];
    let cls = 'opt'; let badge = '';
    if (st.answered) {
      const isCorrect = k===q.correct.trim().toUpperCase();
      const isSelected = k===st.answer;
      if (isSelected && isCorrect) { cls+=' ok'; badge='<span class="opt-badge">✓</span>'; }
      else if (isSelected && !isCorrect) { cls+=' ko'; badge='<span class="opt-badge">✕</span>'; }
      else if (isCorrect && st.answer!==q.correct.trim().toUpperCase()) cls+=' neutral-ok';
    } else {
      if (st.answer===k) cls+=' sel';
    }
    html += `<button class="${cls}" data-opt="${k}" data-mode="${mode}" ${st.answered?'disabled':''}><span class="opt-k">${k}</span>${v}${badge}</button>`;
  });
  html += '</div>';
  return html;
}

function renderGAPInput(q, mode) {
  const st = mode==='adp' ? adp : sel;
  if (q.excerpt && (q.excerpt.includes('__________') || q.excerpt.includes('_____'))) return renderExcerptGAP(q, mode, q.excerpt);
  if (q.q && (q.q.includes('__________') || q.q.includes('_____'))) return renderExcerptGAP(q, mode, q.q);
  // Fallback: standalone large input
  if (!Array.isArray(st.answer)) st.answer = [''];
  const val = Array.isArray(st.answer) ? (st.answer[0]||'') : st.answer;
  const corrects = q.correct ? q.correct.split('|').map(s=>s.trim()).filter(Boolean) : [];
  let cls = 'gap-inp-large';
  let correctShow = '';
  if (st.answered) {
    const norm = s=>s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const alts = (corrects[0]||'').split('/').map(a=>norm(a));
    const ok = norm(val) && alts.some(a=>a===norm(val)||a.includes(norm(val))||norm(val).includes(a));
    cls += ok ? ' ok' : ' ko';
    if (!ok && corrects[0]) correctShow = `<div style="margin-top:8px;font-size:.88rem;color:var(--ok);font-weight:600">✓ ${corrects[0].split('/')[0]}</div>`;
  }
  return `<div class="gap-panel"><p class="gap-panel-lbl">Απάντησε</p><input class="${cls}" id="gapInp-0" data-gap-idx="0" data-mode="${mode}" type="text" placeholder="Γράψε εδώ…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text" value="${val.replace(/"/g,'&quot;')}" ${st.answered?'disabled':''}>${correctShow}</div>`;
}

function renderExcerptGAP(q, mode, textSource) {
  const st = mode==='adp' ? adp : sel;
  const text = textSource || q.excerpt || '';
  if (!text) return '';
  const GAP_MARKER = '__________';
  let parts = text.split(GAP_MARKER);
  if (parts.length < 2) parts = text.split('_____');
  if (parts.length < 2) return `<div class="exc">${text}</div>`;
  const numGaps = parts.length - 1;

  if (!Array.isArray(st.answer) || st.answer.length !== numGaps) {
    st.answer = new Array(numGaps).fill('');
  }
  const corrects = q.correct ? q.correct.split('|').map(s=>s.trim()).filter(Boolean) : [];
  const norm = s=>s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  // Κείμενο με placeholders (όχι inputs inline — αποφεύγουμε iOS zoom)
  let textHtml = '<div class="exc-gap">';
  for (let i = 0; i < parts.length; i++) {
    textHtml += parts[i];
    if (i < numGaps) {
      const val = st.answer[i] || '';
      if (st.answered) {
        const expected = corrects[i] || '';
        const alts = expected.split('/').map(a=>norm(a));
        const ok = norm(val) && alts.some(a=>a===norm(val)||a.includes(norm(val))||norm(val).includes(a));
        if (ok) {
          textHtml += `<span style="display:inline-block;background:var(--ok-bg);border:2px solid var(--ok);border-radius:8px;padding:1px 10px;font-weight:700;color:var(--ok)">${val}</span>`;
        } else {
          textHtml += `<span style="display:inline-block;background:var(--ko-bg);border:2px dashed var(--ko);border-radius:8px;padding:1px 8px;color:var(--ko);text-decoration:line-through">${val||'—'}</span>`;
          if (expected) textHtml += `<span style="display:inline-block;background:var(--ok-bg);border:2px solid var(--ok);border-radius:8px;padding:1px 10px;font-weight:700;color:var(--ok);margin-left:3px">✓ ${expected.split('/')[0]}</span>`;
        }
      } else {
        // Placeholder box — δείχνει τον αριθμό κενού
        const filled = val ? `<span style="display:inline-block;background:var(--accent);color:#fff;border-radius:8px;padding:1px 10px;font-weight:700">${val}</span>` : `<span style="display:inline-block;min-width:64px;border-bottom:2px solid var(--accent);color:var(--muted);font-size:.88rem;text-align:center">${numGaps>1?'('+String.fromCharCode(945+i)+')':'…'}</span>`;
        textHtml += filled;
      }
    }
  }
  textHtml += '</div>';

  // Input panels κάτω — ένα μεγάλο input ανά κενό
  let inputHtml = '';
  if (!st.answered) {
    for (let i = 0; i < numGaps; i++) {
      const val = st.answer[i] || '';
      const lbl = numGaps > 1 ? `Κενό ${String.fromCharCode(945+i)}` : 'Απάντησε';
      inputHtml += `<div class="gap-panel" style="${i>0?'margin-top:8px':''}">
        <p class="gap-panel-lbl">${lbl}</p>
        <input class="gap-inp-large" id="gapInp-${i}" data-gap-idx="${i}" data-mode="${mode}" type="text" placeholder="Γράψε εδώ…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text" value="${val.replace(/"/g,'&quot;')}">
      </div>`;
    }
  }

  return textHtml + inputHtml;
}

function renderExcerptCLK(q, mode) {
  const st = mode==='adp' ? adp : sel;
  const targets = q.targets.map(t=>t.trim().toLowerCase());
  const tokens = q.excerpt.split(/(\s+)/);
  const words = tokens.map(t => /^\s+$/.test(t) ? null : t.replace(/[.,;:!?«»"'()\[\]]/g, '').toLowerCase());
  const wordPhraseMap = {};
  const wordOnlyIdxs = tokens.reduce((acc,t,i)=>{if(!/^\s+$/.test(t))acc.push(i);return acc;},[]);
  targets.forEach(target=>{
    const parts=target.split(' ').filter(Boolean);
    if(parts.length<=1)return;
    for(let wi=0;wi<=wordOnlyIdxs.length-parts.length;wi++){
      const match=parts.every((p,pi)=>words[wordOnlyIdxs[wi+pi]]===p);
      if(match){for(let pi=0;pi<parts.length;pi++)wordPhraseMap[wordOnlyIdxs[wi+pi]]=target;}
    }
  });
  let html = `<div class="exc clk" id="excClk">`;
  tokens.forEach((tok,ti)=>{
    if(/^\s+$/.test(tok)){html+=tok;return;}
    const clean=words[ti];
    const phraseTarget=wordPhraseMap[ti];
    const isSingleTarget=targets.includes(clean)&&!phraseTarget;
    const isAnyTarget=!!(phraseTarget||isSingleTarget);
    const isSelPhrase=phraseTarget&&st.clkSelected.includes(phraseTarget);
    const isSelWord=!phraseTarget&&st.clkSelected.some(s=>s.toLowerCase()===clean);
    const isSelected=isSelPhrase||isSelWord;
    let cls='tok';
    if(st.answered){if(isAnyTarget)cls+=' hit';else if(isSelected&&!isAnyTarget)cls+=' miss';}
    else{if(isSelected)cls+=' sel';}
    const dataAttr=phraseTarget?`data-phrase="${phraseTarget.replace(/"/g,'&quot;')}" data-word="${tok.replace(/"/g,'&quot;')}" data-mode="${mode}"`:`data-word="${tok.replace(/"/g,'&quot;')}" data-mode="${mode}"`;
    html+=`<span class="${cls}" ${dataAttr}>${tok}</span>`;
  });
  html+='</div>';
  return html;
}

function renderDD(q, mode) {
  const st = mode==='adp' ? adp : sel;
  if (!q._shuffledRight) q._shuffledRight = shuffle(q.rightItems.map((r,i)=>({r,i})));
  const shuffledRight = q._shuffledRight;
  let html = '<div class="dd-wrap">';
  if (st.answered) {
    const correctPairs = parseCorrectDD(q.correct, q.leftItems, q.rightItems);
    html += '<div class="dd-slots">';
    shuffledRight.forEach(({r,i}) => {
      const usedByLeft = Object.entries(st.ddPairs).find(([,ri])=>ri===i);
      const li = usedByLeft ? parseInt(usedByLeft[0]) : null;
      const filledText = li !== null ? q.leftItems[li] : '—';
      const correctRi = li !== null ? correctPairs?.[li] : null;
      const isOk = correctRi === i;
      html += `<div class="dd-slot-row"><span class="dd-slot-lbl">${r}</span><div class="dd-slot ${isOk?'ok':'ko'}">${filledText}</div></div>`;
    });
    html += '</div>';
    const allOk = q.leftItems.every((_,li)=>st.ddPairs[li]===correctPairs?.[li]);
    if (!allOk && correctPairs) {
      html += '<div class="dd-correct-show"><p>✅ Σωστές αντιστοιχίσεις:</p>';
      q.leftItems.forEach((l,li)=>{ const ri=correctPairs[li]; html+=`<div class="dd-correct-row"><div class="dl">${l}</div><div class="da">→</div><div class="dr">${q.rightItems[ri]||'—'}</div></div>`; });
      html += '</div>';
    }
  } else {
    html += `<p class="dd-hint">🖱️ Σύρε chip στη σωστή θέση · Κινητό: πάτα chip → πάτα θέση</p>`;
    html += '<div class="dd-chips">';
    q.leftItems.forEach((l,li)=>{ const used=st.ddPairs[li]!==undefined; html+=`<div class="dd-chip ${used?'used':''}" draggable="${!used}" data-dd-li="${li}" data-mode="${mode}">${l}</div>`; });
    html += '</div><div class="dd-slots">';
    shuffledRight.forEach(({r,i})=>{
      const usedByLeft=Object.entries(st.ddPairs).find(([,ri])=>ri===i);
      const isFilled=usedByLeft!==undefined;
      const filledLi=isFilled?parseInt(usedByLeft[0]):null;
      const filledText=isFilled?q.leftItems[filledLi]:'↓ τοποθέτησε εδώ';
      html+=`<div class="dd-slot-row"><span class="dd-slot-lbl">${r}</span><div class="dd-slot ${isFilled?'filled':''}" data-dd-ri="${i}" data-mode="${mode}">${filledText}</div></div>`;
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderSelQuestionBody(q) {
  if (q.type==='MC'||q.type==='YN') return renderMC(q,'sel');
  if (q.type==='DD') return renderDD(q,'sel');
  if (q.type==='GAP') return renderGAPInput(q,'sel');
  return '';
}

function canSelCheck() {
  const q = sel.queue[sel.qIdx];
  if (!q || sel.answered) return false;
  if (q.type==='MC'||q.type==='YN') return sel.answer!==null;
  if (q.type==='CLK') return sel.clkSelected.length>0;
  if (q.type==='DD') return Object.keys(sel.ddPairs).length===q.rightItems.length;
  if (q.type==='GAP') {
    if (Array.isArray(sel.answer)) return sel.answer.every(a=>a&&a.trim());
    return !!(sel.answer&&sel.answer.trim());
  }
  return false;
}

// ══════════════════════════════════════════════
// CHECK / NEXT — ADAPTIVE
// ══════════════════════════════════════════════
function doCheck() {
  const q = adp.queue[adp.qIdx];
  if (q.type==='GAP') {
    const gaps = document.querySelectorAll('[data-gap-idx]');
    if (gaps.length > 1) { adp.answer = Array.from(gaps).map(inp=>inp.value.trim()); }
    else if (gaps.length === 1) { adp.answer = [gaps[0].value.trim()]; }
  }
  if (q.type==='CLK') adp.answer=[...adp.clkSelected];
  if (q.type==='DD') adp.answer={...adp.ddPairs};
  adp.answered = true;
  const ok = checkAnswer(q, adp.answer);
  adp.roundResults.push(ok);
  adp.totalAnswered++; if (ok) adp.totalCorrect++;
  playSound(ok ? 'correct' : 'wrong');
  render();
  // Βήμα-Βήμα: πάντα χειροκίνητα «Επόμενο» (χωρίς auto-advance)
}

function doNext() {
  if (adp._autoTimer) { clearTimeout(adp._autoTimer); adp._autoTimer=null; }
  const catKey = catOrder[adp.catIdx];
  const wasOk = adp.roundResults[adp.roundResults.length - 1];
  const currentQ = adp.queue[adp.qIdx];

  // === ΚΑΤΑΣΤΑΣΗ «ΤΙΜΩΡΙΑ» (penaltyMode) ===
  if (adp.penaltyMode) {
    if (!wasOk) {
      // Λάθος μέσα στην τιμωρία → θεωρία + δίλημμα
      adp.penaltyMode = false;
      adp.catLog[catKey] = 'skip';
      screen = 'theory_wall'; render();
      return;
    }
    // Σωστό στην τιμωρία
    if (adp.penaltyStep === 0) {
      // Μόλις απάντησε σωστά την extra ερώτηση → τώρα ξαναβάζουμε την αρχική
      adp.penaltyStep = 1;
      // Εισάγουμε την αρχική ερώτηση (penaltyOrigQ) αμέσως μετά
      adp.queue.splice(adp.qIdx + 1, 0, adp.penaltyOrigQ);
      adp.qIdx++; resetQState(); render();
      return;
    } else {
      // Απάντησε σωστά και την αρχική → βγαίνουμε από τιμωρία, συνεχίζουμε
      adp.penaltyMode = false;
      adp.penaltyOrigQ = null;
      adp.penaltyExtraQ = null;
      adp.penaltyStep = 0;
      // Συνέχεια κανονικά στην επόμενη ερώτηση
      if (adp.qIdx < adp.queue.length - 1) {
        adp.qIdx++; resetQState(); render();
      } else {
        finishRound();
      }
      return;
    }
  }

  // === ΚΑΝΟΝΙΚΗ ΡΟΗSH ===
  if (!wasOk) {
    // Λάθος σε κανονική ερώτηση → ενεργοποίηση «τιμωρίας»
    const diff = currentQ.diff;
    const extraQ = getOneQuestionByDiff(catKey, diff, [...adp.usedIds[catKey]]);
    adp.penaltyMode = true;
    adp.penaltyOrigQ = currentQ;
    adp.penaltyStep = 0;
    if (extraQ) {
      adp.usedIds[catKey].add(extraQ.id);
      adp.penaltyExtraQ = extraQ;
      // Εισάγουμε την extra ερώτηση αμέσως μετά
      adp.queue.splice(adp.qIdx + 1, 0, extraQ);
      adp.qIdx++; resetQState(); render();
    } else {
      // Δεν υπάρχει extra ερώτηση ίδιας δυσκολίας → ξαναβάζουμε μόνο την αρχική
      adp.penaltyStep = 1; // πηγαίνουμε κατευθείαν στη retry original
      adp.queue.splice(adp.qIdx + 1, 0, currentQ);
      adp.qIdx++; resetQState(); render();
    }
    return;
  }

  // Σωστή κανονικά → επόμενη ερώτηση
  if (adp.qIdx < adp.queue.length - 1) {
    adp.qIdx++; resetQState(); render();
  } else {
    finishRound();
  }
}

function resetQState() {
  adp.answer = null; adp.answered = false;
  adp.ddPairs = {}; adp.ddSelected = null; adp.clkSelected = [];
  adp.showTheory = false;
}

// ══════════════════════════════════════════════
// CHECK / NEXT — ΓΡΗΓΟΡΗ ΕΞΑΣΚΗΣΗ
// ══════════════════════════════════════════════
function buildInterleavedQueue(pool, count) {
  const bycat = {};
  pool.forEach(q => { const k=q.catKey||'_'; if(!bycat[k])bycat[k]=[]; bycat[k].push(q); });
  Object.keys(bycat).forEach(k=>{ bycat[k]=shuffle(bycat[k]); });

  const result = [];

  // 1η ερώτηση: από τα δύο πρώτα βήματα
  const firstCats = catOrder.slice(0,2).filter(k=>bycat[k]&&bycat[k].length);
  if (firstCats.length) {
    const fc = firstCats[Math.floor(Math.random()*firstCats.length)];
    result.push(bycat[fc].pop());
  }

  let remaining = count - result.length;
  let attempts = 0;
  while (remaining > 0 && attempts < 2000) {
    attempts++;
    const available = Object.keys(bycat).filter(k=>bycat[k].length>0);
    if (!available.length) break;

    const lastCat = result.length ? result[result.length-1].catKey||'_' : null;

    // No-3-consecutive-type
    let blockedType = null;
    if (result.length >= 2) {
      const t1 = result[result.length-1].type;
      const t2 = result[result.length-2].type;
      if (t1===t2) blockedType = t1;
    }

    const candidates = available.filter(k => {
      if (k===lastCat) return false;
      if (blockedType && !bycat[k].some(q=>q.type!==blockedType)) return false;
      return true;
    });
    const pickFrom = candidates.length ? candidates
      : available.filter(k=>k!==lastCat).length ? available.filter(k=>k!==lastCat)
      : available;

    const totalW = pickFrom.reduce((s,k)=>s+bycat[k].length,0);
    let r = Math.random()*totalW, chosen = pickFrom[0];
    for (const k of pickFrom) { r-=bycat[k].length; if(r<=0){chosen=k;break;} }

    // Αν blockedType, προτιμάμε ερώτηση διαφορετικού τύπου από το chosen
    let picked;
    if (blockedType) {
      const otherType = bycat[chosen].filter(q=>q.type!==blockedType);
      if (otherType.length) {
        const idx = bycat[chosen].indexOf(otherType[Math.floor(Math.random()*otherType.length)]);
        picked = bycat[chosen].splice(idx,1)[0];
      } else { picked = bycat[chosen].pop(); }
    } else { picked = bycat[chosen].pop(); }

    result.push(picked);
    remaining--;
  }
  return result;
}

function printSelSetup() {
  const pool = getSelPool();
  const count = sel.filterCount===0 ? pool.length : Math.min(sel.filterCount, pool.length);
  const queueToPrint = buildInterleavedQueue(pool, count);
  _printedQueue = queueToPrint;
  _printedSig = selFilterSig();
  showPrintModal(queueToPrint);
}

function startSelSession() {
  const pool = getSelPool();
  const count = sel.filterCount===0 ? pool.length : Math.min(sel.filterCount, pool.length);
  if (_printedQueue && _printedQueue.length && _printedSig === selFilterSig()) {
    sel.queue = _printedQueue.slice();   // ίδιο ακριβώς σετ με την εκτύπωση
  } else {
    sel.queue = buildInterleavedQueue(pool, count);
  }
  sel.qIdx=0; sel.answer=null; sel.answered=false;
  sel.ddPairs={}; sel.clkSelected=[];
  sel.correct=0; sel.total=0; sel.results=[];
  if (sel._autoTimer) clearTimeout(sel._autoTimer);
  screen='sel'; render();
}

function doSelCheck() {
  if (sel.answered) return;
  const q = sel.queue[sel.qIdx];
  if (q.type==='GAP') {
    const gaps = document.querySelectorAll('[data-gap-idx]');
    if (gaps.length > 1) { sel.answer = Array.from(gaps).map(inp=>inp.value.trim()); }
    else if (gaps.length === 1) { sel.answer = [gaps[0].value.trim()]; }
  }
  if (q.type==='CLK') sel.answer=[...sel.clkSelected];
  if (q.type==='DD') sel.answer={...sel.ddPairs};
  const ok = checkAnswer(q, sel.answer);
  sel.answered = true; sel.results.push({ok}); sel.total++;
  if (ok) sel.correct++;
  playSound(ok ? 'correct' : 'wrong');
  render();
  // Αυτόματη μετάβαση στην επόμενη ερώτηση 3 δευτ. μετά τον έλεγχο (σωστό ή λάθος)
  if (sel._autoTimer) clearTimeout(sel._autoTimer);
  sel._autoTimer = setTimeout(()=>doSelNext(), 3000);
}

function doSelNext() {
  if (sel._autoTimer) { clearTimeout(sel._autoTimer); sel._autoTimer=null; }
  if (screen!=='sel') return; // ο χρήστης έφυγε από την εξάσκηση εν τω μεταξύ
  if (sel.qIdx < sel.queue.length-1) {
    sel.qIdx++; sel.answer=null; sel.answered=false;
    sel.ddPairs={}; sel.clkSelected=[];
    render();
  } else { screen='sel_results'; render(); }
}

// ══════════════════════════════════════════════
// ΠΑΡΟΥΣΙΑΣΗ — State & Logic
// ══════════════════════════════════════════════
let pres = {
  filterTheories: [],    // αριθμοί θεωρίας (κενό = όλες) — πολλαπλή επιλογή
  filterTypes: [],       // τύποι ερώτησης (κενό = όλοι) — πολλαπλή επιλογή
  filterCount: 0,        // 0=Όλες, 10, 20
  queue: [],
  qIdx: 0,
  showAnswer: false,
  theoryKey: null,        // ποια θεωρία εμφανίζεται
};

// Εναλλαγή φίλτρου πολλαπλής επιλογής (όπως στην Εξάσκηση)
function togglePresFilter(key, val) {
  if (val === 'all') { pres[key] = []; return; }
  const arr = pres[key];
  const i = arr.indexOf(val);
  if (i === -1) arr.push(val); else arr.splice(i, 1);
}

function getPresPool() {
  let pool = [...allQ];
  if (pres.filterTheories.length) {
    const ts = pres.filterTheories.map(String);
    pool = pool.filter(q => ts.includes(String(q.theory)));
  }
  if (pres.filterTypes.length) pool = pool.filter(q => pres.filterTypes.includes(q.type));
  return pool;
}

// Υπογραφή φίλτρων Παρουσίασης — ώστε το «Ξεκίνα» να ακολουθεί το τυπωμένο σετ
function presFilterSig() {
  return [
    'pres',
    pres.filterTheories.slice().sort().join(','),
    pres.filterTypes.slice().sort().join(','),
    pres.filterCount
  ].join('|');
}

function printPresSetup() {
  const pool = getPresPool();
  const count = pres.filterCount === 0 ? pool.length : Math.min(pres.filterCount, pool.length);
  // Ίδια λογική με την Εξάσκηση: ανάμεικτο σετ (τυχαία σειρά, χωρίς συνεχόμενες
  // ίδιες κατηγορίες / τρεις ίδιους τύπους) + αποθήκευση για ταύτιση με το «Ξεκίνα»
  const queueToPrint = buildInterleavedQueue(pool, count);
  _printedQueue = queueToPrint;
  _printedSig = presFilterSig();
  showPrintModal(queueToPrint);
}

function startPresSession() {
  const pool = getPresPool();
  const count = pres.filterCount === 0 ? pool.length : Math.min(pres.filterCount, pool.length);
  if (_printedQueue && _printedQueue.length && _printedSig === presFilterSig()) {
    pres.queue = _printedQueue.slice();   // ίδιο ακριβώς σετ με την εκτύπωση
  } else {
    pres.queue = pool.slice(0, count);
  }
  pres.qIdx = 0;
  pres.showAnswer = false;
  // Με μία μόνο επιλεγμένη ενότητα εμφανίζεται η θεωρία της· αλλιώς η θεωρία της 1ης ερώτησης
  pres.theoryKey = pres.filterTheories.length === 1 ? parseInt(pres.filterTheories[0]) : (pres.queue[0] ? pres.queue[0].theory : null);
  // Πάμε πρώτα στη θεωρία
  if (pres.theoryKey && THEORY_CARDS[pres.theoryKey]) {
    screen = 'pres_theory';
  } else {
    screen = 'pres';
  }
  render();
}

function renderPresTheory() {
  const tKey = pres.theoryKey;
  if (!tKey || !THEORY_CARDS[tKey]) {
    screen = 'pres'; render(); return '';
  }
  const card = THEORY_CARDS[tKey];

    <button id="btnPresTheoryHome" class="hbtn">🏠<span class="hbtn-lbl">Αρχική</span></button>
  </div>
  <div class="card" style="border-left:5px solid var(--peach-deep)">
    <ul style="margin:0;padding-left:20px;list-style:none">

    </ul>

}

function renderPresSetup() {
  // Θεωρία chips
  const theoryChips = [{v:'all', lbl:'Όλα'}];
  const _theoryMax = Math.max(0, ...Object.keys(THEORY_CARDS).map(Number).filter(n=>!isNaN(n)));
  for (let i = 1; i <= _theoryMax; i++) {
    if (THEORY_CARDS[i]) {
      const cnt = allQ.filter(q => String(q.theory) === String(i)).length;
      theoryChips.push({v: i, lbl: `${i}) ${THEORY_CARDS[i].title.substring(0,30)}…`, cnt});
    }
  }
  const tChips = theoryChips.map(({v, lbl, cnt}) => {
    const c = v === 'all' ? allQ.length : cnt;
    const active = v === 'all' ? pres.filterTheories.length === 0 : pres.filterTheories.includes(v);
    return `<button class="fchip ${active?'active':''}" data-pres-theory="${v}">${lbl} <span class="fchip-count">(${c||0})</span></button>`;
  }).join('');

  // Τύπος chips
  const typeMap = [{v:'all',lbl:'Όλοι'},{v:'MC',lbl:'Πολλαπλή'},{v:'YN',lbl:'Ναι/Όχι'},{v:'GAP',lbl:'Κενό'},{v:'DD',lbl:'Αντιστοίχ.'},{v:'CLK',lbl:'Εντοπισμός'}];
  const typeChips = typeMap.map(({v,lbl}) => {
    const ts = pres.filterTheories.map(String);
    const pool2 = ts.length === 0 ? allQ : allQ.filter(q=>ts.includes(String(q.theory)));
    const cnt = v==='all' ? pool2.length : pool2.filter(q=>q.type===v).length;
    const active = v === 'all' ? pres.filterTypes.length === 0 : pres.filterTypes.includes(v);
    return `<button class="fchip ${active?'active':''}" data-pres-type="${v}">${lbl} <span class="fchip-count">(${cnt})</span></button>`;
  }).join('');

  // Αριθμός chips
  const countMap = [{n:10,lbl:'10'},{n:20,lbl:'20'},{n:0,lbl:'Όλες'}];
  const countChips = countMap.map(({n,lbl}) =>
    `<button class="fchip ${pres.filterCount===n?'active':''}" data-pres-count="${n}">${lbl}</button>`
  ).join('');

  const pool = getPresPool();
  const canStart = pool.length > 0;
  const actualCount = pres.filterCount === 0 ? pool.length : Math.min(pres.filterCount, pool.length);

  return `
  <div class="setup-screen">
  <div class="drll-header" style="display:flex;justify-content:space-between;align-items:center">
    <div><h2>📋 Παρουσίαση</h2><p>Θεωρία &amp; παραδείγματα — επιλέξτε κεφάλαιο</p></div>
    <button id="btnPresHome" class="hbtn">🏠<span class="hbtn-lbl">Αρχική</span></button>
  </div>
  <div class="card setup-card">
    <div class="setup-sections">
      <div class="drll-setup-section"><h3>📚 Θεωρία / Κεφάλαιο</h3><div class="filter-chips">${tChips}</div></div>
      <div class="drll-setup-section"><h3>❓ Τύπος Ερώτησης</h3><div class="filter-chips">${typeChips}</div></div>
      <div class="drll-setup-section"><h3>🔢 Αριθμός Παραδειγμάτων</h3><div class="filter-chips">${countChips}</div></div>
    </div>
    <div>
      <div class="info ${canStart?'success':'warn'}" style="margin-top:4px">
        ${canStart ? `✅ Βρέθηκαν <strong>${pool.length}</strong> παραδείγματα (θα εμφανιστούν <strong>${actualCount}</strong>)` : '⚠️ Δεν βρέθηκαν ερωτήσεις με αυτά τα φίλτρα'}
      </div>
      <button class="btn-go" id="btnPresStart" ${canStart?'':'disabled'} style="margin-top:6px">Ξεκινήστε →</button>
      <button class="btn-sec" id="btnPresPrint" ${canStart?'':'disabled'} style="margin-top:6px">🖨️ Εκτύπωση</button>
    </div>
