  </div>`;
}

function renderPresQuestionBody(q) {
  // Ίδιο rendering αλλά πάντα disabled — χωρίς δυνατότητα αλληλεπίδρασης
  if (q.type==='MC'||q.type==='YN') {
    const keys = ['Α','Β','Γ','Δ'];
    const vals = [q.optA,q.optB,q.optC,q.optD].filter(Boolean);
    let html = '<div class="opts">';
    vals.forEach((v,i) => {
      const k = keys[i];
      let cls = 'opt';
      if (pres.showAnswer) {
        const isCorrect = k===q.correct.trim().toUpperCase();
        if (isCorrect) { cls += ' ok'; }
      }
      html += `<button class="${cls}" disabled style="cursor:default;opacity:.85"><span class="opt-k">${k}</span>${v}${pres.showAnswer && k===q.correct.trim().toUpperCase() ? '<span class="opt-badge">✓</span>' : ''}</button>`;
    });
    html += '</div>';
    return html;
  }
  if (q.type==='DD') {
    // Εμφανίζουμε τα στοιχεία αντιστοίχισης χωρίς drag
    let html = '<div class="dd-container" style="opacity:.85">';
    html += '<div class="dd-left">';
    q.leftItems.forEach((l,i) => {
      html += `<div class="dd-chip used" style="cursor:default">${l}</div>`;
    });
    html += '</div>';
    if (pres.showAnswer) {
      html += '<div class="dd-right">';
      const correct = parseCorrectDD(q.correct, q.leftItems, q.rightItems);
      q.leftItems.forEach((l,li) => {
        const ri = correct ? correct[li] : li;
        const rText = q.rightItems[ri] || '?';
        html += `<div class="dd-slot-row"><span class="dd-slot-lbl">${l}</span><div class="dd-slot filled" style="border-color:var(--ok)">${rText}</div></div>`;
      });
      html += '</div>';
    } else {
      html += '<div class="dd-right">';
      q.rightItems.forEach(r => {
        html += `<div class="dd-slot-row"><span class="dd-slot-lbl">${r}</span><div class="dd-slot">—</div></div>`;
      });
      html += '</div>';
    }
    html += '</div>';
    return html;
  }
  if (q.type==='GAP') {
    const text = q.excerpt || q.q || '';
    const GAP_MARKER = '__________';
    let parts = text.split(GAP_MARKER);
    if (parts.length < 2) parts = text.split('_____');
    if (parts.length < 2) return `<div class="exc">${text}</div>`;
    const corrects = q.correct ? q.correct.split('|').map(s=>s.trim()).filter(Boolean) : [];
    let html = '<div class="exc-gap" style="opacity:.85">';
    for (let i = 0; i < parts.length; i++) {
      html += parts[i];
      if (i < parts.length - 1) {
        if (pres.showAnswer && corrects[i]) {
          html += `<span style="background:var(--ok-bg);border:2px solid var(--ok);border-radius:6px;padding:2px 10px;font-weight:700;color:var(--ok)">${corrects[i].split('/')[0]}</span>`;
        } else {
          html += `<input class="gap-inp" disabled placeholder="…" style="cursor:default">`;
        }
      }
    }
    html += '</div>';
    return html;
  }
  if (q.type==='CLK') {
    // Εμφανίζουμε το κείμενο, αν showAnswer τονίζουμε τους στόχους
    const targets = q.targets.map(t=>t.trim().toLowerCase());
    const tokens = q.excerpt.split(/(\s+)/);
    let html = '<div class="exc" style="opacity:.85">';
    tokens.forEach(tok => {
      if (/^\s+$/.test(tok)) { html += tok; return; }
      const clean = tok.replace(/[.,;:!?«»"\'()\\[\\]]/g,'').toLowerCase();
      const isTarget = targets.includes(clean);
      if (pres.showAnswer && isTarget) {
        html += `<span style="background:var(--ok-bg);border-bottom:3px solid var(--ok);padding:2px 4px;font-weight:700">${tok}</span>`;
      } else {
        html += tok;
      }
    });
    html += '</div>';
    return html;
  }
  return '';
}

function renderPres() {
  if (!pres.queue.length) return '<div class="card"><p>Δεν βρέθηκαν παραδείγματα.</p></div>';
  const q = pres.queue[pres.qIdx];
  const total = pres.queue.length;
  const currentTheory = q.theory || pres.theoryKey;
  const theoryCard = currentTheory && THEORY_CARDS[currentTheory] ? THEORY_CARDS[currentTheory] : null;

  // Έλεγχος αν έχει αλλάξει το κεφάλαιο ή αν είναι η πρώτη ερώτηση
  const prevQ = pres.qIdx > 0 ? pres.queue[pres.qIdx - 1] : null;
  const prevTheory = prevQ ? (prevQ.theory || pres.theoryKey) : null;
  const chapterChanged = !prevQ || prevTheory !== currentTheory;

  let html = `
  <div class="drll-header" style="display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,var(--peach-deep),#a0573a)">
    <div style="display:flex;flex-direction:column;gap:2px">
      <h2 style="color:#fff;margin:0">📋 Παρουσίαση</h2>
      <span style="font-size:.8rem;color:rgba(255,255,255,.88)">${pres.qIdx+1} / ${total}</span>
    </div>
    <div style="display:flex;gap:6px">
      <button id="btnPresHomeFromQ" class="hbtn">🏠<span class="hbtn-lbl">Αρχική</span></button>
      <button id="btnPresRestartFromQ" class="hbtn">⏮<span class="hbtn-lbl">Έναρξη</span></button>
    </div>
  </div>
  `;

  // Εμφάνιση θεωρίας ΜΟΝΟ όταν αλλάζει κεφάλαιο (ξεχωριστή κάρτα)
  if (chapterChanged && theoryCard) {
    html += `<div class="card" style="background:linear-gradient(135deg,var(--amber-l),#fff);border-left:4px solid #d97706;margin-bottom:14px">
      <h3 style="font-family:'IBM Plex Serif',serif;font-size:1.1rem;color:#92400e;margin-bottom:8px">📚 ${theoryCard.title}</h3>
      <div style="color:#78350f;font-size:.9rem;line-height:1.6">${theoryCard.content}</div>
    </div>`;
  }

  // Κουμπί θεωρίας
  if (theoryCard) {
    html += `<button id="btnPresShowTheory" style="width:100%;text-align:left;padding:12px 16px;margin-bottom:12px;background:var(--cream);border:1.5px solid var(--cream-accent);border-radius:var(--r-sm);font-family:inherit;cursor:pointer;font-size:.88rem;font-weight:600;color:var(--cream-text)">📖 ${theoryCard.title}</button>`;
  }

  // Αριθμός ερώτησης
  html += `<div class="card" style="margin-bottom:14px;padding:12px 22px"><p style="font-size:.85rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Ερώτηση ${pres.qIdx+1}</p>`;

  // Απόσπασμα (μόνο για MC, YN, DD — GAP/CLK το εμφανίζουν μέσα στο renderPresQuestionBody)
  if (q.excerpt && (q.type === 'MC' || q.type === 'YN' || q.type === 'DD')) {
    html += `<div class="exc" style="margin-bottom:14px">${q.excerpt}</div>`;
  }

  // Ερώτηση και επιλογές
  html += `<p class="q-txt">${q.q}</p>`;
  html += renderPresQuestionBody(q);
  html += `</div>`;

  // Κουμπιά
  if (!pres.showAnswer) {
    html += `<button class="btn-check" id="btnPresReveal" style="width:100%;margin-bottom:8px">💡 Βοηθός</button>`;
  }

  if (pres.qIdx < total - 1) {
    html += `<button class="btn-next" id="btnPresNext" style="width:100%">Επόμενο →</button>`;
  } else {
    html += `<button class="btn-next" id="btnPresFinish" style="width:100%">🏠 Τέλος</button>`;
  }

  if (pres.showAnswer) {
    const fb = q.fb && q.fb.find(f=>f);
    html += `<div class="fb-box ok" style="margin-top:12px"><p class="fb-title">💡 Βοηθός</p>${fb ? `<p>${fb}</p>` : `<p>${q.correct || ''}</p>`}</div>`;
  }

  return html;
}

// ══════════════════════════════════════════════
// ZOOM CONTROL — CSS zoom (ακριβώς σαν browser zoom)
// ══════════════════════════════════════════════
let currentZoom = 100;

function updateZoomUI() {
  const m = document.getElementById('zoomMinus');
  const p = document.getElementById('zoomPlus');
  if (m) m.disabled = currentZoom <= 50;
  if (p) p.disabled = currentZoom >= 300;
}

function setZoom(percent) {
  currentZoom = Math.max(50, Math.min(300, percent));
  document.body.style.zoom = String(currentZoom / 100);
  // Τα fixed buttons (ήχος, zoom) πρέπει να αντισταθμίσουν το zoom
  const inv = 1 / (currentZoom / 100);
  document.querySelectorAll('.sound-toggle, .close-app-btn, .zoom-controls').forEach(el => {
    el.style.transform = 'scale(' + inv + ')';
    el.style.transformOrigin = el.classList.contains('zoom-controls') ? 'top left' : 'top right';
  });
  updateZoomUI();
  try { localStorage.setItem('syntaxi_zoom', currentZoom); } catch(e) {}
}

function zoomIn() { setZoom(currentZoom + 10); }
function zoomOut() { setZoom(currentZoom - 10); }

// Keyboard shortcuts (Cmd/Ctrl + Plus/Minus/0)
window.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && (e.key === '+' || e.key === '=')) {
    e.preventDefault(); zoomIn(); return false;
  }
  if ((e.metaKey || e.ctrlKey) && e.key === '-') {
    e.preventDefault(); zoomOut(); return false;
  }
  if ((e.metaKey || e.ctrlKey) && e.key === '0') {
    e.preventDefault(); setZoom(100); return false;
  }
});

// PRINT MODAL FUNCTIONS
// ══════════════════════════════════════════════
function showPrintModal(questions) {
  _pendingPrintQ = questions;
  document.getElementById('printModalOverlay').classList.add('active');
  setTimeout(() => attachPrintModalListeners(), 100);
}

function closePrintModal() {
  document.getElementById('printModalOverlay').classList.remove('active');
}

function attachPrintModalListeners() {
  if (_pmListenersAttached) return;
  _pmListenersAttached = true;

  document.getElementById('pmClose').addEventListener('click', closePrintModal);
  document.getElementById('pmCancel').addEventListener('click', closePrintModal);
  document.getElementById('printModalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('printModalOverlay')) closePrintModal();
  });

  document.getElementById('pmShowLines').addEventListener('change', function() {
    document.getElementById('pmLinesCountRow').style.display = this.checked ? 'block' : 'none';
  });
  document.getElementById('pmWatermarkOn').addEventListener('change', function() {
    document.getElementById('pmWatermarkRow').style.display = this.checked ? 'block' : 'none';
  });
  // Αρχική κατάσταση
  document.getElementById('pmWatermarkRow').style.display = 'none';

  document.getElementById('pmPrint').addEventListener('click', () => {
    const s = collectPrintSettings();
    closePrintModal();
    printSelWorksheet(_pendingPrintQ, s);
  });

  // Helper: φτιάχνει το link του τρέχοντος σετ
  const _setLink = () => {
    const ids = (_pendingPrintQ || []).map(q => q.id).filter(v => v != null && v !== '');
    return ids.length ? buildSetLink(ids) : null;
  };

  // 📋 Αντιγραφή — πάντα clipboard (για paste στο Live), χωρίς share sheet
  const pmCopy = document.getElementById('pmCopyLink');
  if (pmCopy) pmCopy.addEventListener('click', async () => {
    const url = _setLink();
    if (!url) return;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(url);
      } else {
        const ta = document.createElement('textarea');
        ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.focus(); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
      }
      pmCopy.textContent = '✓ Αντιγράφηκε';
      setTimeout(() => { pmCopy.innerHTML = '📋 Αντιγραφή'; }, 1800);
    } catch (e) {
      window.prompt('Αντιγράψτε τον σύνδεσμο:', url);
    }
  });

  // 🔗 Κοινή χρήση — share sheet (για αποστολή αλλού: email, μήνυμα κ.λπ.)
  const pmShare = document.getElementById('pmShareLink');
  if (pmShare) pmShare.addEventListener('click', async () => {
    const url = _setLink();
    if (!url) return;
    try {
      if (navigator.share) {
        await navigator.share({ title: 'Σετ ερωτήσεων', text: 'Άνοιγμα σετ στην εφαρμογή:', url });
      } else if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(url);
        pmShare.textContent = '✓ Αντιγράφηκε';
        setTimeout(() => { pmShare.innerHTML = '🔗 Κοινή χρήση'; }, 1800);
      } else {
        window.prompt('Αντιγράψτε τον σύνδεσμο:', url);
      }
    } catch (e) { /* ο χρήστης ακύρωσε την κοινή χρήση */ }
  });
}

function renderQuestionForPrint(q, idx, s) {
  const num = idx + 1;
  let html = `<div class="pq">`;

  // Αριθμός ερώτησης (ΠΡΙΝ από το απόσπασμα)
  html += `<p class="pq-num">Ερώτηση ${num}</p>`;

  // Απόσπασμα (αν υπάρχει)
  if (q.excerpt) {
    html += `<div class="pq-excerpt">${q.excerpt}</div>`;
  }

  html += `<p class="pq-q">${q.q}</p>`;

  if (q.type === 'YN') {
    html += `<div class="pq-yn"><span>☐ Σωστό</span><span>☐ Λάθος</span></div>`;
  }

  if (q.type === 'MC') {
    const opts = [
      {k:'Α', v:q.optA}, {k:'Β', v:q.optB},
      {k:'Γ', v:q.optC}, {k:'Δ', v:q.optD}
    ].filter(o => o.v);
    html += `<div class="pq-opts">`;
    opts.forEach(o => { html += `<div class="pq-opt"><span class="pq-k">${o.k}.</span> ${o.v}</div>`; });
    html += `</div>`;
  }

  if (q.type === 'DD') {
    html += `<table class="pq-dd"><thead><tr><th>Στήλη Α</th><th>Στήλη Β</th></tr></thead><tbody>`;
    const maxRows = Math.max(q.leftItems.length, q.rightItems.length);
    const rightShuffled = [...q.rightItems].sort(() => Math.random() - 0.5);
    for (let i = 0; i < maxRows; i++) {
      html += `<tr><td>${q.leftItems[i] || ''}</td><td>${rightShuffled[i] || ''}</td></tr>`;
    }
    html += `</tbody></table><p class="pq-dd-ans">Αντιστοιχίσεις: ___ → ___ &nbsp;&nbsp; ___ → ___ &nbsp;&nbsp; ___ → ___ &nbsp;&nbsp; ___ → ___</p>`;
  }

  if (q.type === 'GAP') {
    if (q.excerpt && q.targets && q.targets.length) {
      let gapText = q.excerpt;
      q.targets.forEach(t => {
        gapText = gapText.replace(new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'),
          `<span class="pq-gap">___________</span>`);
      });
      html = html.replace(`<div class="pq-excerpt">${q.excerpt}</div>`,
        `<div class="pq-excerpt">${gapText}</div>`);
    }
  }

  if (s.showLines && q.type !== 'MC' && q.type !== 'YN' && q.type !== 'DD') {
    html += `<div class="pq-lines">`;
    for (let i = 0; i < s.linesCount; i++) {
      html += `<div class="pq-line"></div>`;
    }
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function printSelWorksheet(questions, s) {
  // QR deep-link για το ίδιο ακριβώς σετ ερωτήσεων (σταθερά IDs)
  const setIds = questions.map(q => q.id).filter(v => v != null && v !== '');
  const setUrl = buildSetLink(setIds);
  const qrSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=4&data=' + encodeURIComponent(setUrl);

  // Περιεχόμενο QR για την 3η στήλη (πιο μικρό, ώστε να χωρά δίπλα στα στοιχεία)
  const qrCornerInner = setIds.length ? `
      <a href="${setUrl}" style="display:inline-block;text-align:center;text-decoration:none;color:#000">
        <img src="${qrSrc}" alt="QR σετ ερωτήσεων" style="width:76px;height:76px;border:1px solid #ddd;border-radius:6px" loading="eager">
        <div style="font-size:7pt;color:#666;margin-top:2px;line-height:1.2;max-width:92px">Σκανάρετε για το ίδιο σετ</div>
      </a>` : '';

  // 3η στήλη: αν υπάρχει λογότυπο → λογότυπο (χωρίς QR)· αλλιώς → QR (αν υπάρχει σετ).
  const cornerCell = s.logoUrl ? `
    <td rowspan="2" style="text-align:right;vertical-align:middle;padding-left:10px;width:${s.logoW}px">
      <img src="${s.logoUrl}" style="width:${s.logoW}px;height:${s.logoH==='auto'?'auto':s.logoH+'px'};object-fit:contain" onerror="this.style.display='none'">
    </td>`
    : (qrCornerInner ? `
    <td rowspan="2" style="text-align:right;vertical-align:middle;padding-left:10px;width:96px">${qrCornerInner}
    </td>` : '');

  let headerHTML = '';
  if (s.school || s.subject || s.className || s.date || s.showName || s.logoUrl || setIds.length) {
    headerHTML = `<table class="hdr-table">`;
    headerHTML += `<tr>`;
    headerHTML += s.school ? `<td><strong>Σχολείο:</strong> ${s.school}</td>` : `<td></td>`;
    headerHTML += s.subject ? `<td><strong>Μάθημα:</strong> ${s.subject}</td>` : `<td></td>`;
    headerHTML += cornerCell;
    headerHTML += `</tr><tr>`;
    if (s.showName) headerHTML += `<td><strong>Ονοματεπώνυμο:</strong> ___________________________</td>`;
    else if (s.className) headerHTML += `<td><strong>Τμήμα:</strong> ${s.className}</td>`;
    else headerHTML += `<td></td>`;
    if (s.date) headerHTML += `<td><strong>Ημερομηνία:</strong> ${s.date}</td>`;
    else if (s.className && s.showName) headerHTML += `<td><strong>Τμήμα:</strong> ${s.className}</td>`;
    else headerHTML += `<td></td>`;
    headerHTML += `</tr></table><hr class="hdr-line">`;
  }

  const questionsHTML = questions.map((q, i) => renderQuestionForPrint(q, i, s)).join('');

  const html = `<!DOCTYPE html>
<html lang="el"><head><meta charset="UTF-8">
<title>${s.title}</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  @page{margin:${s.marginV} ${s.marginH}}
  body{font-family:${s.font};font-size:${s.fontSize};color:#000;padding:${s.marginV} ${s.marginH}}
  @media print{body{padding:0}}
  .hdr-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:${s.fontSize}}
  .hdr-table td{padding:3px 0;width:50%;vertical-align:top}
  .hdr-line{border:none;border-top:1.5px solid #333;margin-bottom:14px}
  .print-title{text-align:center;font-size:calc(${s.fontSize} + 3pt);font-weight:bold;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
  .print-instr{font-size:${s.fontSize};text-align:justify;margin-bottom:5px;line-height:1.7}
  .print-score{font-size:${s.fontSize};font-style:italic;color:#444;margin-bottom:14px}
  .pq{margin-bottom:${s.qSpacing};page-break-inside:avoid}
  .pq-excerpt{font-size:${s.fontSize};line-height:${s.lineHeight};text-align:justify;font-style:italic;margin-bottom:8px;padding:4px 0}
  .pq-num{font-weight:bold;font-size:${s.fontSize};margin-bottom:3px}
  .pq-q{font-size:${s.fontSize};margin-bottom:8px;line-height:${s.lineHeight}}
  .pq-yn{display:flex;gap:32px;font-size:${s.fontSize};margin-top:6px}
  .pq-opts{display:flex;flex-direction:column;gap:${s.optSpacing};margin-top:6px}

  .pq-k{font-weight:bold}

  .pq-dd th{background:#f0f0f0;font-weight:bold}
  .pq-dd-ans{font-size:calc(${s.fontSize} - 1pt);color:#555;margin-top:8px}
  .pq-gap{border-bottom:1px solid #333;display:inline-block;min-width:80px}
  .pq-lines{margin-top:10px}
  .pq-line{border-bottom:1px solid #aaa;height:24px;margin-bottom:2px}
  @media print{
    .no-print{display:none!important}
    @page{margin:${s.marginV} ${s.marginH}}
  }
  ${s.watermark ? `
  .watermark{
    position:fixed; top:50%; left:50%;

    font-size:80pt; font-weight:900;
    color:${s.watermarkColor};
    opacity:${s.watermarkOpacity};
    white-space:nowrap; pointer-events:none;

  ${s.watermark ? `<div class="watermark">${s.watermarkText}</div>` : ''}
  ${headerHTML}
  <div class="print-title">${s.title}</div>
  ${s.instructions ? `<p class="print-instr">${s.instructions}</p>` : ''}
  ${s.score ? `<p class="print-score">${s.score}</p>` : ''}
  ${questionsHTML}
  <button class="no-print" onclick="setTimeout(()=>window.print(),300)" style="position:fixed;top:20px;right:20px;padding:12px 24px;font-size:15px;background:#a68a2e;color:#fff;border:none;border-radius:8px;cursor:pointer">🖨️ Εκτύπωση</button>
</body></html>`;

  const blob = new Blob([html], {type: 'text/html; charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const win = window.open(url, '_blank');

}

// ══════════════════════════════════════════════
// DEEP-LINK ΣΕΤ (QR / σύνδεσμος)
// ══════════════════════════════════════════════
function buildSetLink(ids) {
  const base = location.origin + location.pathname;
  return base + '#set=' + encodeURIComponent(ids.join(','));
}

function loadSetFromHash() {
  const m = (location.hash || '').match(/set=([^&]+)/);
  if (!m) return false;
  const ids = decodeURIComponent(m[1]).split(',').map(s => s.trim()).filter(Boolean);
  if (!ids.length) return false;
  const byId = {};
  allQ.forEach(q => { if (q.id != null && q.id !== '') byId[String(q.id)] = q; });
  const queue = ids.map(id => byId[id]).filter(Boolean);
  if (!queue.length) return false;
  sel.queue = queue;
  sel.qIdx = 0; sel.answer = null; sel.answered = false;
  sel.ddPairs = {}; sel.clkSelected = [];
  sel.correct = 0; sel.total = 0; sel.results = [];
  if (sel._autoTimer) { clearTimeout(sel._autoTimer); sel._autoTimer = null; }
  setLockMode = true;   // άνοιξε μέσω συνδέσμου σετ → κλείδωμα στο σετ
  return true;
}
