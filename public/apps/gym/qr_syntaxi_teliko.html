document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"c5bc3e75-ed44-4406-b959-5cabaa006203\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n\n<x-dc>\n<helmet>\n<script>\ndocument.documentElement.setAttribute('lang','el');\n(function(){\n  const STRIP_SEL = '.eyebrow,.q-lbl,.gap-panel-lbl,.card-eyebrow,.home-card .hc-arrow,.setup-sec h3,.sc .l,.check-loader,[data-upper]';\n  function stripAccents(s){ return s.normalize('NFD').replace(/[\\u0300\\u0301\\u0303\\u0304\\u0306\\u0308\\u030B\\u0342\\u0344\\u0345\\u0313\\u0314]/g,'').normalize('NFC'); }\n  function process(root){\n    root.querySelectorAll(STRIP_SEL).forEach(el=>{\n      const w=document.createTreeWalker(el,NodeFilter.SHOW_TEXT);\n      let n; while((n=w.nextNode())){ const t=n.nodeValue; if(!t) continue; const u=stripAccents(t); if(u!==t) n.nodeValue=u; }\n    });\n    // Also inline uppercase (style attribute)\n    root.querySelectorAll('[style*=\"uppercase\"]').forEach(el=>{\n      if (el.matches(STRIP_SEL)) return;\n      const w=document.createTreeWalker(el,NodeFilter.SHOW_TEXT,{acceptNode(n){return n.parentElement===el || getComputedStyle(n.parentElement).textTransform==='uppercase' ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_SKIP;}});\n      let n; while((n=w.nextNode())){ const t=n.nodeValue; if(!t) continue; const u=stripAccents(t); if(u!==t) n.nodeValue=u; }\n    });\n  }\n  const mo=new MutationObserver(muts=>{ for(const m of muts){ m.addedNodes.forEach(nd=>{ if(nd.nodeType===1) process(nd); }); if(m.type==='characterData' && m.target.parentElement) process(m.target.parentElement); } });\n  window.addEventListener('DOMContentLoaded',()=>{\n    process(document.body); mo.observe(document.body,{childList:true,subtree:true,characterData:true});\n    const bc = document.getElementById('btnClose');\n    if (bc) bc.addEventListener('click', ()=>{\n      if (confirm('Κλείσιμο εφαρμογής;')){\n        // Try to close th :\"Οι μαθητές αισθάνονται το άγχος των εξετάσεων.\",\"q\":\"Μετέφερε στην παθητική σύνταξη: το άγχος των εξετάσεων είναι __________ στους μαθητές.\",\"optA\":null,\"optB\":null,\"optC\":null,\"optD\":null,\"correct\":\"αισθητό|\",\"leftItems\":[],\"rightItems\":[],\"targets\":[],\"fb\":[\"Αποθετικό ρήμα «αντιλαμβάνομαι»: γίνομαι + ρηματικό επίθετο σε -τός → «έγινε αντιληπτός».\",null,null,null],\"theory\":7},{\"id\":\"S0070\",\"catKey\":\"2.4\",\"diff\":3,\"type\":\"MC\",\"excerpt\":\"Οι ισχυροί εκμεταλλεύονται τους αδυνάτους.\",\"q\":\"Ποια είναι η σωστή μετατροπή στην παθητική σύνταξη;\",\"optA\":\"Οι αδύνατοι εκμεταλλεύονται από τους ισχυρούς. \",\"optB\":\"Οι ισχυροί εκμεταλλεύονται από τους αδυνάτους. \",\"optC\":\"Οι ισχυροί εκμεταλλεύουν τους αδυνάτους.  \",\"optD\":\"Οι αδύνατοι γίνονται αντικείμενο / θύμα εκμετάλλευσης από τους ισχυρούς.\",\"correct\":\"Δ\",\"leftItems\":[],\"rightItems\":[],\"targets\":[],\"fb\":[\"εκμεταλλεύονται→γίνονται αντικείμενο εκμετάλλευσης\",\"Η Β είναι λάθος: δεν αλλάζει το υποκείμενο. Τα αποθετικά ρήματα δεν μετατρέπονται απλά σε παθητική φωνή — χρειάζεται περίφραση ή συνώνυμο.\",\"Η Γ είναι λάθος: το *εκμεταλλεύουν δεν υπάρχει (αποθετικό ρήμα). Η σωστή μετατροπή χρησιμοποιεί περίφραση: «γίνονται αντικείμενο εκμετάλλευσης».\",null],\"theory\":7},{\"id\":\"S0071\",\"catKey\":\"2.4\",\"diff\":3,\"type\":\"MC\",\"excerpt\":\"Οι έφηβοι συνήθως δεν εκμεταλλεύονται σωστά τον ελεύθερο χρόνο τους.\",\"q\":\"Ποια είναι η σωστή μετατροπή στην παθητική σύνταξη;\",\"optA\":\"Οι έφηβοι συνήθως δεν εκεταλλεύουν σωστά τον ελεύθερο χρόνο τους.\",\"optB\":\"Ο ελεύθερος χρόνος δεν εκμεταλλεύεται σωστά από τους έφηβους.\",\"optC\":\"Ο ελεύθερος χρόνος δεν αξιοποιείται σωστά από τους έφηβους. \",\"optD\":\"Ο ελεύθερος χρόνος συνήθως δεν γίνεται σωστή εκμετάλλευση ταπό τους έφηβους.\",\"correct\":\"Γ\",\"leftItems\":[],\"rightItems\":[],\"targets\":[],\"fb\":[\"εκμεταλλεύονται τον χρόνο→ο χρόνος αξιοποιείται\",\"Η Β είναι λάθος: «εκμεταλλεύεται» είναι αποθετικό ρήμα (ενεργ. διάθεση) — δεν μπορεί να χρησιμοποιηθεί ως παθητικό. Σωστά: «αξιοποιείται» (συνώνυμο παθ. ρήμα).\",\"Η Δ περιέχει γλωσσικό λάθος («ταπό»). Η σωστή μετατροπή χρησιμοποιεί συνώνυμο: «αξιοποιείται».\",null],\"theory\":7},{\"id\":\"S0072\",\"catKey\":\"2.4\",\"diff\":3,\"type\":\"MC\",\"excerpt\":\"Ο ένας ειρωνεύεται τις αδυναμίες του άλλου.\",\"q\":\"Ποια είναι η σωστή μετατροπή στην παθητική σύνταξη;\",\"optA\":\"Ο άλλος ειρωνεύεται τις αδυναμίες του ενός.\",\"optB\":\"Οι αδυναμίες του ενός γίνονται αντικείμενο ειρωνείας από τον άλλον.\",\"optC\":\"Οι αδυναμίες του ενός ειρωνεύονται από τον άλλον.\",\"optD\":\"Ο άλλος ειρωνεύει τις αδυναμίες του ενός.\",\"correct\":\"Β\",\"leftItems\":[],\"rightItems\":[],\"targets\":[],\"fb\":[\"ειρωνεύεται→γίνεται αντικείμενο ειρωνείας\",\"Η Α είναι λάθος: αλλάζει μόνο τη σειρά χωρίς να μετατρέψει σε παθητική. Η σωστή μετατροπή χρησιμοποιεί περίφραση: «γίνονται αντικείμενο ειρωνείας».\",\"Η Γ είναι λάθος: «ειρωνεύονται» είναι αποθετικό ρήμα και δεν μπορεί να λειτουργήσει ως παθητικό.\",null],\"theory\":7}];\n\nconst CAT_NAMES = {\n  '1.1':'Αναγνώριση', '1.2':'Ποιητικό αίτιο',\n  '2.1':'Μετατροπές Ι', '2.2':'Δύσκολα σημεία',\n  '2.3':'Μετατροπές ΙΙ', '2.4':'Μετατροπές ΙΙΙ'\n};\n\nconst THEORY = {\n  1:{title:'Πώς αναγνωρίζω το είδος σύνταξης',points:[\n    'Βασικό κριτήριο είναι η <b>διάθεση<\u002Fb> του ρήματος (όχι η φωνή). Ρήμα ενεργητικής διάθεσης → ενεργητική σύνταξη· ρήμα παθητικής διάθεσης → παθητική σύνταξη.',\n    '<b>Ενεργητική σύνταξη<\u002Fb>: Υποκείμενο + Ρήμα ενεργ. διάθεσης + Αντικείμενο. <i>Ο δικαστής αθώωσε τον κατηγορούμενο.<\u002Fi>',\n    '<b>Παθητική σύνταξη<\u002Fb>: Υποκείμενο + Ρήμα παθ. διάθεσης + (Ποιητικό αίτιο). <i>Ο κατηγορούμενος αθωώθηκε από τον δικαστή.<\u002Fi>',\n    '<b>Προσοχή<\u002Fb>: φωνή ≠ διάθεση. <i>Τα παγάκια έλιωσαν<\u002Fi> (ενεργ. φωνή, παθ. διάθεση) · <i>η μάνα περιποιείται τον γιο<\u002Fi> (παθ. φωνή, ενεργ. διάθεση).'\n  ]},\n  2:{title:'Το ποιητικό αίτιο',points:[\n    'Το <b>ποιητικό αίτιο<\u002Fb> δηλώνει τον δράστη στην παθητική σύνταξη.',\n    'Μορφές: <b>από<\u002Fb> + αιτιατική (<i>χτίστηκε από τον οικοδόμο<\u002Fi>), <b>με<\u002Fb> + αιτιατική (<i>δροσισμένο με τη βροχή<\u002Fi>), <b>σε<\u002Fb> + αιτιατική με ρημ. επίθετο -τός (<i>σεβαστός σε όλους<\u002Fi>).',\n    'Δεν είναι κάθε «από + αιτ.» ποιητικό αίτιο: μπορεί να δηλώνει τόπο, χρόνο, ύλη ή αιτία.',\n    'Παράλειψη ποιητικού αιτίου: αυτονόητο (<i>Συνελήφθησαν τρεις ύποπτοι<\u002Fi>) ή σκόπιμη απόκρυψη.'\n  ]},\n  3:{title:'Μετατροπή σύνταξης — Μονόπτωτα',points:[\n    'Ε→Π: Αντικείμενο (αιτ.) → Υποκείμενο (ονομ.) · Ρήμα ενεργ. φωνής → Ρήμα παθ. φωνής (<b>ίδιος χρόνος<\u002Fb>) · Υποκείμενο → Ποιητικό αίτιο.',\n    '<i>Ο ήλιος ζεσταίνει τη γη.<\u002Fi> → <i>Η γη ζεσταίνεται από τον ήλιο.<\u002Fi>',\n    'Π→Ε: Ποιητικό αίτιο → Υποκείμενο · Ρήμα παθ. → Ρήμα ενεργ. (ίδιος χρόνος) · Υποκείμενο → Αντικείμενο.',\n    'Ο ρηματικός χρόνος παραμένει πάντα ο ίδιος.'\n  ]},\n  4:{title:'Δύσκολα σημεία',points:[\n    'Τήρηση χρόνου: παρατατικός ενεργ. → παρατατικός παθ.',\n    'Αρχαιοπρεπείς αόριστοι: πλήττω → επλήγη(σαν), καταρρίπτω → κατερρίφθη(σαν), καθιστώ → κατέστη.',\n    'Χωρίο με πολλές προτάσεις: κάθε ρήμα μετατρέπεται ξεχωριστά.',\n    'Π→Ε χωρίς ποιητικό αίτιο: χρησιμοποιούμε αόριστο υποκείμενο (κάποιοι, εμείς).'\n  ]},\n  5:{title:'Μετατροπές ΙΙ — Δίπτωτα ρήματα',points:[\n    'Δίπτωτα (2 αντικ.): Υποκ. → Ποιητ. αίτιο · <b>Άμεσο<\u002Fb> αντικ. → Υποκείμενο · Έμμεσο παραμένει.',\n    '<i>Ο διευθυντής έδωσε τον έπαινο στον Γιώργο.<\u002Fi> → <i>Ο έπαινος δόθηκε στον Γιώργο από τον διευθυντή.<\u002Fi>',\n    'Ρήματα με 2 δυνατές μετατροπές (στερώ, διδάσκω, πληρώνω, χρεώνω).',\n    'Κατηγορούμενο αντικειμένου → κατηγορούμενο υποκειμένου. <i>Εκλέγουν τον Παύλο πρόεδρο.<\u002Fi> → <i>Ο Παύλος εκλέγεται πρόεδρος.<\u002Fi>'\n  ]},\n  6:{title:'Αναφορικές προτάσεις',points:[\n    'Αντικαθιστούμε το «που» με ο οποίος / η οποία / το οποίο (γένος-αριθμός-πτώση).',\n    'Αν ήταν υποκείμενο → γίνεται ποιητικό αίτιο (από + αιτ.).',\n    'Αν ήταν αντικείμενο → γίνεται υποκείμενο (ονομ.).',\n    'Η μετατροπή εφαρμόζεται μέσα στην αναφορική πρόταση.'\n  ]},\n  7:{title:'Αποθετικά ρήματα',points:[\n    'Αποθετικά: παθητικές καταλήξεις (-μαι) αλλά ενεργητική διάθεση (σέβομαι, εκμεταλλεύομαι, χειρίζομαι).',\n    '3 τρόποι μετατροπής: (α) ρηματικό επίθετο -τός + είμαι/γίνομαι, (β) συνώνυμο παθ. ρήμα, (γ) περίφραση.',\n    'Ποιητικό αίτιο με <b>από<\u002Fb> ή <b>σε<\u002Fb> + αιτιατική.'\n  ]}\n};\n\nfunction shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}\nfunction norm(s){return String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g,'');}\n\nconst catsByKey = {};\nQUESTIONS.forEach(q=>{ if(!q.catKey)return; (catsByKey[q.catKey]=catsByKey[q.catKey]||[]).push(q); });\nconst catOrder = Object.keys(catsByKey).sort((a,b)=>{const [a1,a2]=a.split('.').map(Number);const [b1,b2]=b.split('.').map(Number);return a1!==b1?a1-b1:a2-b2;});\n\nfunction checkAnswer(q, ans){\n  if(q.type==='MC'||q.type==='YN'){ return q.correct.toUpperCase() === String(ans||'').toUpperCase(); }\n  if(q.type==='GAP'){\n    const corrects = q.correct.split('|').map(s=>s.trim()).filter(Boolean);\n    if(Array.isArray(ans)){\n      if(ans.length!==corrects.length) return false;\n      return ans.every((a,i)=>{const n=norm(a);if(!n)return false;const alts=corrects[i].split('/').map(x=>norm(x));return alts.some(x=>x===n||x.includes(n)||n.includes(x));});\n    }\n    const n=norm(ans); if(!n)return false;\n    return corrects.some(a=>{const x=norm(a);return x===n||x.includes(n)||n.includes(x);});\n  }\n  if(q.type==='CLK'){\n    const t = q.targets.map(x=>x.trim().toLowerCase());\n    const s = (ans||[]).map(x=>String(x).trim().toLowerCase());\n    return t.every(x=>s.includes(x)) && s.length===t.length;\n  }\n  if(q.type==='DD'){\n    const cp = parseCorrectDD(q);\n    if(!cp) return false;\n    for(const [li,ri] of Object.entries(ans||{})){ if(cp[parseInt(li)] !== parseInt(ri)) return false; }\n    return Object.keys(ans||{}).length === q.rightItems.length;\n  }\n  return false;\n}\n\nfunction parseCorrectDD(q){\n  const res={}; const pairs=(q.correct||'').split('|').map(s=>s.trim()).filter(Boolean);\n  for(const p of pairs){\n    const m = p.match(/Αριστερά\\s*(\\d+)\\s*→\\s*Δεξιά\\s*(\\d+)/);\n    if(m) res[parseInt(m[1])-1] = parseInt(m[2])-1;\n  }\n  return Object.keys(res).length ? res : null;\n}\n\nfunction getFeedback(q, ans){\n  if(q.type==='MC'){const map={'Α':0,'Β':1,'Γ':2,'Δ':3};const i=map[String(ans||'').toUpperCase()]??0;return q.fb[i]||q.fb.find(f=>f)||null;}\n  return q.fb[0] || q.fb.find(f=>f) || null;\n}\n\nfunction qTypeLabel(t){return t==='CLK'?'Εντοπισμός':t==='DD'?'Αντιστοίχιση':t==='GAP'?'Συμπλήρωση κενού':t==='YN'?'Ναι / Όχι':'Πολλαπλή επιλογή';}\n\nclass Component extends DCLogic {\n  state = { tick: 0 };\n  componentDidMount(){\n    this.screen = 'home';\n    this.adp = null;\n    this.sel = null;\n    this.mount();\n  }\n  refresh(){ this.setState({tick: this.state.tick+1}); }\n  componentDidUpdate(){ this.mount(); }\n  mount(){\n    const app = document.getElementById('app');\n    if (!app) { requestAnimationFrame(()=>this.mount()); return; }\n    // Preserve focused input's identity + caret across re-render.\n    const active = document.activeElement;\n    let saved = null;\n    if (active && (active.tagName==='INPUT'||active.tagName==='TEXTAREA') && app.contains(active)){\n      const inputs = Array.from(app.querySelectorAll('input,textarea'));\n      const idx = inputs.indexOf(active);\n      saved = { idx, ss: active.selectionStart, se: active.selectionEnd, val: active.value };\n    }\n    this.renderScreen(app);\n    this.wireZones();\n    // Auto-fit primary card content to ~4/5 of the card area\n    requestAnimationFrame(()=>{\n      const target = app.querySelector('[data-fit=\"1\"]');\n      if (target && this._fitCard) this._fitCard(target);\n    });\n    if (saved){\n      const inputs = Array.from(app.querySelectorAll('input,textarea'));\n      const target = inputs[saved.idx];\n      if (target){\n        try { target.focus({preventScroll:true}); } catch(e){ target.focus(); }\n        try { target.setSelectionRange(saved.ss, saved.se); } catch(e){}\n      }\n    }\n  }\n  wireZones(){\n    const zl = document.getElementById('zoneLeft');\n    const zr = document.getElementById('zoneRight');\n    if (!zl || !zr) return;\n    zl.onclick = ()=>this.onNav('left');\n    zr.onclick = ()=>this.onNav('right');\n    zl.disabled = !this.canNav('left');\n    zr.disabled = !this.canNav('right');\n    const shouldPulse = (this.screen==='adp' && this.adp && this.adp.answered) || (this.screen==='sel' && this.sel && this.sel.answered);\n    zr.classList.toggle('pulse', !!shouldPulse);\n    // Keyboard arrows\n    if (!this._kbBound){\n      this._kbBound = true;\n      document.addEventListener('keydown', e=>{\n        if (e.target && (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')) return;\n        if (e.key==='ArrowLeft') this.onNav('left');\n        else if (e.key==='ArrowRight') this.onNav('right');\n      });\n    }\n  }\n  canNav(dir){\n    if (this.showTheory) return dir==='left';\n    if (this.screen==='home') return false;\n    if (dir==='left'){\n      if (this.screen==='adp') return this.adp && this.adp.qIdx > 0 && this.adp.results.length > 0;\n      if (this.screen==='sel') return this.sel && this.sel.qIdx > 0 && this.sel.results.length > 0;\n      return true;\n    }\n    // right\n    if (this.screen==='adp'){\n      if (this.adp && this.adp.penalty && this.adp.penalty.step === -1) return true;\n      return !!(this.adp && this.adp.answered);\n    }\n    if (this.screen==='sel') return !!(this.sel && this.sel.answered);\n    if (this.screen==='adp_cat_transition') return true;\n    return false;\n  }\n  onNav(dir){\n    if (this.showTheory && dir==='left'){ this.showTheory = null; this.refresh(); return; }\n    if (this.screen==='home') return;\n    if (dir==='left'){\n      // Back navigation per-screen\n      if (this.screen==='adp_start'||this.screen==='sel_setup') return this.go('home');\n      if (this.screen==='adp'){\n        // Previous question in queue if possible\n        const a = this.adp;\n        if (a.qIdx > 0){\n          if (a.penalty){ a.penalty = null; a.queue[a.qIdx] = a.queue[a.qIdx]; }\n          a.qIdx--;\n          a.answer=null;a.answered=false;a.ddPairs={};a.clkSel=[];\n          a.results = a.results.slice(0, a.qIdx);\n          this._animDir = 'L'; this.refresh();\n        } else this.go('adp_start');\n        return;\n      }\n      if (this.screen==='sel'){\n        const s = this.sel;\n        if (s.qIdx > 0){\n          s.qIdx--;\n          s.answer=null;s.answered=false;s.ddPairs={};s.clkSel=[];\n          if (s.results.length > s.qIdx){\n            if (s.results[s.qIdx]) s.correct = Math.max(0, s.correct-1);\n            s.results = s.results.slice(0, s.qIdx);\n          }\n          this._animDir = 'L'; this.refresh();\n        } else this.go('sel_setup');\n        return;\n      }\n      if (this.screen==='adp_cat_transition'){ this.go('adp_start'); return; }\n      if (this.screen==='adp_results'){ this.go('adp_start'); return; }\n      if (this.screen==='sel_results'){ this.go('sel_setup'); return; }\n      return;\n    }\n    // right — advances only when answered\n    if (this.screen==='adp'){\n      if (this.adp.penalty && this.adp.penalty.step === -1){\n        // theory → similar exercise\n        this.adp.queue[this.adp.qIdx] = this.adp.penalty.extraQ;\n        this.adp.penalty.step = 0;\n        this.adp.answer=null; this.adp.answered=false; this.adp.ddPairs={}; this.adp.clkSel=[];\n        this._animDir='R'; this.refresh();\n        return;\n      }\n      if (this.adp.answered){ this._animDir='R'; this.adpNext(); }\n      return;\n    }\n    if (this.screen==='sel'){\n      if (this.sel.answered){ this._animDir='R'; this.selNext(); }\n      return;\n    }\n    if (this.screen==='adp_cat_transition'){ this._animDir='R'; this.startCatMain(); return; }\n  }\n\n  go(screen){ this.screen = screen; this.refresh(); }\n\n  // ══ Adaptive (Βήμα-Βήμα) ══\n  startAdp(catIdx){\n    this.adp = { catIdx: catIdx||0, catLog:{}, penalty:null };\n    this.startCatMain();\n  }\n  startCatMain(){\n    const a = this.adp; const key = catOrder[a.catIdx];\n    const pool = catsByKey[key] || [];\n    const byDiff = {};\n    pool.forEach(q=>{ (byDiff[q.diff]=byDiff[q.diff]||[]).push(q); });\n    const diffs = Object.keys(byDiff).map(Number).sort((x,y)=>x-y);\n    a.queue = diffs.map(d => shuffle(byDiff[d])[0]).filter(Boolean);\n    a.qIdx=0; a.answer=null; a.answered=false; a.ddPairs={}; a.clkSel=[]; a.results=[];\n    a.penalty = null;\n    this.go('adp');\n  }\n  adpNext(){\n    const a = this.adp; const q = a.queue[a.qIdx];\n    const ok = checkAnswer(q, this.getAdpAnswer());\n    if (a.penalty){\n      if (a.penalty.step === 0){\n        a.penalty.step = 1;\n        a.penalty.wrongInside = a.penalty.wrongInside || !ok;\n        // now redo the original question\n        a.queue[a.qIdx] = a.penalty.origQ;\n        a.answer=null;a.answered=false;a.ddPairs={};a.clkSel=[];\n        this.refresh(); return;\n      } else {\n        // done penalty\n        if (!ok) a.penalty.wrongInside = true;\n        // Reset penalty\n        a.penalty = null;\n        a.results[a.qIdx] = ok;\n        a.qIdx++;\n      }\n    } else if (!ok){\n      // Enter penalty: first show theory card, then similar Q, then original\n      const key = catOrder[a.catIdx];\n      const used = new Set(a.queue.map(x=>x.id));\n      const same = (catsByKey[key]||[]).filter(x=>x.diff===q.diff && !used.has(x.id));\n      const extra = same.length ? shuffle(same)[0] : null;\n      if (extra){\n        a.penalty = { origQ: q, extraQ: extra, step: -1, wrongInside: false };\n        this.refresh(); return;\n      } else {\n        a.results[a.qIdx] = false;\n        a.qIdx++;\n      }\n    } else {\n      a.results[a.qIdx] = true;\n      a.qIdx++;\n    }\n    // Done with this category?\n    if (a.qIdx >= a.queue.length){\n      a.catLog[catOrder[a.catIdx]] = 'pass';\n      if (a.catIdx < catOrder.length - 1){ a.catIdx++; this.go('adp_cat_transition'); }\n      else this.go('adp_results');\n      return;\n    }\n    a.answer=null;a.answered=false;a.ddPairs={};a.clkSel=[];\n    this.refresh();\n  }\n  getAdpAnswer(){\n    const a = this.adp; const q = a.queue[a.qIdx];\n    if(q.type==='MC'||q.type==='YN') return a.answer;\n    if(q.type==='GAP') return a.answer;\n    if(q.type==='DD') return a.ddPairs;\n    if(q.type==='CLK') return a.clkSel;\n  }\n  canCheckAdp(){\n    const a = this.adp; if (a.answered) return false;\n    const q = a.queue[a.qIdx];\n    if(q.type==='MC'||q.type==='YN') return a.answer!==null;\n    if(q.type==='CLK') return a.clkSel.length>0;\n    if(q.type==='DD') return Object.keys(a.ddPairs).length === q.rightItems.length;\n    if(q.type==='GAP'){ if(Array.isArray(a.answer)) return a.answer.every(x=>x&&x.trim()); return !!(a.answer&&a.answer.trim()); }\n    return false;\n  }\n  adpCheck(){\n    if (!this.canCheckAdp()) return;\n    this.adp.answered = true;\n    this.refresh();\n    // Auto-advance if this is the last question of the category (and no penalty pending)\n    const a = this.adp;\n    const isLast = a.qIdx === a.queue.length - 1 && !a.penalty;\n    // If answer will be correct (no penalty triggered), auto-move to transition/results after 2s\n    const ok = checkAnswer(a.queue[a.qIdx], this.getAdpAnswer());\n    if (isLast && ok){\n      if (this._autoAdv) clearTimeout(this._autoAdv);\n      this._autoAdv = setTimeout(()=>{\n        this._autoAdv = null;\n        if (this.screen==='adp' && this.adp && this.adp.answered){ this._animDir='R'; this.adpNext(); }\n      }, 900);\n    }\n  }\n  scheduleAutoCheck(mode){\n    const a = mode==='adp' ? this.adp : this.sel;\n    if (!a || a.answered) return;\n    if (this._autoTimer) clearTimeout(this._autoTimer);\n    const check = mode==='adp' ? this.canCheckAdp() : this.canCheckSel();\n    if (!check) return;\n    a.pendingCheck = true;\n    this.refresh();\n    this._autoTimer = setTimeout(()=>{\n      this._autoTimer = null;\n      const cur = mode==='adp' ? this.adp : this.sel;\n      if (cur) cur.pendingCheck = false;\n      if (mode==='adp'){ if (!this.adp.answered && this.canCheckAdp()) this.adpCheck(); }\n      else { if (!this.sel.answered && this.canCheckSel()) this.selCheck(); }\n    }, 400);\n  }\n\n  // ══ Sel (Εξάσκηση) ══\n  initSel(){\n    if(!this.sel) this.sel = { filterCats:[], filterTypes:[], filterCount:10 };\n  }\n  getSelPool(){\n    const s=this.sel;\n    return QUESTIONS.filter(q=>{\n      if(s.filterTypes.length && !s.filterTypes.includes(q.type)) return false;\n      if(s.filterCats.length){\n        const ok = s.filterCats.some(fc=>/^\\d+$/.test(fc) ? q.catKey.startsWith(fc+'.') : q.catKey===fc);\n        if(!ok) return false;\n      }\n      return true;\n    });\n  }\n  toggleSelCat(v){ this.toggleFilter('filterCats', v); }\n  toggleSelType(v){ this.toggleFilter('filterTypes', v); }\n  toggleFilter(k,v){\n    const s=this.sel;\n    if (v==='all'){ s[k]=[]; } else {\n      const i = s[k].indexOf(v);\n      if(i>=0) s[k].splice(i,1); else s[k].push(v);\n    }\n    this.refresh();\n  }\n  startSel(){\n    const pool = this.getSelPool();\n    const n = this.sel.filterCount===0 ? pool.length : Math.min(this.sel.filterCount, pool.length);\n    this.sel.queue = shuffle(pool).slice(0, n);\n    this.sel.qIdx = 0; this.sel.answer=null; this.sel.answered=false;\n    this.sel.ddPairs={}; this.sel.clkSel=[]; this.sel.correct=0; this.sel.results=[];\n    this.go('sel');\n  }\n  canCheckSel(){\n    const s=this.sel; if(s.answered) return false;\n    const q=s.queue[s.qIdx];\n    if(q.type==='MC'||q.type==='YN') return s.answer!==null;\n    if(q.type==='CLK') return s.clkSel.length>0;\n    if(q.type==='DD') return Object.keys(s.ddPairs).length===q.rightItems.length;\n    if(q.type==='GAP'){ if(Array.isArray(s.answer)) return s.answer.every(x=>x&&x.trim()); return !!(s.answer&&s.answer.trim()); }\n    return false;\n  }\n  getSelAnswer(){\n    const s=this.sel; const q=s.queue[s.qIdx];\n    if(q.type==='MC'||q.type==='YN') return s.answer;\n    if(q.type==='GAP') return s.answer;\n    if(q.type==='DD') return s.ddPairs;\n    if(q.type==='CLK') return s.clkSel;\n  }\n  selCheck(){\n    if(!this.canCheckSel()) return;\n    const s=this.sel; const q=s.queue[s.qIdx];\n    const ok = checkAnswer(q, this.getSelAnswer());\n    s.answered = true;\n    if(ok) s.correct++;\n    s.results.push(ok);\n    this.refresh();\n    if (this._autoAdv) clearTimeout(this._autoAdv);\n    this._autoAdv = setTimeout(()=>{\n      this._autoAdv = null;\n      if (this.screen==='sel' && this.sel && this.sel.answered){ this._animDir='R'; this.selNext(); }\n    }, ok ? 900 : 2500);\n  }\n  selNext(){\n    const s=this.sel; s.qIdx++;\n    if(s.qIdx >= s.queue.length){ this.go('sel_results'); return; }\n    s.answer=null;s.answered=false;s.ddPairs={};s.clkSel=[];\n    this.refresh();\n  }\n\n  // ══════ RENDER ══════\n  renderScreen(app){\n    const H = document.createElement('div');\n    switch(this.screen){\n      case 'home': this.renderHome(H); break;\n      case 'adp_start': this.renderAdpStart(H); break;\n      case 'adp': this.renderAdp(H); break;\n      case 'adp_cat_transition': this.renderAdpTransition(H); break;\n      case 'adp_results': this.renderAdpResults(H); break;\n      case 'sel_setup': this.renderSelSetup(H); break;\n      case 'sel': this.renderSel(H); break;\n      case 'sel_results': this.renderSelResults(H); break;\n    }\n    if (this.showTheory){ this.renderTheoryOverlay(H); }\n    // Wrap everything in a single fit shell so it scales together and never overflows\n    const shell = document.createElement('div');\n    shell.dataset.fit = '1';\n    shell.style.cssText = 'display:flex;flex-direction:column;gap:8px';\n    shell.append(...H.children);\n    app.replaceChildren(shell);\n    // animate\n    app.classList.remove('slideL','slideR','fadeIn');\n    void app.offsetWidth;\n    if (this._animDir==='R') app.classList.add('slideR');\n    else if (this._animDir==='L') app.classList.add('slideL');\n    else app.classList.add('fadeIn');\n    this._animDir = null;\n    app.scrollTop = 0;\n  }\n\n  renderHome(H){\n    const totalQ = QUESTIONS.length;\n    const cats = catOrder.length;\n    H.innerHTML = `\n      <div class=\"card home-shell\">\n        <div class=\"eyebrow\">Επίλεξε τρόπο εξάσκησης<\u002Fdiv>\n        <div class=\"title\">Ενεργητική & Παθητική<\u002Fdiv>\n        <div class=\"sub\">72 ασκήσεις σε 6 θεματικές κατηγορίες. Επίλεξε δομημένη μάθηση ή ελεύθερη εξάσκηση.<\u002Fdiv>\n        <div class=\"home-cards\">\n          <button class=\"home-card\" data-a=\"adp\">\n            <div class=\"hc-icon\">Β<\u002Fdiv>\n            <div class=\"hc-title\">Βήμα-Βήμα<\u002Fdiv>\n            <div class=\"hc-desc\">Δομημένη πορεία σε ${cats} κατηγορίες, από την αναγνώριση έως τις πιο σύνθετες μετατροπές. Άμεση διόρθωση σε κάθε λάθος.<\u002Fdiv>\n            <div class=\"hc-arrow\">${cats} κατηγορίες →<\u002Fdiv>\n          <\u002Fbutton>\n          <button class=\"home-card\" data-a=\"sel\">\n            <div class=\"hc-icon\">Ε<\u002Fdiv>\n            <div class=\"hc-title\">Εξάσκηση<\u002Fdiv>\n            <div class=\"hc-desc\">Γρήγορη εξάσκηση με φίλτρα κατηγορίας, τύπου και πλήθους ερωτήσεων. Αποτίμηση στο τέλος.<\u002Fdiv>\n            <div class=\"hc-arrow\">${totalQ} ερωτήσεις →<\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n    H.querySelector('[data-a=\"adp\"]').onclick = ()=>this.go('adp_start');\n    H.querySelector('[data-a=\"sel\"]').onclick = ()=>{ this.initSel(); this.go('sel_setup'); };\n  }\n\n  renderAdpStart(H){\n    let steps = '';\n    catOrder.forEach((k,i)=>{\n      steps += `<button class=\"step-btn\" data-i=\"${i}\"><div class=\"n\">${i+1}<\u002Fdiv><div class=\"name\">${CAT_NAMES[k]||k}<\u002Fdiv><div class=\"cnt\">${(catsByKey[k]||[]).length} ασκ.<\u002Fdiv><\u002Fbutton>`;\n    });\n    H.innerHTML = `\n      <div class=\"card\">\n        <div class=\"qhead\" style=\"margin-bottom:18px\">\n          <h2>Βήμα-Βήμα<\u002Fh2>\n          <div class=\"qhead-sub\">Επίλεξε από πού θέλεις να ξεκινήσεις<\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"big-btn\" id=\"bStart\">▶ Από την αρχή<\u002Fbutton>\n        <div style=\"font-family:'Alegreya Sans',sans-serif;font-size:.76rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);margin:6px 0 10px\">Ή επίλεξε συγκεκριμένο βήμα<\u002Fdiv>\n        ${steps}\n        <button class=\"btn sec\" id=\"bBack\">← Πίσω<\u002Fbutton>\n      <\u002Fdiv>`;\n    H.querySelector('#bStart').onclick = ()=>this.startAdp(0);\n    H.querySelector('#bBack').onclick = ()=>this.go('home');\n    H.querySelectorAll('[data-i]').forEach(b => b.onclick = ()=>this.startAdp(parseInt(b.dataset.i)));\n  }\n\n  renderQuizHeader(H, mode){\n    const a = mode==='adp' ? this.adp : this.sel;\n    const total = a.queue.length;\n    const catKey = mode==='adp' ? catOrder[a.catIdx] : (a.queue[a.qIdx].catKey);\n    const stepLabel = mode==='adp'\n      ? `Βήμα ${a.catIdx+1} · ${CAT_NAMES[catKey]||catKey}`\n      : `${CAT_NAMES[catKey]||catKey}`;\n    let stepDotsHtml = '';\n    if (mode==='adp'){\n      stepDotsHtml = '<div class=\"step-dots\">';\n      catOrder.forEach((k,i)=>{\n        const done = i < a.catIdx || a.catLog[k]==='pass';\n        const cur = i === a.catIdx;\n        const cls = done ? 'step-dot done' : cur ? 'step-dot cur' : 'step-dot';\n        stepDotsHtml += `<div class=\"${cls}\">${done?'✓':i+1}<\u002Fdiv>`;\n      });\n      stepDotsHtml += '<\u002Fdiv>';\n    }\n    let qDots = '<div class=\"q-dots\">';\n    for (let i=0;i<total;i++){\n      let cls='qd';\n      if (mode==='adp'){\n        if (i<a.results.length){ cls += a.results[i]?' ok':' ko'; }\n        else if (i===a.qIdx) cls += ' cur';\n      } else {\n        if (i<a.results.length){ cls += a.results[i]?' ok':' ko'; }\n        else if (i===a.qIdx) cls += ' cur';\n      }\n      qDots += `<div class=\"${cls}\"><\u002Fdiv>`;\n    }\n    qDots += `<span style=\"color:rgba(255,255,255,.85);font-family:'Alegreya Sans',sans-serif;font-size:.78rem;font-weight:600;margin-left:8px\">${a.qIdx+1}/${total}<\u002Fspan><\u002Fdiv>`;\n    const header = document.createElement('div');\n    header.className = 'qhead';\n    header.innerHTML = `\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px;flex-wrap:wrap\">\n        <div>\n          <h2>${mode==='adp' ? 'Βήμα-Βήμα' : 'Εξάσκηση'}<\u002Fh2>\n          <div class=\"qhead-sub\">${stepLabel}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:6px\">\n          <button class=\"hbtn\" data-nav=\"home\">🏠 Αρχική<\u002Fbutton>\n          <button class=\"hbtn\" data-nav=\"restart\">⏮ Έναρξη<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap\">\n        ${stepDotsHtml} ${qDots}\n      <\u002Fdiv>`;\n    header.querySelector('[data-nav=\"home\"]').onclick = ()=>this.go('home');\n    header.querySelector('[data-nav=\"restart\"]').onclick = ()=> mode==='adp' ? this.go('adp_start') : this.go('sel_setup');\n    H.appendChild(header);\n  }\n\n  renderAdp(H){\n    this.renderQuizHeader(H, 'adp');\n    const a = this.adp; const q = a.queue[a.qIdx];\n    // Theory-first phase after wrong answer\n    if (a.penalty && a.penalty.step === -1){\n      const tKey = (a.penalty.origQ && a.penalty.origQ.theory) || null;\n      const t = tKey ? THEORY[tKey] : null;\n      const wrap = document.createElement('div');\n      wrap.className = 'qcard th-card';\n      wrap.innerHTML = `\n        <div class=\"q-lbl th-lbl\" style=\"color:var(--ko)\">Λάθος — Ας δούμε τη θεωρία<\u002Fdiv>\n        <div class=\"q-txt th-title\" style=\"font-family:'GFS Didot',serif;color:var(--ink);margin-bottom:10px\">${t ? t.title : 'Σχετική θεωρία'}<\u002Fdiv>\n        <ul class=\"th-list th-body\">${t ? t.points.map(p=>'<li>'+p+'<\u002Fli>').join('') : '<li>Ξαναδιάβασε προσεκτικά την άσκηση.<\u002Fli>'}<\u002Ful>\n        <div class=\"th-hint\" style=\"margin-top:10px;font-family:'Alegreya Sans',sans-serif;color:var(--gold-deep);font-style:italic\">Πάτησε το δεξί βέλος → για μια παρόμοια άσκηση.<\u002Fdiv>`;\n      H.appendChild(wrap);\n      return;\n    }\n    // Penalty banner\n    if (a.penalty){\n      const banner = document.createElement('div');\n      banner.className = 'card';\n      banner.style.cssText='background:linear-gradient(150deg,#fbeed1,#f5e2b8);padding:8px 14px;border-top:3px solid var(--gold);margin-bottom:10px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap';\n      banner.innerHTML = a.penalty.step===0\n        ? `<span style=\"font-family:'Alegreya Sans',sans-serif;font-weight:700;color:var(--gold-deep);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase\">Επανάληψη<\u002Fspan><span style=\"font-family:'Alegreya Sans',sans-serif;font-size:.96rem;color:var(--ink)\">Μια παρόμοια άσκηση.<\u002Fspan>`\n        : `<span style=\"font-family:'Alegreya Sans',sans-serif;font-weight:700;color:var(--gold-deep);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase\">Επιστροφή στην αρχική άσκηση<\u002Fspan>`;\n      H.appendChild(banner);\n    }\n    this.renderQuestion(H, 'adp', q);\n  }\n\n  renderSel(H){\n    this.renderQuizHeader(H, 'sel');\n    const s = this.sel; const q = s.queue[s.qIdx];\n    const stat = document.createElement('div');\n    stat.style.cssText='font-family:Alegreya Sans,sans-serif;font-size:.86rem;color:#5f5136;margin-bottom:10px;padding:0 4px';\n    stat.textContent = `Σκορ: ${s.correct} / ${s.results.length}`;\n    H.appendChild(stat);\n    this.renderQuestion(H, 'sel', q);\n  }\n\n  _fitCard(wrap){\n    // Scale card content (via CSS zoom) so it fills ~4/5 of the available card area,\n    // adapting live to viewport size.\n    const app = wrap.closest('#app') || wrap.parentElement;\n    if (!app) return;\n    const run = () => {\n      wrap.style.zoom = 1;\n      const availH = app.clientHeight - 4;\n      const availW = app.clientWidth - 4;\n      if (availH < 60 || availW < 60) return;\n      const natH = wrap.scrollHeight;\n      const natW = wrap.scrollWidth;\n      if (natH < 1) return;\n      const target = availH * 0.95;\n      const scaleH = target / natH;\n      const scaleW = availW / natW;\n      let s = Math.min(scaleH, scaleW);\n      s = Math.max(0.12, Math.min(s, 2.4));\n      wrap.style.zoom = s.toFixed(3);\n      let guard = 20;\n      while (wrap.getBoundingClientRect().height > availH && s > 0.12 && guard-- > 0){\n        s *= 0.92; wrap.style.zoom = s.toFixed(3);\n      }\n    };\n    requestAnimationFrame(()=>{ run(); requestAnimationFrame(run); });\n    if (!this._fitBound){\n      this._fitBound = true;\n      window.addEventListener('resize', () => {\n        const app = document.getElementById('app');\n        if (!app) return;\n        const w = app.querySelector('[data-fit=\"1\"]');\n        if (w) this._fitCard(w);\n      });\n      window.addEventListener('orientationchange', () => {\n        setTimeout(()=>{\n          const app = document.getElementById('app');\n          if (!app) return;\n          const w = app.querySelector('[data-fit=\"1\"]');\n          if (w) this._fitCard(w);\n        }, 150);\n      });\n    }\n  }\n\n  renderQuestion(H, mode, q){\n    const a = mode==='adp' ? this.adp : this.sel;\n    const isDone = a.answered;\n    const ok = isDone ? checkAnswer(q, mode==='adp' ? this.getAdpAnswer() : this.getSelAnswer()) : false;\n\n    // Excerpt handling — GAP with inline gap in excerpt/q, CLK with tokens\n    const gapInQ = q.type==='GAP' && /_{3,}/.test(q.q||'');\n    const gapInExcerpt = q.type==='GAP' && /_{3,}/.test(q.excerpt||'');\n    const showExcerptTop = q.excerpt && q.type !== 'CLK' && !(q.type==='GAP' && gapInExcerpt);\n    if (showExcerptTop) {\n      const div = document.createElement('div');\n      div.innerHTML = `<div class=\"sentence\">${q.excerpt}<\u002Fdiv>`;\n      H.appendChild(div.firstChild);\n    }\n\n    const qcard = document.createElement('div');\n    const inPenalty = mode==='adp' && a.penalty;\n    qcard.className = 'qcard' + (isDone ? (ok?' ok':' ko') : '') + (inPenalty?' penalty':'');\n    const gapInline = gapInQ || gapInExcerpt;\n    // For inline gap: instruction (before «...») shows as plain line above box\n    let qDisplay = q.q;\n    if (gapInQ){\n      const m = (q.q||'').match(/^([^«\"']*[:·])\\s*[«\"'][\\s\\S]*$/);\n      qDisplay = m && m[1].trim() ? m[1].trim() : '';\n    } else if (gapInExcerpt){\n      qDisplay = '';\n    }\n    const hideQ = gapInline && !qDisplay;\n    qcard.innerHTML = `<div class=\"q-lbl\">${qTypeLabel(q.type)}<\u002Fdiv>${hideQ?'':'<div class=\"q-txt\">'+qDisplay+'<\u002Fdiv>'}`;\n\n    if (q.type==='MC' || q.type==='YN') this.renderMC(qcard, mode, q);\n    else if (q.type==='DD') this.renderDD(qcard, mode, q);\n    else if (q.type==='CLK') this.renderCLK(qcard, mode, q);\n    else if (q.type==='GAP') this.renderGAP(qcard, mode, q);\n\n    if (isDone){\n      const fb = document.createElement('div');\n      fb.className = 'fb-box ' + (ok?'ok':'ko');\n      const feedback = getFeedback(q, mode==='adp' ? this.getAdpAnswer() : this.getSelAnswer());\n      fb.innerHTML = `<div class=\"fb-title\">${ok?'✓ Σωστά':'✗ Λάθος'}<\u002Fdiv>${!ok && feedback ? '<div>'+feedback+'<\u002Fdiv>' : ''}`;\n      qcard.appendChild(fb);\n    }\n\n    // Auto-check horizontal progress bar during the check delay (MC/YN/DD only)\n    if (!isDone & Sel.indexOf(w); if(i>=0)a.clkSel.splice(i,1);else a.clkSel.push(w); }\n        this.refresh();\n      };\n      sent.appendChild(sp);\n    });\n    host.appendChild(sent);\n    if (!a.answered){\n      const hint = document.createElement('div');\n      hint.style.cssText='font-family:Alegreya Sans,sans-serif;font-size:.85rem;color:#9a875f;font-style:italic;margin-bottom:12px';\n      hint.textContent = '💡 Πάτησε τις λέξεις που θεωρείς ότι ανήκουν στη σωστή απάντηση.';\n      host.appendChild(hint);\n    }\n  }\n\n  renderGAP(host, mode, q){\n    const a = mode==='adp' ? this.adp : this.sel;\n    const MARK = /__________|_____/;\n    let source = q.excerpt || '';\n    if (!MARK.test(source) && MARK.test(q.q||'')) source = q.q;\n    // Strip leading instruction prefix (\"...: «...»\") so only the quoted sentence shows in the gap box\n    const instrM = source.match(/^[^«\"'\\n]*[:·]\\s*[«\"']([\\s\\S]*?)[»\"']\\s*[.·]?\\s*$/);\n    if (instrM) source = instrM[1];\n    if (!MARK.test(source)){\n      // fallback: standalone input, question text shown separately by parent\n      if (!Array.isArray(a.answer)) a.answer = [''];\n      const corrects = q.correct.split('|').map(s=>s.trim()).filter(Boolean);\n      const val = a.answer[0]||'';\n      const panel = document.createElement('div');\n      panel.className='gap-panel';\n      let cls='gap-inp';\n      if (a.answered){\n        const n=norm(val); const alts=(corrects[0]||'').split('/').map(x=>norm(x));\n        const ok = n && alts.some(x=>x===n||x.includes(n)||n.includes(x));\n        cls += ok?' ok':' ko';\n      }\n      panel.innerHTML = `<div class=\"gap-panel-lbl\">Απάντησε<\u002Fdiv><input class=\"${cls}\" type=\"text\" autocomplete=\"off\" autocorrect=\"off\" autocapitalize=\"off\" spellcheck=\"false\" value=\"${val.replace(/\"/g,'&quot;')}\" ${a.answered?'disabled':''} placeholder=\"Γράψε ολόκληρη λέξη ή φράση…\">`;\n      const inp = panel.querySelector('input');\n      inp.oninput = ()=>{\n        a.answer = [inp.value];\n        const b = host.querySelector('button.btn');\n        if (b) b.disabled = !(inp.value && inp.value.trim());\n      };\n      inp.onkeydown = e=>{ if(e.key==='Enter'){ mode==='adp' ? this.adpCheck() : this.selCheck(); } };\n      host.appendChild(panel);\n      if (a.answered && !checkAnswer(q, a.answer) && corrects[0]){\n        const fix = document.createElement('div');\n        fix.style.cssText='margin-top:8px;font-family:Alegreya Sans,sans-serif;font-size:.9rem;color:var(--ok);font-weight:600';\n        fix.textContent = '✓ ' + corrects[0].split('/')[0];\n        host.appendChild(fix);\n      }\n      return;\n    }\n    // Inline gap\n    let parts = source.split('__________');\n    if (parts.length<2) parts = source.split('_____');\n    const numGaps = parts.length - 1;\n    if (!Array.isArray(a.answer) || a.answer.length !== numGaps) a.answer = new Array(numGaps).fill('');\n    const corrects = q.correct.split('|').map(s=>s.trim()).filter(Boolean);\n\n    const sent = document.createElement('div');\n    sent.className = 'exc-gap';\n    for (let i=0;i<parts.length;i++){\n      const seg = document.createElement('span');\n      seg.innerHTML = parts[i];\n      sent.appendChild(seg);\n      if (i < numGaps){\n        const val = a.answer[i]||'';\n        if (a.answered){\n          const expected = corrects[i]||'';\n          const alts = expected.split('/').map(x=>norm(x));\n          const n = norm(val);\n          const ok = n && alts.some(x=>x===n||x.includes(n)||n.includes(x));\n          const pill = document.createElement('span');\n          pill.className = 'gap-pill ' + (ok?'ok':'ko');\n          pill.textContent = val || '—';\n          sent.appendChild(pill);\n          if (!ok && expected){\n            const fix = document.createElement('span');\n            fix.className='gap-fix';\n            fix.textContent = '✓ ' + expected.split('/')[0];\n            sent.appendChild(fix);\n          }\n        } else {\n          const pill = document.createElement('span');\n          if (val){ pill.className = 'gap-pill'; pill.textContent = val; }\n          else { pill.className = 'gap-pill empty'; pill.textContent = numGaps>1 ? '('+String.fromCharCode(945+i)+')' : '…'; }\n          sent.appendChild(pill);\n        }\n      }\n    }\n    host.appendChild(sent);\n\n    if (!a.answered){\n      for (let i=0;i<numGaps;i++){\n        const panel = document.createElement('div');\n        panel.className='gap-panel'; if(i>0) panel.style.marginTop='8px';\n        panel.innerHTML = `<div class=\"gap-panel-lbl\">${numGaps>1?'Κενό '+String.fromCharCode(945+i):'Απάντησε'}<\u002Fdiv><input class=\"gap-inp\" type=\"text\" autocomplete=\"off\" autocorrect=\"off\" autocapitalize=\"off\" spellcheck=\"false\" value=\"${(a.answer[i]||'').replace(/\"/g,'&quot;')}\" placeholder=\"Γράψε ολόκληρη λέξη ή φράση…\">`;\n        const inp = panel.querySelector('input');\n        inp.oninput = ()=>{\n          a.answer[i] = inp.value;\n          // live-update the inline pill for this gap\n          const pills = host.querySelectorAll('.exc-gap .gap-pill');\n          const pill = pills[i];\n          if (pill){\n            if (inp.value){ pill.className='gap-pill'; pill.textContent = inp.value; }\n            else { pill.className='gap-pill empty'; pill.textContent = pills.length>1 ? '('+String.fromCharCode(945+i)+')' : '…'; }\n          }\n          const b = host.querySelector('button.btn');\n          if (b) b.disabled = !a.answer.every(v=>v&&v.trim());\n        };\n        inp.onkeydown = e=>{ if(e.key==='Enter'){ const filled = a.answer.every(v=>v&&v.trim()); if(filled){ mode==='adp'?this.adpCheck():this.selCheck(); } else { const nxt = host.querySelectorAll('.gap-inp')[i+1]; if(nxt) nxt.focus(); } } };\n        host.appendChild(panel);\n      }\n    }\n  }\n\n  renderDD(host, mode, q){\n    const a = mode==='adp' ? this.adp : this.sel;\n    if (!q._shuffledRight) q._shuffledRight = shuffle(q.rightItems.map((r,i)=>({r,i})));\n    const wrap = document.createElement('div');\n    if (a.answered){\n      const cp = parseCorrectDD(q);\n      const slots = document.createElement('div');\n      slots.className='dd-slots';\n      const isMobile = window.matchMedia('(max-width:520px)').matches;\n      q._shuffledRight.forEach(({r,i})=>{\n        const ub = Object.entries(a.ddPairs).find(([,ri])=>ri===i);\n        const li = ub?parseInt(ub[0]):null;\n        const ok = li!==null && cp && cp[li]===i;\n        // Mobile: for wrong slots, show the CORRECT left item in green (skip user's wrong pick).\n        let shown = li!==null ? q.leftItems[li] : '—';\n        let cls = ok?'ok':'ko';\n        if (!ok && cp){\n          const correctLi = Object.keys(cp).find(k=>cp[k]===i);\n          if (correctLi !== undefined){ shown = q.leftItems[parseInt(correctLi)]; cls = 'ok'; }\n        }\n        const row = document.createElement('div'); row.className='dd-slot-row';\n        row.innerHTML = `<span class=\"dd-slot-lbl\">${r}<\u002Fspan><div class=\"dd-slot ${cls}\">${shown}<\u002Fdiv>`;\n        slots.appendChild(row);\n      });\n      wrap.appendChild(slots);\n      const allOk = q.leftItems.every((_,li)=>cp && a.ddPairs[li]===cp[li]);\n      if (!allOk && cp){\n        const cs = document.createElement('div');\n        cs.className='dd-summary'; cs.style.cssText='margin-top:14px;padding:14px;background:var(--ok-bg);border:1px solid var(--ok-bd);border-radius:12px';\n        cs.innerHTML = `<div style=\"font-family:Alegreya Sans,sans-serif;font-weight:700;color:#2f5222;font-size:.82rem;margin-bottom:8px\">✓ Σωστές αντιστοιχίσεις<\u002Fdiv>`;\n        q.leftItems.forEach((l,li)=>{\n          const ri = cp[li];\n          const row = document.createElement('div');\n          row.style.cssText='display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:6px;font-family:Alegreya Sans,sans-serif;font-size:.9rem;color:#2f5222';\n          row.innerHTML = `<div style=\"padding:6px 10px;background:#fff;border-radius:8px\">${l}<\u002Fdiv><div>→<\u002Fdiv><div style=\"padding:6px 10px;background:#fff;border-radius:8px\">${q.rightItems[ri]||'—'}<\u002Fdiv>`;\n          cs.appendChild(row);\n        });\n        wrap.appendChild(cs);\n      }\n    } else {\n      const hint = document.createElement('div');\n      hint.className='dd-hint';\n      hint.textContent = '💡 Σύρε chip στη σωστή θέση · Κινητό: πάτα chip → πάτα θέση';\n      wrap.appendChild(hint);\n      const chips = document.createElement('div'); chips.className='dd-chips';\n      q.leftItems.forEach((l,li)=>{\n        const used = a.ddPairs[li]!==undefined;\n        const c = document.createElement('div');\n        c.className='dd-chip'+(used?' used':'');\n        c.draggable = !used;\n        c.textContent = l;\n        c.dataset.li = li;\n        if (!used){\n          c.ondragstart = e=>{ this._ddDrag = li; c.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',String(li)); };\n          c.ondragend = ()=>c.classList.remove('dragging');\n          c.onclick = ()=>{\n            if (this._ddChip === li) { this._ddChip = null; chips.querySelectorAll('.dd-chip').forEach(x=>x.classList.remove('dragging')); }\n            else { this._ddChip = li; chips.querySelectorAll('.dd-chip').forEach(x=>x.classList.remove('dragging')); c.classList.add('dragging'); }\n          };\n        }\n        chips.appendChild(c);\n      });\n      wrap.appendChild(chips);\n      const slots = document.createElement('div'); slots.className='dd-slots';\n      q._shuffledRight.forEach(({r,i})=>{\n        const ub = Object.entries(a.ddPairs).find(([,ri])=>ri===i);\n        const isFilled = !!ub;\n        const filled = isFilled ? q.leftItems[parseInt(ub[0])] : '↓ τοποθέτησε εδώ';\n        const row = document.createElement('div'); row.className='dd-slot-row';\n        row.innerHTML = `<span class=\"dd-slot-lbl\">${r}<\u002Fspan><div class=\"dd-slot ${isFilled?'filled':''}\">${filled}<\u002Fdiv>`;\n        const slot = row.querySelector('.dd-slot');\n        slot.ondragover = e=>{ e.preventDefault(); slot.classList.add('over'); };\n        slot.ondragleave = ()=>slot.classList.remove('over');\n        slot.ondrop = e=>{\n          e.preventDefault(); slot.classList.remove('over');\n          if (this._ddDrag===undefined || this._ddDrag===null) return;\n          Object.keys(a.ddPairs).forEach(k=>{ if(a.ddPairs[k]===i) delete a.ddPairs[k]; });\n          a.ddPairs[this._ddDrag] = i; this._ddDrag = null;\n          this.refresh();\n          this.scheduleAutoCheck(mode);\n        };\n        slot.onclick = ()=>{\n          if (this._ddChip !== undefined && this._ddChip !== null){\n            Object.keys(a.ddPairs).forEach(k=>{ if(a.ddPairs[k]===i) delete a.ddPairs[k]; });\n            a.ddPairs[this._ddChip] = i; this._ddChip = null;\n            this.refresh();\n            this.scheduleAutoCheck(mode);\n          } else if (isFilled){\n            delete a.ddPairs[parseInt(ub[0])];\n            this.refresh();\n          }\n        };\n        slots.appendChild(row);\n      });\n      wrap.appendChild(slots);\n    }\n    host.appendChild(wrap);\n  }\n\n  renderAdpTransition(H){\n    const a = this.adp;\n    const prev = catOrder[a.catIdx-1];\n    const next = catOrder[a.catIdx];\n    H.innerHTML = `\n      <div class=\"card\" style=\"text-align:center;padding:34px 22px\">\n        <div style=\"font-family:'GFS Didot',serif;font-size:3rem;color:var(--gold);margin-bottom:10px\">✓<\u002Fdiv>\n        <h2 style=\"font-family:'GFS Didot',serif;font-size:1.5rem;margin-bottom:6px\">Βήμα ${a.catIdx} ολοκληρώθηκε<\u002Fh2>\n        <div style=\"font-family:'Alegreya Sans',sans-serif;color:#5f5136;font-size:.9rem;margin-bottom:4px\">${CAT_NAMES[prev]||prev}<\u002Fdiv>\n        <div style=\"font-family:'Alegreya',serif;color:var(--ink-2);font-size:1rem;margin-bottom:22px\">Συνέχεια στο <b>Βήμα ${a.catIdx+1}: ${CAT_NAMES[next]||next}<\u002Fb><\u002Fdiv>\n        <button class=\"big-btn\" id=\"bNext\">Συνέχεια →<\u002Fbutton>\n        <button class=\"btn sec\" id=\"bHome\">↩ Αρχική<\u002Fbutton>\n      <\u002Fdiv>`;\n    H.querySelector('#bNext').onclick = ()=>this.startCatMain();\n    H.querySelector('#bHome').onclick = ()=>this.go('home');\n  }\n\n  renderAdpResults(H){\n    const a = this.adp;\n    const passed = Object.values(a.catLog).filter(v=>v==='pass').length;\n    const total = catOrder.length;\n    const pct = Math.round((passed/total)*100);\n    let rows = '';\n    catOrder.forEach((k,i)=>{\n      const status = a.catLog[k] || 'incomplete';\n      const cls = status==='pass' ? 'pass' : 'skip';\n      const badge = status==='pass' ? '✓ Επιτυχία' : '· Ημιτελές';\n      rows += `<div class=\"summary-row ${cls}\"><span>Βήμα ${i+1} — ${CAT_NAMES[k]||k}<\u002Fspan><span class=\"bd\">${badge}<\u002Fspan><\u002Fdiv>`;\n    });\n    H.innerHTML = `\n      <div class=\"card\" style=\"text-align:center;padding:32px 22px\">\n        <div style=\"font-family:'GFS Didot',serif;font-size:3rem;color:var(--gold);margin-bottom:6px\">${pct>=80?'★':pct>=60?'✓':'…'}<\u002Fdiv>\n        <h2 style=\"font-family:'GFS Didot',serif;font-size:1.6rem;margin-bottom:14px\">Ολοκλήρωσες το Βήμα-Βήμα<\u002Fh2>\n        <div class=\"score-box\"><div class=\"score-big\">${passed} / ${total}<\u002Fdiv><div class=\"score-sub\">βήματα με επιτυχία (${pct}%)<\u002Fdiv><\u002Fdiv>\n        <div class=\"score-grid\">\n          <div class=\"sc g\"><div class=\"l\">Επιτυχία<\u002Fdiv><div class=\"n\">${passed}<\u002Fdiv><\u002Fdiv>\n          <div class=\"sc r\"><div class=\"l\">Ημιτελή<\u002Fdiv><div class=\"n\">${total-passed}<\u002Fdiv><\u002Fdiv>\n          <div class=\"sc a\"><div class=\"l\">Σύνολο<\u002Fdiv><div class=\"n\">${total}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\"><div style=\"font-family:'Alegreya Sans',sans-serif;font-weight:700;margin-bottom:12px;color:var(--ink-2)\">Ανά βήμα<\u002Fdiv>${rows}<\u002Fdiv>\n      <button class=\"btn\" id=\"bAgain\">🔄 Νέα προσπάθεια<\u002Fbutton>\n      <button class=\"btn sec\" id=\"bHome\">↩ Αρχική<\u002Fbutton>`;\n    H.querySelector('#bAgain').onclick = ()=>this.go('adp_start');\n    H.querySelector('#bHome').onclick = ()=>this.go('home');\n  }\n\n  renderSelSetup(H){\n    const s = this.sel;\n    const pool = this.getSelPool();\n    const actual = s.filterCount===0 ? pool.length : Math.min(s.filterCount, pool.length);\n    const catChips = ['<button class=\"chip '+(s.filterCats.length===0?'active':'')+'\" data-cat=\"all\">Όλες <span class=\"chip-cnt\">('+QUESTIONS.length+')<\u002Fspan><\u002Fbutton>']\n      .concat(catOrder.map(k=>{\n        const active = s.filterCats.includes(k) ? ' active' : '';\n        return `<button class=\"chip${active}\" data-cat=\"${k}\">${CAT_NAMES[k]||k} <span class=\"chip-cnt\">(${(catsByKey[k]||[]).length})<\u002Fspan><\u002Fbutton>`;\n      })).join('');\n    const typeMap = [{v:'all',lbl:'Όλοι'},{v:'YN',lbl:'Ναι/Όχι'},{v:'MC',lbl:'Πολλαπλής'},{v:'DD',lbl:'Αντιστοίχιση'},{v:'GAP',lbl:'Συμπλήρωση'},{v:'CLK',lbl:'Εντοπισμός'}];\n    const typeChips = typeMap.map(({v,lbl})=>{\n      const c = v==='all' ? QUESTIONS.length : QUESTIONS.filter(q=>q.type===v).length;\n      const active = (v==='all' ? s.filterTypes.length===0 : s.filterTypes.includes(v)) ? ' active' : '';\n      return `<button class=\"chip${active}\" data-type=\"${v}\">${lbl} <span class=\"chip-cnt\">(${c})<\u002Fspan><\u002Fbutton>`;\n    }).join('');\n    const cntMap = [{n:10,lbl:'10'},{n:20,lbl:'20'},{n:0,lbl:'Όλες'}];\n    const cntChips = cntMap.map(({n,lbl})=>`<button class=\"chip ${s.filterCount===n?'active':''}\" data-cnt=\"${n}\">${lbl}<\u002Fbutton>`).join('');\n    H.innerHTML = `\n      <div class=\"qhead\" style=\"display:flex;justify-content:space-between;align-items:center\">\n        <div><h2>Εξάσκηση<\u002Fh2><div class=\"qhead-sub\">Επίλεξε φίλτρα και ξεκίνα<\u002Fdiv><\u002Fdiv>\n        <button class=\"hbtn\" id=\"bHome\">🏠 Αρχική<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"setup-sec\"><h3>Κατηγορία<\u002Fh3><div class=\"chips-row\">${catChips}<\u002Fdiv><\u002Fdiv>\n        <div class=\"setup-sec\"><h3>Τύπος ερώτησης<\u002Fh3><div class=\"chips-row\">${typeChips}<\u002Fdiv><\u002Fdiv>\n        <div class=\"setup-sec\"><h3>Αριθμός ερωτήσεων<\u002Fh3><div class=\"chips-row\">${cntChips}<\u002Fdiv><\u002Fdiv>\n        <div class=\"info ${pool.length?'ok':'warn'}\">${pool.length ? 'Βρέθηκαν <b>'+pool.length+'<\u002Fb> ερωτήσεις (θα εμφανιστούν <b>'+actual+'<\u002Fb>).' : '⚠ Δεν βρέθηκαν ερωτήσεις με αυτά τα φίλτρα.'}<\u002Fdiv>\n        <button class=\"btn\" id=\"bStart\" ${pool.length?'':'disabled'}>Ξεκίνα →<\u002Fbutton>\n      <\u002Fdiv>`;\n    H.querySelector('#bHome').onclick=()=>this.go('home');\n    H.querySelector('#bStart').onclick=()=>this.startSel();\n    H.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>this.toggleSelCat(b.dataset.cat));\n    H.querySelectorAll('[data-type]').forEach(b=>b.onclick=()=>this.toggleSelType(b.dataset.type));\n    H.querySelectorAll('[data-cnt]').forEach(b=>b.onclick=()=>{s.filterCount=parseInt(b.dataset.cnt);this.refresh();});\n  }\n\n  renderSelResults(H){\n    const s = this.sel;\n    const total = s.queue.length;\n    const pct = total ? Math.round((s.correct/total)*100) : 0;\n    H.innerHTML = `\n      <div class=\"card\" style=\"text-align:center;padding:32px 22px\">\n        <div style=\"font-family:'GFS Didot',serif;font-size:3rem;color:var(--gold);margin-bottom:6px\">${pct>=80?'★':pct>=60?'✓':'…'}<\u002Fdiv>\n        <h2 style=\"font-family:'GFS Didot',serif;font-size:1.6rem;margin-bottom:14px\">Τέλος εξάσκησης<\u002Fh2>\n        <div class=\"score-box\"><div class=\"score-big\">${s.correct} / ${total}<\u002Fdiv><div class=\"score-sub\">σωστές (${pct}%)<\u002Fdiv><\u002Fdiv>\n        <div class=\"score-grid\">\n          <div class=\"sc g\"><div class=\"l\">Σωστές<\u002Fdiv><div class=\"n\">${s.correct}<\u002Fdiv><\u002Fdiv>\n          <div class=\"sc r\"><div class=\"l\">Λάθος<\u002Fdiv><div class=\"n\">${total - s.correct}<\u002Fdiv><\u002Fdiv>\n          <div class=\"sc a\"><div class=\"l\">Σύνολο<\u002Fdiv><div class=\"n\">${total}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"btn\" id=\"bAgain\">🔄 Νέα εξάσκηση<\u002Fbutton>\n      <button class=\"btn sec\" id=\"bHome\">↩ Αρχική<\u002Fbutton>`;\n    H.querySelector('#bAgain').onclick=()=>this.go('sel_setup');\n    H.querySelector('#bHome').onclick=()=>this.go('home');\n  }\n\n  renderTheoryOverlay(H){\n    const card = THEORY[this.showTheory];\n    if(!card) return;\n    const overlay = document.createElement('div');\n    overlay.className = 'th-overlay';\n    overlay.innerHTML = `\n      <div class=\"th-panel\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px\">\n          <div>\n            <div class=\"eyebrow\">Θεωρία<\u002Fdiv>\n            <div class=\"title\" style=\"font-size:1.4rem\">${card.title}<\u002Fdiv>\n          <\u002Fdiv>\n          <button class=\"th-close\" id=\"bTC\">← Επιστροφή<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"card\">\n          <ul class=\"th-list\">${card.points.map(p=>'<li>'+p+'<\u002Fli>').join('')}<\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n    overlay.querySelector('#bTC').onclick = ()=>{ this.showTheory = null; this.refresh(); };\n    H.appendChild(overlay);\n  }\n}\n\n\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
