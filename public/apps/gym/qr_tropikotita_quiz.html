score small{font-family:\"Alegreya Sans\",sans-serif;font-size:.4em;color:#6a5836;letter-spacing:.06em;font-weight:600}\n  #topbar{position:fixed;top:max(14px,env(safe-area-inset-top));right:max(14px,env(safe-area-inset-right));display:flex;gap:8px;z-index:60}\n  .tb-btn{width:38px;height:38px;border-radius:50%;border:1px solid rgba(24,33,49,.18);background:rgba(255,255,255,.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);color:#182131;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;padding:0;transition:background .18s ease,transform .12s ease,box-shadow .18s ease;box-shadow:0 2px 8px rgba(20,26,38,.12)}\n  .tb-btn:hover{background:rgba(255,255,255,.92);transform:translateY(-1px);box-shadow:0 4px 12px rgba(20,26,38,.18)}\n  .tb-btn:active{transform:translateY(0)}\n  .tb-btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}\n  .tb-btn svg{width:18px;height:18px}\n\n/* ── προσαρμοστική ροή ── */\n.tagrow{display:flex;align-items:center;gap:.6em;margin:-.2em 0 .5em}\n.warnbadge{background:var(--terracotta,#b5563f);color:#fff;border-color:transparent}\n.diffdots{font-size:.62em;letter-spacing:.18em;opacity:.5}\n.nexthint{margin-top:.7em;font-size:.66em;opacity:.72;font-style:italic;text-align:right}\n.thwarn{margin:0 0 .5em;padding:.45em .7em;border-left:3px solid var(--terracotta,#b5563f);\n  background:rgba(181,86,63,.09);font-size:.62em;line-height:1.4;border-radius:0 4px 4px 0}\n.thtable{display:flex;flex-direction:column;gap:.42em;margin-top:.5em}\n.throw{display:grid;grid-template-columns:minmax(6.5em,30%) 1fr;gap:.7em;align-items:start;\n  padding-bottom:.42em;border-bottom:1px solid rgba(0,0,0,.08)}\n.throw:last-child{border-bottom:0}\n.throw .k{font-weight:600;font-size:.94em;opacity:.85}\n.throw .v{font-style:italic;opacity:.92}\n.setup{margin:.6em 0}\n.setup .h{font-size:.66em;opacity:.7;margin-bottom:.35em;letter-spacing:.03em}\n.setup .h small{opacity:.65;font-weight:400}\n.picks{display:flex;flex-wrap:wrap;gap:.4em}\n.picks .opt{flex:0 0 auto;padding:.35em .8em;font-size:.72em}\n.opt.sel{background:var(--ink,#1c1c1c);color:#fff;border-color:transparent}\n\n/* ── φάση ελέγχου ── */\n.checkbar{margin-top:.85em}\n.cb-label{font-size:.58em;letter-spacing:.09em;text-transform:uppercase;opacity:.55;margin-bottom:.4em}\n.cb-track{height:3px;border-radius:2px;background:rgba(0,0,0,.1);overflow:hidden}\n.cb-fill{height:100%;width:0;border-radius:2px;background:currentColor;opacity:.5;\n  transition-property:width;transition-timing-function:linear}\n.card.checking .feedback{display:none}\n.card.checking .mark{visibility:hidden}\n.card.checking .tok.correct,.card.checking .tok.wrong{background:transparent;box-shadow:none;color:inherit}\n.card.checking .opt.correct,.card.checking .opt.wrong{background:transparent;border-color:rgba(0,0,0,.16);color:inherit}\n.card.checking .mitem.correct,.card.checking .mitem.wrong{background:transparent;border-color:rgba(0,0,0,.16);color:inherit}\n.card.checking .gapinput.correct,.card.checking .gapinput.wrong{background:transparent;border-bottom-color:rgba(0,0,0,.28);color:inherit}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n  <div id=\"topbar\" aria-hidden=\"false\">\n    <button id=\"btnHome\" class=\"tb-btn\" aria-label=\"Επιστροφή στην αρχή\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 11.5 12 4l9 7.5\"><\u002Fpath><path d=\"M5 10v9h14v-9\"><\u002Fpath><path d=\"M10 19v-5h4v5\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n    <button id=\"btnClose\" class=\"tb-btn\" aria-label=\"Κλείσιμο\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"5\" x2=\"19\" y2=\"19\"><\u002Fline><line x1=\"19\" y1=\"5\" x2=\"5\" y2=\"19\"><\u002Fline><\u002Fsvg><\u002Fbutton>\n  <\u002Fdiv>\n\n  <div id=\"slot\">\n    <div id=\"cardhost\"><\u002Fdiv>\n    <button class=\"zone left\" id=\"zLeft\" aria-label=\"Προηγούμενο\"><\u002Fbutton>\n    <button class=\"zone center\" id=\"zCenter\" aria-label=\"Αναστροφή\"><\u002Fbutton>\n    <button class=\"zone right\" id=\"zRight\" aria-label=\"Επόμενο\"><\u002Fbutton>\n  <\u002Fdiv>\n\n  <div class=\"navhint\" aria-hidden=\"true\">\n    <span class=\"cue\">‹ προηγούμενη<\u002Fspan><span class=\"sep\"><\u002Fspan><span class=\"cue mid\" id=\"hintMid\">↻ αναστροφή<\u002Fspan><span class=\"sep\"><\u002Fspan><span class=\"cue\">επόμενη ›<\u002Fspan>\n  <\u002Fdiv>\n\n<script>\n/* ══ ΠΗΓΗ ΔΕΔΟΜΕΝΩΝ — Google Sheet (δημοσιευμένο ως CSV) ══\n   Οι ασκήσεις ΔΕΝ είναι πλέον ενσωματωμένες. Φορτώνονται κατά την εκκίνηση\n   από το παρακάτω φύλλο. Αλλαγή τράπεζας ερωτήσεων = αλλαγή μόνο του SHEET_CSV. */\nconst SHEET_CSV = \"https://docs.google.com/spreadsheets/d/e/2PACX-1vRVLnlkI2QSgVGoCj9zWUxXk__nySUJwkRztluKahHwmM_qI3KZS2jWTdJxf7n_Cg/pub?gid=1571144441&single=true&output=csv\";\n\n/* Ετικέτα κάρτας (eyebrow) ανά κωδικό κατηγορίας του φύλλου. */\nconst CAT_LABEL = {\n  \"1.1\":\"Τροπικότητα\", \"1.2\":\"Δείκτες τροπικότητας\",\n  \"2.1\":\"Εγκλίσεις\", \"2.2\":\"Εγκλίσεις\", \"2.3\":\"Υποτακτική\",\n  \"2.4\":\"Προστακτική\", \"2.5\":\"Ορθογραφία προστακτικής\",\n  \"3.1\":\"Σημασίες της οριστικής\", \"3.2\":\"Σημασίες της υποτακτικής\",\n  \"3.3\":\"Σημασίες της προστακτικής\"\n};\n\nlet EX = [];   /* γεμίζει από το CSV στο boot() */\n\n/* ── Παράμετροι URL: #cat=1.1,1.2 · #max=10 · #shuffle=1 ── */\nfunction urlParams(){\n  const out={};\n  const s=(location.hash||'').replace(/^#/,'')+'&'+(location.search||'').replace(/^\\?/,'');\n  s.split('&').forEach(kv=>{\n    const i=kv.indexOf('='); if(i<1) return;\n    try{ out[decodeURIComponent(kv.slice(0,i)).toLowerCase()]=decodeURIComponent(kv.slice(i+1)); }catch(_){}\n  });\n  return out;\n}\n\n/* ── Ελάχιστος parser CSV (RFC 4180: εισαγωγικά, κόμματα & αλλαγές γραμμής εντός πεδίου) ── */\nfunction parseCSV(text){\n  const rows=[]; let row=[], f='', q=false;\n  text=String(text).replace(/^\\uFEFF/,'');\n  for(let i=0;i<text.length;i++){\n    const c=text[i];\n    if(q){\n      if(c==='\"'){ if(text[i+1]==='\"'){ f+='\"'; i++; } else q=false; }\n      else f+=c;\n    }else{\n      if(c==='\"') q=true;\n      else if(c===','){ row.push(f); f=''; }\n      else if(c==='\\n'){ row.push(f); f=''; rows.push(row); row=[]; }\n      else if(c!=='\\r') f+=c;\n    }\n  }\n  if(f!==''||row.length){ row.push(f); rows.push(row); }\n  return rows.filter(r=>r.some(x=>String(x).trim()!==''));\n}\n\n/* ── Βοηθητικά μετασχηματισμού γραμμής → άσκηση ── */\nconst S = v => (v==null?'':String(v)).replace(/\\s+$/,'').replace(/^\\s+/,'');\nconst TRUEY = v => { const s=S(v).toLowerCase();\n  return s===''||s==='true'||s==='ναι'||s==='1'||s==='yes'||s==='x'||s==='αληθές'; };\nconst LETTER = {'Α':0,'Β':1,'Γ':2,'Δ':3,'A':0,'B':1,'C':2,'D':3};\n\n/* Το fb() προσθέτει ήδη «✓ Σωστά.» / «✗ Όχι ακριβώς.» — αφαιρούμε τυχόν διπλό προοίμιο. */\nconst cleanExplain = t => S(t).replace(/^(Όχι\\s+ακριβώς|Σωστά|Λάθος)\\s*[.:·]\\s*/i,'');\n\n/* Κανονικοποίηση κενού GAP: δέχεται «___» αλλά και ενδολεκτικό «κλ__στε». */\nfunction gapify(raw){\n  const t=S(raw);\n  const m=t.match(/([^\\s_]*)(_{2,})([^\\s_]*)/);\n  if(!m) return { sentence:(t?t+' ':'')+'___', hint:null };\n  const pre=m[1], post=m[3], tok=m[0];\n  /* Ενδολεκτικό κενό (π.χ. «κλ__στε»): γράμματα και πριν και μετά. */\n  if(/\\p{L}/u.test(pre) && /\\p{L}/u.test(post))\n    return { sentence:t.replace(tok,'___'),\n             hint:'Ζητούμενος τύπος: «'+tok+'» — γράψε ολόκληρη τη λέξη.' };\n  /* Αλλιώς κενό λέξης· προσθέτουμε διαστήματα, γιατί στο φύλλο συχνά λείπουν. */\n  return { sentence:t.replace(/_{2,}/g,' ___ ').replace(/\\s{2,}/g,' ').trim(), hint:null };\n}\n\n/* Εντοπίζει τον στόχο του CLK μέσα στην πρόταση, ακόμη κι όταν εκτείνεται\n   σε περισσότερες λέξεις («πρέπει να»). Επιστρέφει θέση και μήκος σε λέξεις. */\nfunction clkSpan(sentence, target){\n  const words=String(sentence||'').split(/\\s+/).filter(Boolean);\n  const tgt=norm(target).split(' ').filter(Boolean);\n  if(!tgt.length) return {start:-1,len:0,words:words};\n  for(let i=0;i+tgt.length<=words.length;i++){\n    let hit=true;\n    for(let k=0;k<tgt.length;k++) if(norm(words[i+k])!==tgt[k]){ hit=false; break; }\n    if(hit) return {start:i, len:tgt.length, words:words};\n  }\n  return {start:-1, len:0, words:words};\n}\n\nfunction rowToEx(o){\n  const type=S(o['Τύπος']).toUpperCase();\n  const cat=S(o['Κατηγορία']);\n  const base={ cat:cat,\n               diff: parseInt(S(o['Δυσκολία']),10)||1,\n               theory: parseInt(S(o['Θεωρία']),10)||0,\n               domain: CAT_LABEL[cat] || (cat?('Ενότητα '+cat):'Άσκηση'),\n               prompt: S(o['Κείμενο Ερώτησης']),\n               sentence: S(o['Απόσπασμα']),\n               explain: cleanExplain(o['Διόρθωση 1']) };\n  if(!base.prompt && !base.sentence) return null;\n\n  if(type==='MC'||type==='YN'){\n    const opts=['Επιλογή Α','Επιλογή Β','Επιλογή Γ','Επιλογή Δ'].map(k=>S(o[k])).filter(Boolean);\n    const ans=LETTER[S(o['Σωστή Απάντηση']).charAt(0).toUpperCase()];\n    if(opts.length<2 || ans==null || ans>=opts.length) return null;\n    base.type = (type==='YN'?'yesno':'mc'); base.options=opts; base.answer=ans;\n    return base;\n  }\n  if(type==='CLK'){\n    const w=S(o['Λέξη-Στόχος']);\n    if(!w || !base.sentence) return null;\n    /* Δίχτυ ασφαλείας: αν ο στόχος δεν εντοπίζεται στην πρόταση, η ερώτηση\n       είναι αδύνατο να απαντηθεί — απορρίπτεται με προειδοποίηση. */\n    if(clkSpan(base.sentence, w).start < 0){\n      console.warn('[quiz] CLK '+S(o['ID'])+': ο στόχος «'+w+'» δεν βρέθηκε στο απόσπασμα — παραλείπεται.');\n      return null;\n    }\n    base.type='clk'; base.answerWord=w;\n    base.clkHint='Κάνε κλικ στη λέξη-δείκτη μέσα στην πρόταση.';\n    return base;\n  }\n  if(type==='GAP'){\n    const acc=S(o['Σωστή Απάντηση']).split(/[|\\/]/).map(x=>x.trim()).filter(Boolean);\n    if(!acc.length) return null;\n    const g=gapify(base.sentence);\n    base.type='gap'; base.sentence=g.sentence; base.gapHint=g.hint; base.answers=acc;\n    return base;\n  }\n  if(type==='DD'){\n    const L=[1,2,3,4].map(i=>S(o['Αριστερά '+i]));\n    const R=[1,2,3,4].map(i=>S(o['Δεξιά '+i]));\n    const pairs=[], re=/Αριστερά\\s*(\\d)\\s*(?:→|->|=>|-)\\s*Δεξιά\\s*(\\d)/g;\n    let m; const key=S(o['Σωστή Απάντηση']);\n    while((m=re.exec(key))!==null){\n      const li=+m[1]-1, ri=+m[2]-1;\n      if(L[li]&&R[ri]) pairs.push({text:L[li], cat:R[ri]});\n    }\n    if(pairs.length<2) return null;\n    base.type='match'; base.pairs=pairs;\n    return base;\n  }\n  return null;\n}\n\nasync function loadEX(){\n  const res=await fetch(SHEET_CSV,{cache:'no-store',redirect:'follow'});\n  if(!res.ok) throw new Error('Το φύλλο απάντησε με κωδικό '+res.status+'.');\n  const rows=parseCSV(await res.text());\n  if(rows.length<2) throw new Error('Το φύλλο δεν περιέχει δεδομένα.');\n  const hdr=rows[0].map(h=>S(h));\n  let list=rows.slice(1).map(r=>{ const o={}; hdr.forEach((h,i)=>o[h]=r[i]); return o; })\n                .filter(o=>S(o['ID']) && TRUEY(o['Ενεργό']))\n                .map(rowToEx).filter(Boolean);\n\n  const q=urlParams();\n  const sel=q['cat']||q['set'];\n  if(sel){\n    const wanted=sel.split(/[,;]/).map(x=>x.trim()).filter(Boolean);\n    list=list.filter(e=>wanted.some(w=>e.cat===w||e.cat.indexOf(w+'.')===0||(w.indexOf('.')<0&&e.cat.split('.')[0]===w)));\n  }\n  if(q['shuffle']==='1'||q['shuffle']==='true') shuffle(list);\n  const mx=parseInt(q['max'],10);\n  if(mx>0) list=list.slice(0,mx);\n  return list;\n}\n\n/* ══ ΘΕΩΡΙΑ — μία κάρτα ανά υποβήμα. Τα κλειδιά 1–10 αντιστοιχούν στη\n   στήλη «Θεωρία» του φύλλου. Πηγή περιεχομένου: ΚΕΦΑΛΑΙΟ 5 «Τροπικότητα\n   & Εγκλίσεις». Μπρος όψη: ορισμός + αναγνωριστικά. Πίσω όψη: πίνακας ή\n   παραδείγματα + σημείωση. ══ */\nconst TH = {\n 1:{sub:\"1.1\", cat:\"Βήμα 1 · Η τροπικότητα\", term:\"Τροπικότητα\",\n   def:\"Η στάση του ομιλητή ή συντάκτη απέναντι σε αυτό που ο ίδιος λέει. Προσαρμόζει τη διατύπωση ανάλογα με το αν παρουσιάζει το γεγονός ως <b>βέβαιο, δυνατό, πιθανό, επιθυμητό ή αναγκαίο<\u002Fb>. Διακρίνεται σε δύο κατηγορίες.\",\n   means:\"<b>Επιστημική<\u002Fb> (πόσο βέβαιο είναι;) → δυνατότητα, πιθανότητα, βεβαιότητα.<br><b>Δεοντική<\u002Fb> (πόσο αναγκαίο είναι;) → επιθυμία, ευχή, πρόθεση, παραχώρηση/παράκληση/προτροπή, υποχρέωση.\",\n   rowsTitle:\"Οι δύο κλίμακες\",\n   rowsTitle:\"Επιστημική\",\n   rows:[{k:\"1 · Δυνατότητα\", v:\"Μπορώ να διαβάζω Μαθηματικά όλη την ημέρα.\"},\n         {k:\"2 · Πιθανότητα\", v:\"Σήμερα μάλλον θα διαβάσω Μαθηματικά.\"},\n         {k:\"3 · Βεβαιότητα\", v:\"Κάθε μέρα διαβάζω τουλάχιστον τρεις ώρες.\"}],\n   rowsAsideTitle:\"Δεοντική\",\n   rowsAside:[{k:\"1 · Επιθυμία\", v:\"Θέλω να πάμε σήμερα εκδρομή.\"},\n         {k:\"2 · Ευχή\", v:\"Μακάρι να πάμε σήμερα εκδρομή!\"},\n         {k:\"3 · Πρόθεση\", v:\"Σκοπεύουμε να πάμε σήμερα εκδρομή.\"},\n         {k:\"4 · Παραχώρηση / Παράκληση / Προτροπή\", v:\"Γίνεται να πάμε σήμερα εκδρομή; — Και δεν πάμε; Ας πάμε.\"},\n         {k:\"5 · Υποχρέωση\", v:\"Πρέπει να πάμε σήμερα εκδρομή.\"}],\n   note:\"\"},\n\n 2:{sub:\"1.2\", cat:\"Βήμα 1 · Η τροπικότητα\", term:\"Δείκτες\",\n   def:\"Η τροπικότητα δηλώνεται με συγκεκριμένα <b>γραμματικά και λεξικά μέσα<\u002Fb> — τους δείκτες τροπικότητας. Εντοπίζοντάς τους αναγνωρίζουμε το είδος της.\",\n   means:\"<b>Βοηθητικά μόρια:<\u002Fb> να, ας, θα, μακάρι να, είθε να.<br><b>Ρήματα:<\u002Fb> μπορεί, πρέπει, θέλω, σκοπεύω, ελπίζω, νομίζω, φαίνεται.<br><b>Επιρρήματα / εκφράσεις:<\u002Fb> ίσως, πιθανόν, μάλλον, σίγουρα, βέβαια, πράγματι, αναμφισβήτητα.<br><b>Εγκλίσεις:<\u002Fb> οριστική, υποτακτική, προστακτική.\",\n   rowsTitle:\"Δύο αποσπάσματα\",\n   rows:[{k:\"Δεοντική τροπικότητα\", v:\"Παιδιά, <b>ελάτε<\u002Fb> γρήγορα στην αυλή! <b>Πρέπει να<\u002Fb> φυτέψουμε τα λουλούδια σήμερα. <b>Ας συνεργαστούμε<\u002Fb> όλοι μαζί. <b>Μακάρι να<\u002Fb> πιάσουν ρίζες!\"},\n         {k:\"Επιστημική τροπικότητα\", v:\"Τα σύννεφα είναι <b>πράγματι<\u002Fb> κατάμαυρα. <b>Σίγουρα<\u002Fb> θα βρέξει! <b>Μάλλον<\u002Fb> η καταιγίδα θα είναι δυνατή. <b>Μπορούμε να<\u002Fb> γλιτώσουμε τη βροχή.\"}],\n   note:\"Οι <b>εγκλίσεις<\u002Fb> είναι το ισχυρότερο μέσο τροπικότητας: η προστακτική «ελάτε» (έντονη προτροπή) και η υποτακτική «ας συνεργαστούμε» (παρακίνηση) δηλώνουν δεοντική τροπικότητα.\"},\n\n 3:{sub:\"2.1\", cat:\"Βήμα 2 · Γραμματική\", term:\"Οριστική\",\n   def:\"Η έγκλιση των <b>προτάσεων κρίσης<\u002Fb>. Τη χρησιμοποιούμε όταν θέλουμε να δώσουμε μια πληροφορία ή να δηλώσουμε αυτό που πιστεύουμε.\",\n   means:\"<b>Σχηματίζεται<\u002Fb> σε όλους τους ρηματικούς χρόνους.<br><b>Άρνηση:<\u002Fb> μόριο «δε(ν)».<br><b>Δείκτης:<\u002Fb> το μόριο «θα».<br>Αν ο τύπος είναι <b>Παρατατικός, Μέλλοντας ή Υπερσυντέλικος<\u002Fb>, είναι οπωσδήποτε οριστική — οι άλλες εγκλίσεις δεν σχηματίζονται σε αυτούς τους χρόνους.\",\n   rowsTitle:\"Πώς διακρίνουμε την έγκλιση\",\n   rows:[{k:\"Από τον χρόνο\", v:\"Παρατατικός, Μέλλοντας, Υπερσυντέλικος → πάντοτε οριστική.\"},\n         {k:\"Από τα μόρια\", v:\"«να, ας» → υποτακτική. «θα» → οριστική. Η προστακτική δεν συνοδεύεται από μόρια.\"},\n         {k:\"Από την άρνηση\", v:\"«δε(ν)» → οριστική. «μη(ν)» → υποτακτική ή προστακτική.\"},\n         {k:\"Από τις καταλήξεις\", v:\"Η προστακτική έχει δικές της καταλήξεις.\"},\n         {k:\"Από το νόημα\", v:\"Οριστική → πληροφορία / κρίση. Υποτακτική & προστακτική → επιθυμία.\"}],\n   note:\"Ενεργητική φωνή: λύνω, έλυνα, θα λύνω, θα λύσω, έλυσα, έχω λύσει, είχα λύσει. Παθητική: λύνομαι, λυνόμουν, θα λυθώ, λύθηκα, έχω λυθεί.\"},\n\n 4:{sub:\"2.2\", cat:\"Βήμα 2 · Γραμματική\", term:\"Υποτακτική\",\n   def:\"Η έγκλιση των <b>προτάσεων επιθυμίας<\u002Fb>. Τη χρησιμοποιούμε όταν εκφράζουμε επιθυμία, ευχή ή αίτημα προς τους άλλους.\",\n   means:\"<b>Σχηματίζεται<\u002Fb> με βοηθητικά ή ευχετικά μόρια: να, ας, μακάρι να, είθε να… και με το μη συνοπτικό, το συνοπτικό ή το συντελικό θέμα.<br><b>Άρνηση:<\u002Fb> μόριο «μη(ν)».\",\n   rowsTitle:\"Τύποι & προσοχή\",\n   rows:[{k:\"Ενεργητική φωνή\", v:\"ας/να λύνω — ας/να λύσω — ας/να έχω λύσει\"},\n         {k:\"Παθητική φωνή\", v:\"ας/να λύνομαι — ας/να λυθώ — ας/να έχω λυθεί\"},\n         {k:\"Απαγόρευση\", v:\"Δηλώνεται με υποτακτική + «μη(ν)», ποτέ με προστακτική: «Μην έρθεις», «Μη μιλάτε».\"},\n         {k:\"Παγίδα\", v:\"Τα «μακάρι να / ας» συνοδεύουν και <b>οριστική<\u002Fb> παρελθοντικού χρόνου, όταν δηλώνεται ανεκπλήρωτη ευχή: «Μακάρι να με αγαπούσες» (Παρατατικός → οριστική).\"}],\n   note:\"Η προστακτική σχηματίζεται μόνο σε β΄ πρόσωπο. Όπου βλέπεις α΄ ή γ΄ πρόσωπο με «ας/να», πρόκειται για υποτακτική: «Ας φύγουμε» = α΄ πληθυντικό υποτακτικής.\"},\n\n 5:{sub:\"2.3\", cat:\"Βήμα 2 · Γραμματική\", term:\"Θέματα\",\n   def:\"Συχνό ορθογραφικό λάθος: η σύγχυση <b>μη συνοπτικού<\u002Fb> και <b>συνοπτικού<\u002Fb> θέματος στην υποτακτική. Η επιλογή δεν είναι αυθαίρετη — εξαρτάται από το είδος της πράξης.\",\n   means:\"<b>Μη συνοπτικό θέμα<\u002Fb> → πράξη διαρκής, εξελισσόμενη ή επαναλαμβανόμενη.<br><b>Συνοπτικό θέμα<\u002Fb> → πράξη που θα γίνει μία συγκεκριμένη φορά, σε μια συγκεκριμένη στιγμή.\",\n   rowsTitle:\"Παραδείγματα\",\n   rows:[{k:\"Μη συνοπτικό\", v:\"Πρέπει ως χώρα να <b>εξάγουμε<\u002Fb> γεωργικά προϊόντα. <i>(εξακολουθητική πράξη)<\u002Fi>\"},\n         {k:\"Μη συνοπτικό\", v:\"Γιατί προσπαθείς <b>διαρκώς<\u002Fb> να <b>επιβάλλεις<\u002Fb> τη θέλησή σου; <i>(επαναλαμβανόμενη συνήθεια — διπλό λλ)<\u002Fi>\"},\n         {k:\"Συνοπτικό\", v:\"Πρέπει να <b>εξαγάγουμε άμεσα<\u002Fb> αυτή την παρτίδα. <i>(συγκεκριμένη στιγμή)<\u002Fi>\"},\n         {k:\"Συνοπτικό\", v:\"Μην προσπαθήσεις να μου <b>επιβάλεις<\u002Fb> τη θέλησή σου <b>αυτή τη φορά<\u002Fb>. <i>(μία ορισμένη στιγμή — ένα λ)<\u002Fi>\"}],\n   note:\"Χρήσιμος οδηγός: ψάξε στην πρόταση τον χρονικό προσδιορισμό. «Συνεχώς, διαρκώς, κάθε μέρα» → μη συνοπτικό. «Άμεσα, τώρα, αυτή τη φορά, μέχρι το τέλος» → συνοπτικό.\"},\n\n 6:{sub:\"2.4\", cat:\"Βήμα 2 · Γραμματική\", term:\"Προστακτική\",\n   def:\"Η έγκλιση της άμεσης επιθυμίας. Χρησιμοποιείται <b>μόνο σε κύριες προτάσεις επιθυμίας<\u002Fb> και έχει τους πιο περιορισμένους τύπους από όλες τις εγκλίσεις.\",\n   means:\"<b>Σχηματίζεται<\u002Fb> μόνο στο <b>β΄ πρόσωπο<\u002Fb> (ενικού και πληθυντικού) και μόνο σε δύο χρόνους: παροντικό μη συνοπτικό (Ενεστώτα) και παρελθοντικό συνοπτικό (Αόριστο).<br><b>Δεν συνοδεύεται<\u002Fb> από μόρια «να / ας / θα».\",\n   rowsTitle:\"Τύποι & άρνηση\",\n   rows:[{k:\"Ενεργητική φωνή\", v:\"λύνε — λύνετε · λύσε — λύστε<br>αγάπα — αγαπάτε · αγάπησε — αγαπήστε\"},\n         {k:\"Παθητική φωνή\", v:\"λύσου — λυθείτε · αγαπήσου — αγαπηθείτε\"},\n         {k:\"Δεν σχηματίζει άρνηση\", v:\"Δεν υπάρχουν τύποι «μη έλα», «δεν έλα». Στην κατάφαση: «Έλα» (προστακτική). Στην απαγόρευση: «Μην έρθεις» (υποτακτική).\"}],\n   note:\"Πρακτικός έλεγχος: αν ο τύπος έχει άρνηση ή μόριο, <b>δεν<\u002Fb> είναι προστακτική. Αν είναι σε α΄ ή γ΄ πρόσωπο, ούτε αυτό είναι προστακτική.\"},\n\n 7:{sub:\"2.5\", cat:\"Βήμα 2 · Γραμματική\", term:\"Ορθογραφία\",\n   def:\"Η προστακτική Αορίστου σχηματίζεται από το <b>συνοπτικό θέμα<\u002Fb> (τον αόριστο χωρίς την κατάληξη -α) και τις καταλήξεις <b>-ε<\u002Fb> (β΄ ενικό) και <b>-τε<\u002Fb> (β΄ πληθυντικό). Το φωνήεν της κατάληξης το δίνει το θέμα του αορίστου.\",\n   means:\"<b>Ο κανόνας:<\u002Fb> σχημάτισε πρώτα τον αόριστο της οριστικής, αφαίρεσε το -α, πρόσθεσε -ε / -τε. Δεν μαντεύεις το φωνήεν — το διαβάζεις από τον αόριστο.\",\n   rowsTitle:\"Οι τρεις ομάδες\",\n   rows:[{k:\"με -η-\", v:\"ρωτώ → [ρώτησ]-α → ρώτησε, <b>ρωτήστε<\u002Fb><br>μιλώ → [μίλησ]-α → μίλησε, <b>μιλήστε<\u002Fb><br>θεωρώ → [θεώρησ]-α → θεώρησε, <b>θεωρήστε<\u002Fb>\"},\n         {k:\"με -ε- / -υ-\", v:\"καλώ → [κάλεσ]-α → κάλεσε, <b>καλέστε<\u002Fb><br>μηνύω → [μήνυσ]-α → μήνυσε, <b>μηνύστε<\u002Fb>\"},\n         {k:\"με -ι- / -οι- / -ει-\", v:\"ψηφίζω → [ψήφισ]-α → ψήφισε, <b>ψηφίστε<\u002Fb><br>περιορίζω → [περιόρισ]-α → περιόρισε, <b>περιορίστε<\u002Fb><br>αθροίζω → [άθροισ]-α → άθροισε, <b>αθροίστε<\u002Fb><br>κλείνω → [έκλεισ]-α → <b>κλείστε<\u002Fb>\"}],\n   note:\"Παράδειγμα εφαρμογής: «αξιοποιώ» → αξιοποίησα → θέμα αξιοποιησ- → <b>αξιοποιήστε<\u002Fb> (με -η-).\"},\n\n 8:{sub:\"3.1\", cat:\"Βήμα 3 · Σημασιολογία\", term:\"Οριστική\",\n   def:\"Είναι η έγκλιση των προτάσεων κρίσης και εκφράζει κυρίως το <b>πραγματικό<\u002Fb> και το <b>βέβαιο<\u002Fb>. Ανάλογα όμως με τα γλωσσικά μέσα που τη συνοδεύουν και τα συμφραζόμενα, μπορεί να δηλώνει και άλλα.\",\n   means:\"Το κλειδί είναι ο <b>συνδυασμός<\u002Fb>: «θα» + παρελθοντικός χρόνος, «μακάρι να» + παρελθοντικός, ερωτηματική πρόταση κ.ο.κ. Η ίδια μορφή αλλάζει σημασία ανάλογα με το περιβάλλον.\",\n   rowsTitle:\"Τι δηλώνει\",\n   rows:[{k:\"Βεβαιότητα\", v:\"Οριστική κάθε χρόνου, με ή χωρίς βεβαιωτικά επιρρήματα → «Το αεροπλάνο (σίγουρα) προσγειώθηκε στις 3.»\"},\n         {k:\"Δυνατότητα<br><i>δυνητική<\u002Fi>\", v:\"<b>θα<\u002Fb> + οριστική <b>παρελθοντικού<\u002Fb> → «Θα έκανα τα πάντα για σένα.» <i>(= θα μπορούσα να κάνω)<\u002Fi>\"},\n         {k:\"Πιθανότητα<br><i>πιθανολογική<\u002Fi>\", v:\"<b>θα<\u002Fb> + οριστική κάθε χρόνου · <b>πρέπει να<\u002Fb> + οριστική → «Θα είναι στο γραφείο τέτοια ώρα.» <i>(= μάλλον είναι)<\u002Fi>\"},\n         {k:\"Ευχή<br><i>ευχετική<\u002Fi>\", v:\"<b>μακάρι να / ας<\u002Fb> + οριστική <b>παρελθοντικού<\u002Fb> → «Μακάρι να ήσουν εδώ.» <i>(ανεκπλήρωτη)<\u002Fi>\"},\n         {k:\"Παράκληση\", v:\"Απλή οριστική ή «να» + οριστική σε <b>ερώτηση<\u002Fb> → «Μου φέρνεις λίγο το βιβλίο;» <i>(αντί προστακτικής)<\u002Fi>\"},\n         {k:\"Οδηγία\", v:\"Αντί προστακτικής σε κείμενα οδηγιών → «Βάζεις τα αβγά, τα χτυπάς και μετά προσθέτεις το αλεύρι.»\"}],\n   note:\"Πρόσεξε τη διαφορά δυνητικής και πιθανολογικής: και οι δύο έχουν «θα», αλλά η δυνητική δηλώνει κάτι που <b>δεν έγινε<\u002Fb>, ενώ η πιθανολογική εικασία για κάτι που μάλλον <b>ισχύει<\u002Fb>.\"},\n\n 9:{sub:\"3.2\", cat:\"Βήμα 3 · Σημασιολογία\", term:\"Υποτακτική\",\n   def:\"Είναι η έγκλιση των προτάσεων επιθυμίας και εκφράζει γενικά το <b>ενδεχόμενο<\u002Fb> και το <b>επιθυμητό<\u002Fb>. Το μόριο που την εισάγει και ο τόνος καθορίζουν την ακριβή σημασία.\",\n   means:\"Δείκτες: <b>ας<\u002Fb> (προτροπή, παραχώρηση), <b>να<\u002Fb> (προσταγή, παράκληση), <b>μην<\u002Fb> (απαγόρευση), <b>μακάρι να / είθε<\u002Fb> (ευχή), <b>ίσως / πιθανόν να<\u002Fb> (ενδεχόμενο), ερώτηση (απορία).\",\n   rowsTitle:\"Τι δηλώνει\",\n   rows:[{k:\"Προτροπή\", v:\"«Ας κινητοποιηθούμε για την επίλυση του προβλήματος.» · «Να προσέχεις!»\"},\n         {k:\"Αποτροπή / απαγόρευση\", v:\"«Ας μην κάνουμε το ίδιο λάθος.» · «Μην καπνίζετε.»\"},\n         {k:\"Προσταγή\", v:\"«Να γυρίσετε σπίτι γρήγορα!» <i>(ύφος επιτακτικό)<\u002Fi>\"},\n         {k:\"Επιθυμία / Ευχή\", v:\"«Ας έρθουν γρήγορα οι διακοπές!» · «Μακάρι να τα καταφέρεις.» <i>(εκπληρώσιμη)<\u002Fi>\"},\n         {k:\"Παραχώρηση\", v:\"«Ας μείνει σπίτι μας απόψε. Δε με πειράζει.» <i>(συγκατάθεση)<\u002Fi>\"},\n         {k:\"Απορία\", v:\"«Τι να κάνω; Πού να πάω;» <i>(αμηχανία)<\u002Fi>\"},\n         {k:\"Ενδεχόμενο\", v:\"«Ίσως μια μέρα (να) μετανιώσω για όλα αυτά.»\"},\n         {k:\"Παράκληση\", v:\"«Να με βοηθήσεις λίγο να κουβαλήσω τα πράγματα;» <i>(ήπιο αίτημα)<\u002Fi>\"}],\n   note:\"Το «ας» είναι πολυσήμαντο: σε α΄ πληθυντικό δίνει <b>προτροπή<\u002Fb> («ας συνεργαστούμε»), σε γ΄ πρόσωπο συνήθως <b>παραχώρηση<\u002Fb> («ας μείνει»), με άρνηση <b>αποτροπή<\u002Fb> («ας μην κάνουμε»).\"},\n\n 10:{sub:\"3.3\", cat:\"Βήμα 3 · Σημασιολογία\", term:\"Προστακτική\",\n   def:\"Δηλώνει την άμεση, ανυπόκριτη επιθυμία του ομιλητή προς τον δέκτη. Η βασική της σημασία είναι η <b>προσταγή<\u002Fb>, αλλά ο τόνος και τα συμφραζόμενα την αποδυναμώνουν σε προτροπή, παράκληση ή ακόμη και ευχή.\",\n   means:\"Δεν υπάρχουν εδώ μόρια που να ξεχωρίζουν τις σημασίες — <b>μόνο ο τόνος και τα συμφραζόμενα<\u002Fb>. Ρώτησε: επιβάλλει, συμβουλεύει, ικετεύει ή εύχεται;\",\n   rowsTitle:\"Τι δηλώνει\",\n   rows:[{k:\"Προσταγή\", v:\"«Έλα δω παιδί μου. Πες φχαριστώ στους κυρίους.» <i>(εντολές)<\u002Fi>\"},\n         {k:\"Προτροπή\", v:\"«Ερωτευτείτε, ταξιδέψτε, διασκεδάστε! Ζήστε τη ζωή σας!» <i>(συμβουλές ζωής)<\u002Fi>\"},\n         {k:\"Παράκληση\", v:\"«Λυπηθείτε με!» <i>(τόνος παρακλητικός)<\u002Fi>\"},\n         {k:\"Ευχή <i>(σπάνια)<\u002Fi>\", v:\"«Σύρε παιδί μου στο καλό!» · «Πήγαινε στην ευχή του θεού!» <i>(αποχαιρετισμός)<\u002Fi>\"}],\n   note:\"Η ευχετική προστακτική είναι η σπανιότερη σημασία και επιβιώνει κυρίως σε παγιωμένες εκφράσεις αποχαιρετισμού.\"}\n};\n\n/* ══ ΣΥΝΘΕΣΗ ΒΗΜΑΤΟΣ — εμφανίζεται όταν ολοκληρώνονται όλα τα υποβήματα ══ */\nconst STEPSYN = {\n \"1\":{title:\"Η τροπικότητα και τα είδη της\",\n   lead:\"Σε κάθε πρόταση που είδες, μια λέξη, μια φράση ή ένας γραμματικός τύπος φανέρωνε τη <b>στάση του πομπού<\u002Fb> απέναντι σε αυτό που λέει.\",\n   boxes:[{h:\"Πόσο βέβαιος είναι\", p:\"Επιστημική: μπορεί · μάλλον · σίγουρα · αναμφισβήτητα\"},\n          {h:\"Πόσο αναγκαίο το θεωρεί\", p:\"Δεοντική: θέλω · μακάρι · σκοπεύω · ας · πρέπει\"}],\n   term:\"Τροπικότητα\",\n   reveal:\"Ο βαθμός <b>βεβαιότητας<\u002Fb> ή <b>αναγκαιότητας<\u002Fb> με τον οποίο ο πομπός περιβάλλει το μήνυμά του. Η επιστημική κλιμακώνεται σε τρεις βαθμίδες (δυνατότητα → πιθανότητα → βεβαιότητα), η δεοντική σε πέντε λειτουργίες αυξανόμενης δεσμευτικότητας (επιθυμία → ευχή → πρόθεση → παραχώρηση/παράκληση/προτροπή → υποχρέωση). Το ισχυρότερο μέσο δήλωσής της είναι οι <b>εγκλίσεις<\u002Fb> — και αυτές εξετάζει το επόμενο βήμα.\"},\n \"2\":{title:\"Οι εγκλίσεις — γραμματική προσέγγιση\",\n   lead:\"Εγκλίσεις είναι οι διαφορετικές <b>μορφές του ρήματος<\u002Fb> που επιλέγει ο ομιλητής για να εκφράσει τη στάση του. Σε αυτό το βήμα έμαθες να τις αναγνωρίζεις και να τις γράφεις σωστά.\",\n   boxes:[{h:\"Οριστική\", p:\"Όλοι οι χρόνοι · μόριο «θα» · άρνηση «δε(ν)» · προτάσεις κρίσης\"},\n          {h:\"Υποτακτική\", p:\"Μόρια «να, ας, μακάρι να» · άρνηση «μη(ν)» · προτάσεις επιθυμίας\"},\n          {h:\"Προστακτική\", p:\"Μόνο β΄ πρόσωπο · Ενεστώτας & Αόριστος · χωρίς μόρια · χωρίς άρνηση\"}],\n   term:\"Πέντε κριτήρια\",\n   reveal:\"Για να διακρίνεις την έγκλιση, έλεγξε με τη σειρά: <b>τον χρόνο<\u002Fb> (Παρατατικός, Μέλλοντας, Υπερσυντέλικος → πάντοτε οριστική), <b>τα μόρια<\u002Fb> (να/ας → υποτακτική, θα → οριστική, κανένα → πιθανώς προστακτική), <b>την άρνηση<\u002Fb> (δε(ν) → οριστική, μη(ν) → υποτακτική ή προστακτική), <b>τις καταλήξεις<\u002Fb> της προστακτικής και τέλος <b>το νόημα<\u002Fb> (πληροφορία/κρίση έναντι επιθυμίας). Πρόσεξε τις δύο παγίδες: το «μακάρι να» με παρελθοντικό χρόνο δίνει οριστική, και η απαγόρευση εκφράζεται πάντοτε με υποτακτική, ποτέ με προστακτική.\"},\n \"3\":{title:\"Οι εγκλίσεις — σημασιολογική προσέγγιση\",\n   lead:\"Η ίδια έγκλιση δεν δηλώνει πάντοτε το ίδιο πράγμα. Τα <b>γλωσσικά μέσα<\u002Fb> που τη συνοδεύουν και τα <b>συμφραζόμενα<\u002Fb> μεταβάλλουν τη σημασία της.\",\n   boxes:[{h:\"Οριστική\", p:\"Βεβαιότητα · δυνατότητα · πιθανότητα · ευχή · παράκληση · οδηγία\"},\n          {h:\"Υποτακτική\", p:\"Προτροπή · απαγόρευση · προσταγή · ευχή · παραχώρηση · απορία · ενδεχόμενο\"},\n          {h:\"Προστακτική\", p:\"Προσταγή · προτροπή · παράκληση · ευχή\"}],\n   term:\"Το ζητούμενο\",\n   reveal:\"Οι τρεις εγκλίσεις <b>επικαλύπτονται<\u002Fb> σημασιολογικά: η προσταγή δηλώνεται και με προστακτική («Έλα») και με υποτακτική («Να γυρίσετε!»)· η παράκληση και με τις τρεις («Λυπηθείτε με!», «Να με βοηθήσεις;», «Μου φέρνεις το βιβλίο;»). Γι' αυτό η ανάλυση δεν σταματά στην αναγνώριση του τύπου: ρωτάς πάντοτε τι <b>κάνει<\u002Fb> ο τύπος μέσα στη συγκεκριμένη πρόταση.\"}\n};\n\n/* ══ ΜΗΧΑΝΗ ΠΡΟΣΑΡΜΟΣΤΙΚΗΣ ΜΑΘΗΣΗΣ ══\n   Βήματα → υποβήματα → βαθμοί δυσκολίας. Οι ερωτήσεις αντλούνται τυχαία μέσα\n   στο υποβήμα, αλλά η σειρά βημάτων/υποβημάτων/δυσκολίας είναι δεσμευτική.\n   Λάθος → κάρτα θεωρίας → νέα ερώτηση ίδιας δυσκολίας → επανάληψη της ίδιας.\n   Νέο λάθος στον κύκλο αποκατάστασης → η θεωρία ξανά, με προειδοποίηση. */\n\nlet MIN_PER_SUB = 3;          /* ελάχιστες ερωτήσεις ανά υποβήμα */\nlet HIST=[], p=0, flipped=false, __ready=false;\nconst ENG={ steps:[], si:0, ui:0, queue:[], mode:'learn', free:null,\n            stats:{asked:0,right:0} };\n\nconst curStep = ()=>ENG.steps[ENG.si]||null;\nconst curSub  = ()=>{ const s=curStep(); return s? s.subs[ENG.ui]||null : null; };\n\nfunction buildEngine(list){\n  const bySub={};\n  list.forEach(e=>{ (bySub[e.cat]=bySub[e.cat]||[]).push(e); });\n  const cmp=(a,b)=>{ const A=String(a).split('.').map(Number), B=String(b).split('.').map(Number);\n                     return (A[0]-B[0])||((A[1]||0)-(B[1]||0)); };\n  const steps=[];\n  Object.keys(bySub).sort(cmp).forEach(id=>{\n    const stepId=String(id).split('.')[0];\n    let st=steps.find(s=>s.id===stepId);\n    if(!st){ st={id:stepId, subs:[], errors:0}; steps.push(st); }\n    const pool={};\n    bySub[id].forEach(e=>{ const d=e.diff||1; (pool[d]=pool[d]||[]).push(e); });\n    Object.keys(pool).forEach(d=>shuffle(pool[d]));\n    st.subs.push({ id:id, theory:bySub[id][0].theory||0, label:bySub[id][0].domain,\n                   diffs:Object.keys(pool).map(Number).sort((a,b)=>a-b),\n                   pool:pool, errors:0 });\n  });\n  return steps;\n}\n\nfunction drawDiff(sub,d){\n  const arr=sub.pool[d]||[];\n  for(let i=0;i<arr.length;i++) if(!arr[i].__used){ arr[i].__used=true; return arr[i]; }\n  return null;\n}\n/* Ίδια δυσκολία· αν εξαντληθεί, η πλησιέστερη διαθέσιμη του ίδιου υποβήματος. */\nfunction drawNear(sub,d){\n  let q=drawDiff(sub,d); if(q) return q;\n  const order=sub.diffs.slice().sort((a,b)=>Math.abs(a-d)-Math.abs(b-d)||a-b);\n  for(let i=0;i<order.length;i++){ q=drawDiff(sub,order[i]); if(q) return q; }\n  return null;\n}\nfunction mkEx(data,sub,extra){\n  return Object.assign({kind:'ex', data:data, sub:sub,\n                        state:{answered:false,correct:false}}, extra||{});\n}\n\nfunction loadSub(){\n  ENG.queue=[];\n  const sub=curSub(); if(!sub) return;\n  sub.diffs.forEach(d=>{ const q=drawDiff(sub,d); if(q) ENG.queue.push(mkEx(q,sub)); });\n  let guard=0;\n  while(ENG.queue.length<MIN_PER_SUB && guard++<30){\n    const d=sub.diffs[ENG.queue.length % sub.diffs.length];\n    const q=drawNear(sub,d); if(!q) break;\n    ENG.queue.push(mkEx(q,sub));\n  }\n  ENG.queue.forEach((c,i)=>{ c.n=i+1; c.total=ENG.queue.length; });\n}\n\nfunction nextCard(){\n  if(ENG.mode==='free') return nextFree();\n  if(ENG.queue.length) return ENG.queue.shift();\n  const st=curStep();\n  if(!st) return {kind:'finish'};\n  while(ENG.ui < st.subs.length-1){\n    ENG.ui++; loadSub();\n    if(ENG.queue.length) return ENG.queue.shift();\n  }\n  return {kind:'stepdone', step:st};\n}\n\n/* Καλείται μία φορά ανά κάρτα, από το fb(). */\nfunction onAnswered(item, ok){\n  if(!item || item.kind!=='ex') return;\n  if(ENG.mode==='free'){ ENG.free.done++; if(ok) ENG.free.right++; return; }\n  const sub=item.sub, st=curStep();\n  if(!item.remedial){ ENG.stats.asked++; if(ok) ENG.stats.right++; }\n  if(ok) return;\n  sub.errors++; if(st) st.errors++;\n  const inject=[];\n  if(!item.remedial){\n    inject.push({kind:'theory', th:sub.theory, sub:sub});\n    const alt=drawNear(sub, item.data.diff||1);\n    if(alt) inject.push(mkEx(alt, sub, {remedial:1}));\n    inject.push(mkEx(item.data, sub, {remedial:1, again:true}));\n  }else{\n    inject.push({kind:'theory', th:sub.theory, sub:sub, warn:true});\n  }\n  Array.prototype.unshift.apply(ENG.queue, inject);\n}\n\n/* Επανάληψη βήματος: μηδενισμός χρήσης και σφαλμάτων. */\nfunction restartStep(si){\n  const st=ENG.steps[si]; if(!st) return;\n  st.errors=0;\n  st.subs.forEach(sub=>{ sub.errors=0;\n    Object.keys(sub.pool).forEach(d=>{ sub.pool[d].forEach(q=>{delete q.__used;}); shuffle(sub.pool[d]); }); });\n  ENG.si=si; ENG.ui=0; ENG.mode='learn'; loadSub();\n}\nfunction restartAll(){\n  ENG.stats={asked:0,right:0};\n  ENG.steps.forEach((s,i)=>restartStep(i));\n  ENG.si=0; ENG.ui=0; loadSub();\n}\n\n/* ── Ελεύθερη εξάσκηση ── */\nfunction startFree(count, types){\n  const all=[];\n  ENG.steps.forEach(s=>s.subs.forEach(sub=>\n    sub.diffs.forEach(d=>sub.pool[d].forEach(q=>all.push(q)))));\n  let pick=all.filter(q=>!types || !types.length || types.indexOf(q.type)>=0);\n  shuffle(pick);\n  if(count>0) pick=pick.slice(0,count);\n  ENG.mode='free';\n  ENG.free={ list:pick, i:0, done:0, right:0, total:pick.length };\n  return pick.length;\n}\nfunction nextFree(){\n  const f=ENG.free;\n  if(!f || f.i>=f.list.length) return {kind:'freedone'};\n  const q=f.list[f.i++];\n  return mkEx(q, null, {n:f.i, total:f.total, free:true});\n}\n\nconst slot=document.getElementById('slot');\nconst norm=s=>String(s).toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g,'')\n  .replace(/[«».,;:!·()\"'\\u2018\\u2019\\u2013\\u2014?]/g,'').replace(/\\s+/g,' ').trim();\nconst shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;};\nconst firstLetter=t=>`<span class=\"initial\">${t.charAt(0)}<\u002Fspan>${t.slice(1)}`;\n\nconst host=document.getElementById('cardhost');\n\n/* ── auto-fit ανά τμήμα για τη θεωρία ── */\nfunction fitCol(col){\n  let lo=10,hi=Math.max(52, Math.min(180, col.clientHeight*0.16));\n  for(let it=0;it<14;it++){const mid=(lo+hi)/2;col.style.setProperty('--fs',mid+'px');\n    const of=col.scrollHeight>col.clientHeight+1||col.scrollWidth>col.clientWidth+1;\n    if(of)hi=mid;else lo=mid;}\n  col.style.setProperty('--fs',Math.floor(lo)+'px');\n}\nfunction fitTheory(){requestAnimationFrame(()=>host.querySelectorAll('.face .col').forEach(fitCol));}\n\n/* ── auto-fit ασκήσεων/γέφυρας: μεγαλώνει/σμικραίνει τη γραμματοσειρά ανάλογα με το\n   διαθέσιμο ύψος της κάρτας — χωρίς κύλιση ── */\nfunction fitCard(){\n  const card=host.querySelector('.card');\n  if(!card) return;\n  requestAnimationFrame(()=>{\n    /* γενναιόδωρο άνω όριο: με βάση μικρότερη διάσταση (ύψος ή πλάτος) */\n    const ref = Math.min(card.clientHeight, card.clientWidth*0.62);\n    const areaCap = Math.min(4.5, Math.max(1, ref/360));\n    let lo=0.6, hi=areaCap;\n    card.style.setProperty('--sc',hi);\n    if(card.scrollHeight<=card.clientHeight+1){ return; }\n    for(let it=0; it<16; it++){\n      const mid=(lo+hi)/2;\n      card.style.setProperty('--sc',mid);\n      if(card.scrollHeight>card.clientHeight+1) hi=mid; else lo=mid;\n    }\n    card.style.setProperty('--sc',lo);\n  });\n}\n\n/* ── render dispatch ── */\nlet __swipeInProgress=false;\nfunction animateHost(dir){\n  if(__swipeInProgress) return;\n  host.classList.remove('slideR','slideL','fadeIn');\n  void host.offsetWidth;\n  host.classList.add(dir>0?'slideR':dir<0?'slideL':'fadeIn');\n}\nfunction render(dir){\n  clearCheck();\n  const item=HIST[p]; if(!item) return;\n  const isTh = item.kind==='theory';\n  const locked = item.kind==='ex' && !item.state.answered;\n  slot.classList.toggle('flippable', isTh);\n  slot.classList.toggle('no-prev', p===0);\n  slot.classList.toggle('no-next', item.kind==='finish' || locked);\n  document.getElementById('hintMid').classList.toggle('dim', !isTh);\n  if(item.kind==='intro'){ renderIntro(); fitCard(); }\n  else if(item.kind==='ex'){ renderEx(item); fitCard(); }\n  else if(item.kind==='theory'){ renderTheory(item); }\n  else if(item.kind==='stepdone'){ renderStepDone(item); fitCard(); }\n  else if(item.kind==='finish'){ renderFinish(); fitCard(); }\n  else if(item.kind==='freesetup'){ renderFreeSetup(); fitCard(); }\n  else if(item.kind==='freedone'){ renderFreeDone(); fitCard(); }\n  animateHost(dir||0);\n}\n\n/* Εισαγωγική κάρτα */\nfunction renderIntro(){\n  const nSteps=ENG.steps.length;\n  const nSubs=ENG.steps.reduce((a,s)=>a+s.subs.length,0);\n  host.innerHTML=`<div class=\"card gate intro\">\n    <div class=\"head\"><span class=\"eyebrow\">Καλωσόρισες<\u002Fspan><span class=\"badge\">Προσαρμοστική μάθηση<\u002Fspan><\u002Fdiv>\n    <div class=\"title\">${firstLetter(\"Τροπικότητα\")}<\u002Fdiv>\n    <div class=\"lead\">Η διαδρομή έχει <b>${nSteps} ενότητες<\u002Fb> και <b>${nSubs} κεφάλαια<\u002Fb>. Σε κάθε κεφάλαιο οι ερωτήσεις έρχονται τυχαία, με αυξανόμενη δυσκολία.<br><br>\n    Σε κάθε λανθασμένη απάντηση, εμφανίζεται η <b>θεωρία<\u002Fb> και ακολουθεί επανάληψη. Όταν όλα πάνε καλά, προχωράς.<\u002Fdiv>\n    <div class=\"actions\">\n      <button class=\"reveal-btn\" id=\"startBtn\">Ξεκίνα →<\u002Fbutton>\n      <button class=\"reveal-btn btn-secondary\" id=\"freeBtn\">Ελεύθερη εξάσκηση<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n  host.querySelector('#startBtn').addEventListener('click',()=>go(1));\n  host.querySelector('#freeBtn').addEventListener('click',()=>{\n    HIST=HIST.slice(0,p+1); HIST.push({kind:'freesetup'}); p++; flipped=false; render(1);\n  });\n}\n\n/* Ολοκλήρωση βήματος: σύνθεση θεωρίας + επιλογή πορείας */\nfunction renderStepDone(item){\n  const st=item.step, syn=STEPSYN[st.id]||{};\n  const subs=st.subs.length, errs=st.errors;\n  const boxes=(syn.boxes||[]).map(b=>`<div class=\"box\"><h4>${b.h}<\u002Fh4><p>${b.p}<\u002Fp><\u002Fdiv>`).join(\"\");\n  const isLast = ENG.si >= ENG.steps.length-1;\n  host.innerHTML=`<div class=\"card bridge\">\n    <div class=\"head\"><span class=\"eyebrow\">Ολοκλήρωσες το βήμα ${st.id}<\u002Fspan><span class=\"badge\">${errs? (errs===1?'1 λάθος':errs+' λάθη') : 'χωρίς λάθη'}<\u002Fspan><\u002Fdiv>\n    <div class=\"title\">${syn.title||('Βήμα '+st.id)}<\u002Fdiv>\n    <div class=\"lead\">${syn.lead||''}<\u002Fdiv>\n    <div class=\"evid\">${boxes}<\u002Fdiv>\n    <button class=\"reveal-btn\" id=\"revealBtn\">Σύνθεση του βήματος →<\u002Fbutton>\n    <div class=\"reveal\" id=\"reveal\">\n      <div class=\"term\">${firstLetter(syn.term||'Σύνοψη')}<\u002Fdiv>\n      <p>${syn.reveal||''}<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"actions\" style=\"margin-top:.7em\">\n      <button class=\"reveal-btn\" id=\"nextStepBtn\">${isLast?'Δες τα αποτελέσματα →':'Συνέχεια στο βήμα '+(+st.id+1)+' →'}<\u002Fbutton>\n      ${errs?`<button class=\"reveal-btn btn-secondary\" id=\"againStepBtn\">↻ Επανάληψη του βήματος ${st.id}<\u002Fbutton>`:''}\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n  host.querySelector('#revealBtn').addEventListener('click',function(){\n    host.querySelector('#reveal').classList.add('show'); this.style.display='none'; fitCard();\n  });\n  host.querySelector('#nextStepBtn').addEventListener('click',()=>{\n    if(isLast){ HIST=HIST.slice(0,p+1); HIST.push({kind:'finish'}); }\n    else { ENG.si++; ENG.ui=0; loadSub();\n           HIST=HIST.slice(0,p+1); const nx=nextCard(); if(nx) HIST.push(nx); }\n    p=HIST.length-1; flipped=false; render(1);\n  });\n  const ag=host.querySelector('#againStepBtn');\n  if(ag) ag.addEventListener('click',()=>{\n    restartStep(ENG.si);\n    HIST=HIST.slice(0,p+1); const nx=nextCard(); if(nx) HIST.push(nx);\n    p=HIST.length-1; flipped=false; render(1);\n  });\n}\n\n/* Τελική κάρτα */\nfunction renderFinish(){\n  const a=ENG.stats.asked, r=ENG.stats.right;\n  const errs=ENG.steps.reduce((x,s)=>x+s.errors,0);\n  host.innerHTML=`<div class=\"card gate end\">\n    <div class=\"head\"><span class=\"eyebrow\">Τέλος διαδρομής<\u002Fspan><span class=\"badge\">${ENG.steps.length} βήματα<\u002Fspan><\u002Fdiv>\n    <div class=\"title\">Ολοκλήρωσες όλα τα βήματα<\u002Fdiv>\n    <div class=\"score\">${r}<small> / ${a} με την πρώτη<\u002Fsmall><\u002Fdiv>\n    <div class=\"lead\">${errs? 'Χρειάστηκαν <b>'+errs+'<\u002Fb> επαναλήψεις. Μπορείς να ξαναπεράσεις τα βήματα ή να εξασκηθείς ελεύθερα.' : 'Πέρασες όλα τα βήματα χωρίς λάθος.'}<\u002Fdiv>\n    <div class=\"actions\">\n      <button class=\"reveal-btn\" id=\"againAllBtn\">↻ Επανάληψη βημάτων μάθησης<\u002Fbutton>\n      <button class=\"reveal-btn btn-secondary\" id=\"freeBtn2\">Ελεύθερη εξάσκηση →<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n  host.querySelector('#againAllBtn').addEventListener('click',()=>{\n    restartAll(); HIST=[{kind:'intro'}]; const nx=nextCard(); if(nx) HIST.push(nx);\n    p=1; flipped=false; render(1);\n  });\n  host.querySelector('#freeBtn2').addEventListener('click',()=>{\n    HIST=HIST.slice(0,p+1); HIST.push({kind:'freesetup'}); p++; flipped=false; render(1);\n  });\n}\n\n/* Ρυθμίσεις ελεύθερης εξάσκησης */\nconst FREE_TYPES=[[\"mc\",\"Πολλαπλή επιλογή\"],[\"yesno\",\"Ναι / Όχι\"],[\"clk\",\"Κλικ στη λέξη\"],\n                  [\"gap\",\"Συμπλήρωση κενού\"],[\"match\",\"Αντιστοίχιση\"]];\nlet freeSel={count:10, types:[]};\nfunction renderFreeSetup(){\n  const counts=[5,10,15,20,0];\n  const cbtn=counts.map(c=>`<button class=\"opt pick${freeSel.count===c?' sel':''}\" data-c=\"${c}\">${c===0?'Όλες':c}<\u002Fbutton>`).join(\"\");\n  const tbtn=FREE_TYPES.map(t=>`<button class=\"opt pick${freeSel.types.indexOf(t[0])>=0?' sel':''}\" data-t=\"${t[0]}\">${t[1]}<\u002Fbutton>`).join(\"\");\n  host.innerHTML=`<div class=\"card gate intro\">\n    <div class=\"head\"><span class=\"eyebrow\">Ελεύθερη εξάσκηση<\u002Fspan><span class=\"badge\">Χωρίς βήματα<\u002Fspan><\u002Fdiv>\n    <div class=\"title\">Γρήγορη εξάσκηση<\u002Fdiv>\n    <div class=\"lead\">Τυχαίες ερωτήσεις από όλη την ύλη, χωρίς θεωρία και χωρίς προσαρμοστική λογική.<\u002Fdiv>\n    <div class=\"setup\"><div class=\"h\">Πόσες ερωτήσεις;<\u002Fdiv><div class=\"picks\">${cbtn}<\u002Fdiv><\u002Fdiv>\n    <div class=\"setup\"><div class=\"h\">Τύποι ερωτήσεων <small>(κανένας επιλεγμένος = όλοι)<\u002Fsmall><\u002Fdiv><div class=\"picks\">${tbtn}<\u002Fdiv><\u002Fdiv>\n    <div class=\"actions\"><button class=\"reveal-btn\" id=\"goFree\">Ξεκίνα →<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>`;\n  host.querySelectorAll('.pick[data-c]').forEach(b=>b.addEventListener('click',()=>{\n    freeSel.count=+b.dataset.c; renderFreeSetup(); fitCard(); }));\n  host.querySelectorAll('.pick[data-t]').forEach(b=>b.addEventListener('click',()=>{\n    const t=b.dataset.t, i=freeSel.types.indexOf(t);\n    if(i>=0) freeSel.types.splice(i,1); else freeSel.types.push(t);\n    renderFreeSetup(); fitCard(); }));\n  host.querySelector('#goFree').addEventListener('click',()=>{\n    const n=startFree(freeSel.count, freeSel.types);\n    if(!n){ alert('Δεν υπάρχουν ερωτήσεις με αυτά τα κριτήρια.'); return; }\n    HIST=HIST.slice(0,p+1); const nx=nextCard(); if(nx) HIST.push(nx);\n    p=HIST.length-1; flipped=false; render(1);\n  });\n}\nfunction renderFreeDone(){\n  const f=ENG.free||{done:0,right:0};\n  host.innerHTML=`<div class=\"card gate end\">\n    <div class=\"head\"><span class=\"eyebrow\">Ελεύθερη εξάσκηση<\u002Fspan><span class=\"badge\">Ολοκληρώθηκε<\u002Fspan><\u002Fdiv>\n    <div class=\"title\">Τέλος εξάσκησης<\u002Fdiv>\n    <div class=\"score\">${f.right}<small> / ${f.done} σωστές<\u002Fsmall><\u002Fdiv>\n    <div class=\"actions\">\n      <button class=\"reveal-btn\" id=\"againFree\">↻ Νέα εξάσκηση<\u002Fbutton>\n      <button class=\"reveal-btn btn-secondary\" id=\"toStart\">← Στην αρχή<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n  host.querySelector('#againFree').addEventListener('click',()=>{\n    HIST=HIST.slice(0,p+1); HIST.push({kind:'freesetup'}); p++; flipped=false; render(1); });\n  host.querySelector('#toStart').addEventListener('click',()=>{\n    ENG.mode='learn'; p=0; flipped=false; render(-1); });\n}\n\n/* Ασκήσεις */\nfunction renderEx(item){\n  const e=item.data, st=item.state;\n  const typeLabel=e.type===\"clk\"?\"Κλικ στη λέξη\":(e.type===\"gap\"?\"Συμπλήρωση κενού\":(e.type===\"match\"?\"Αντιστοίχιση\":(e.type===\"yesno\"?\"Ναι / Όχι\":\"Πολλαπλή επιλογή\")));\n  let eyebrow;\n  if(item.free) eyebrow=`Εξάσκηση ${item.n}/${item.total}`;\n  else eyebrow=`Βήμα ${String(item.sub.id).split('.')[0]} · Κεφάλαιο ${item.sub.id}`+\n       (item.n?` · ${item.n}/${item.total}`:'');\n  const tag = item.again ? '<span class=\"badge warnbadge\">Ξανά<\u002Fspan>'\n            : item.remedial ? '<span class=\"badge warnbadge\">Επανάληψη<\u002Fspan>' : '';\n  let b=`<div class=\"card\"><div class=\"head\"><span class=\"eyebrow\">${eyebrow}<\u002Fspan><span class=\"badge\">${typeLabel}<\u002Fspan><\u002Fdiv>`;\n  if(tag) b+=`<div class=\"tagrow\">${tag}<span class=\"diffdots\">${'●'.repeat(e.diff||1)}${'○'.repeat(Math.max(0,4-(e.diff||1)))}<\u002Fspan><\u002Fdiv>`;\n  b+=`<div class=\"prompt\">${e.prompt}<\u002Fdiv>`;\n  if(e.type===\"clk\"){\n    const sp=clkSpan(e.sentence, e.answerWord);\n    const units=[];\n    for(let i=0;i<sp.words.length;i++){\n      if(i===sp.start){ units.push(sp.words.slice(i, i+sp.len).join(' ')); i+=sp.len-1; }\n      else units.push(sp.words[i]);\n    }\n    const toks=units.map((w,idx)=>`<span class=\"tok\" data-idx=\"${idx}\">${w}<\u002Fspan>`).join(\" \");\n    b+=`<div class=\"sentence clk\">${toks}<\u002Fdiv>`;\n    if(!st.answered) b+=`<div class=\"clk-hint\">${e.clkHint||\"Κάνε κλικ στη λέξη που φανερώνει πιθανότητα.\"}<\u002Fdiv>`;\n  }else if(e.type===\"gap\"){\n    const parts=e.sentence.split(\"___\");\n    b+=`<div class=\"sentence gap\">${parts.join('<input class=\"gapinput\" type=\"text\" autocomplete=\"off\" autocapitalize=\"off\" autocorrect=\"off\" spellcheck=\"false\">')}<\u002Fdiv>`;\n    b+=`<div class=\"gaprow\"><button class=\"opt gapcheck\">Έλεγχος<\u002Fbutton><\u002Fdiv>`;\n    if(!st.answered) b+=`<div class=\"clk-hint\">${e.gapHint||\"Πληκτρολόγησε τη λέξη και πάτησε «Έλεγχος» (ή Enter).\"}<\u002Fdiv>`;\n  }else if(e.type===\"match\"){\n    const order=st.order||(st.order=shuffle([...e.pairs.keys()]));\n    const chips=order.map(i=>`<div class=\"mitem\" data-cat=\"${e.pairs[i].cat}\">${e.pairs[i].text}<\u002Fdiv>`).join(\"\");\n    const zones=e.pairs.map(pr=>`<div class=\"mzone\" data-cat=\"${pr.cat}\"><span class=\"mzlabel\">${pr.cat}<\u002Fspan><\u002Fdiv>`).join(\"\");\n    b+=`<div class=\"matchwrap\"><div class=\"mpool\">${chips}<\u002Fdiv><div class=\"mzones\">${zones}<\u002Fdiv><\u002Fdiv>`;\n    if(!st.answered) b+=`<div class=\"clk-hint\">Σύρε κάθε πρόταση στο σωστό πλαίσιο.<\u002Fdiv>`;\n  }else{\n    if(e.sentence) b+=`<div class=\"sentence\">${e.sentence}<\u002Fdiv>`;\n    const two=e.options.length===2?\" two\":\"\";\n    b+=`<div class=\"options${two}\">`+e.options.map((o,idx)=>`<button class=\"opt\" data-idx=\"${idx}\">${o}<\u002Fbutton>`).join(\"\")+`<\u002Fdiv>`;\n  }\n  b+=`<div class=\"feedback\"><\u002Fdiv><\u002Fdiv>`;\n  host.innerHTML=b;\n  const card=host.querySelector('.card'); card.scrollTop=0;\n  if(e.type===\"clk\") bindClk(e,st,card); else if(e.type===\"match\") bindMatch(e,st,card); else if(e.type===\"gap\") bindGap(e,st,card); else bindOptions(e,st,card);\n  if(st.answered) replay(e,st,card);\n}\n/* ── Φάση ελέγχου: το αποτέλεσμα κρύβεται όσο γεμίζει η μπάρα ── */\nlet CHECK_MS=1000, __checkTimer=null, __checking=false;\nfunction clearCheck(){ if(__checkTimer){ clearTimeout(__checkTimer); __checkTimer=null; } __checking=false; }\nfunction startCheck(card, done){\n  if(CHECK_MS<=0){ done(); return; }\n  __checking=true;\n  card.classList.add('checking');\n  const bar=document.createElement('div');\n  bar.className='checkbar';\n  bar.innerHTML='<div class=\"cb-label\">Έλεγχος απάντησης…<\u002Fdiv><div class=\"cb-track\"><div class=\"cb-fill\"><\u002Fdiv><\u002Fdiv>';\n  card.appendChild(bar);\n  fitCard();\n  const fill=bar.querySelector('.cb-fill');\n  requestAnimationFrame(()=>{ fill.style.transitionDuration=CHECK_MS+'ms'; fill.style.width='100%'; });\n  __checkTimer=setTimeout(()=>{\n    __checkTimer=null; __checking=false;\n    card.classList.remove('checking');\n    if(bar.parentNode) bar.remove();\n    done();\n  }, CHECK_MS);\n}\nfunction fb(card,ok,e){\n  card.dataset.answered='1';\n  card.querySelectorAll('.clk-hint').forEach(h=>h.style.display='none');\n  const f=card.querySelector('.feedback');f.className='feedback show '+(ok?'ok':'ko');\n  f.innerHTML=(ok?'✓ Σωστά. ':'✗ Όχι ακριβώς. ')+(e.explain||'');\n  const it=HIST[p];\n  const first = !!(it && it.kind==='ex' && !it.__scored);\n  if(first){ it.__scored=true; onAnswered(it,ok); }\n  const reveal=()=>{\n    slot.classList.remove('no-next');\n    if(first && !ok){ const h=document.createElement('div'); h.className='nexthint';\n      h.textContent = it.remedial ? 'Δες ξανά τη θεωρία →' : 'Ας δούμε τη θεωρία →';\n      card.appendChild(h); }\n    fitCard();\n  };\n  if(first) startCheck(card, reveal); else reveal();\n}\nfunction bindOptions(e,st,card){\n  const opts=[...card.querySelectorAll('.opt')];\n  let lockPid=null, lockBtn=null;\n  const lockOthers=(active)=>{ opts.forEach(x=>{ if(x!==active) x.style.pointerEvents='none'; }); };\n  const unlockOthers=()=>{ opts.forEach(x=>{ x.style.pointerEvents=''; }); };\n  opts.forEach(btn=>{\n    let dx0=0,dy0=0,downOk=false,pid=null;\n    btn.style.touchAction='manipulation';\n    const doPick=()=>{\n      if(st.answered)return;\n      const idx=+btn.dataset.idx,ok=idx===e.answer;st.answered=true;st.correct=ok;\n      card.dataset.answered='1';\n      opts.forEach((x,k)=>{ x.disabled=true; x.style.pointerEvents='none'; });\n      if(ok){ btn.classList.add('correct'); btn.insertAdjacentHTML('beforeend','<span class=\"mark\">✓<\u002Fspan>'); }\n      else{ btn.classList.add('wrong'); btn.insertAdjacentHTML('beforeend','<span class=\"mark\">✗<\u002Fspan>');\n        const right=opts[e.answer]; if(right){ right.classList.add('correct'); right.insertAdjacentHTML('beforeend','<span class=\"mark\">✓<\u002Fspan>'); }\n      }\n      fb(card,ok,e);\n    };\n    btn.addEventListener('pointerdown',ev=>{\n      if(st.answered){ ev.preventDefault(); return; }\n      if(lockPid!==null){ ev.preventDefault(); ev.stopPropagation(); return; }\n      lockPid=ev.pointerId; lockBtn=btn;\n      downOk=true; pid=ev.pointerId; dx0=ev.clientX; dy0=ev.clientY;\n      lockOthers(btn);\n      try{ btn.setPointerCapture(ev.pointerId); }catch(_){}\n      ev.preventDefault();\n    });\n    btn.addEventListener('touchstart',ev=>{ if(lockPid!==null && !btn.contains(ev.target)) ev.preventDefault(); },{passive:false});\n    const release=(ev,commit)=>{\n      if(!downOk||ev.pointerId!==pid)return;\n      downOk=false;\n      try{ btn.releasePointerCapture(ev.pointerId); }catch(_){}\n      lockPid=null; lockBtn=null;\n      if(!commit){ if(!st.answered) unlockOthers(); return; }\n      if(st.answered)return;\n      if(Math.abs(ev.clientX-dx0)>12||Math.abs(ev.clientY-dy0)>12){ unlockOthers(); return; }\n      const el=document.elementFromPoint(ev.clientX,ev.clientY);\n      if(!el||el.closest('.opt')!==btn){ unlockOthers(); return; }\n      ev.preventDefault(); ev.stopPropagation();\n      doPick();\n    };\n    btn.addEventListener('pointerup',ev=>release(ev,true));\n    btn.addEventListener('pointercancel',ev=>release(ev,false));\n    btn.addEventListener('click',ev=>{ ev.preventDefault(); ev.stopPropagation(); });\n  });\n}\nfunction bindClk(e,st,card){\n  card.querySelectorAll('.tok').forEach(tok=>{\n    tok.style.touchAction='manipulation';\n    let dx=0,dy=0,pid=null,down=false;\n    const doPick=()=>{\n      if(st.answered)return;\n      const ok=norm(tok.textContent)===norm(e.answerWord);st.answered=true;st.correct=ok;\n      card.dataset.answered='1';\n      if(ok)tok.classList.add('correct');\n      else{tok.classList.add('wrong');card.querySelectorAll('.tok').forEach(t=>{if(norm(t.textContent)===norm(e.answerWord))t.classList.add('correct');});}\n      fb(card,ok,e);\n    };\n    tok.addEventListener('pointerdown',ev=>{ if(st.answered)return; down=true; pid=ev.pointerId; dx=ev.clientX; dy=ev.clientY; ev.preventDefault(); doPick(); });\n    tok.addEventListener('pointerup',ev=>{\n      if(!down||ev.pointerId!==pid)return; down=false;\n      if(st.answered)return;\n      if(Math.abs(ev.clientX-dx)>12||Math.abs(ev.clientY-dy)>12)return;\n      ev.preventDefault(); ev.stopPropagation();\n      doPick();\n    });\n    tok.addEventListener('pointercancel',()=>{ down=false; });\n    tok.addEventListener('click',ev=>{ ev.preventDefault(); ev.stopPropagation(); if(!st.answered) doPick(); });\n  });\n}\nfunction placeMatch(card,e){\n  const zones=[...card.querySelectorAll('.mzone')];\n  zones.forEach(z=>{\n    const chip=[...card.querySelectorAll('.mitem')].find(m=>m.dataset.cat===z.dataset.cat && !m.dataset.done);\n    if(chip){chip.dataset.done=\"1\";chip.classList.add('placed','correct','locked');z.appendChild(chip);}\n  });\n}\nfunction bindMatch(e,st,card){\n  const pool=card.querySelector('.mpool');\n  const zones=[...card.querySelectorAll('.mzone')];\n  function evaluate(){\n    if(!zones.every(z=>z.querySelector('.mitem'))) return;\n    let allok=true;\n    zones.forEach(z=>{const it=z.querySelector('.mitem');const ok=it.dataset.cat===z.dataset.cat;it.classList.add(ok?'correct':'wrong');if(!ok)allok=false;});\n    st.answered=true;st.correct=allok;\n    card.dataset.answered='1';\n    card.querySelectorAll('.mpool').forEach(p=>p.style.display='none');\n    const hint=card.querySelector('.clk-hint'); if(hint) hint.style.display='none';\n    card.querySelectorAll('.mitem').forEach(m=>m.classList.add('locked'));\n    fb(card,allok,e);\n  }\n  card.querySelectorAll('.mitem').forEach(chip=>{\n    chip.addEventListener('pointerdown',ev=>{\n      if(st.answered||chip.classList.contains('locked'))return;\n      ev.preventDefault();ev.stopPropagation();\n      const r=chip.getBoundingClientRect();\n      const ox=ev.clientX-r.left, oy=ev.clientY-r.top;\n      const ghost=chip.cloneNode(true);\n      ghost.classList.add('mghost');ghost.classList.remove('mdragging');\n      ghost.style.width=r.width+'px';\n      ghost.style.left=(ev.clientX-ox)+'px';ghost.style.top=(ev.clientY-oy)+'px';\n      document.body.appendChild(ghost);\n      chip.classList.add('mdragging');\n      const move=m=>{\n        ghost.style.left=(m.clientX-ox)+'px';ghost.style.top=(m.clientY-oy)+'px';\n        const el=document.elementFromPoint(m.clientX,m.clientY);\n        const z=el&&el.closest?el.closest('.mzone'):null;\n        zones.forEach(x=>x.classList.toggle('over',x===z));\n        if(m.cancelable)m.preventDefault();\n      };\n      const up=m=>{\n        window.removeEventListener('pointermove',move);\n        window.removeEventListener('pointerup',up);\n        ghost.remove();chip.classList.remove('mdragging');\n        zones.forEach(x=>x.classList.remove('over'));\n        const el=document.elementFromPoint(m.clientX,m.clientY);\n        const z=el&&el.closest?el.closest('.mzone'):null;\n        if(z){const ex=z.querySelector('.mitem');if(ex&&ex!==chip)pool.appendChild(ex);z.appendChild(chip);}\n        else{pool.appendChild(chip);}\n        evaluate();\n      };\n      window.addEventListener('pointermove',move,{passive:false});\n      window.addEventListener('pointerup',up);\n    });\n  });\n}\nfunction bindGap(e,st,card){\n  const inp=card.querySelector('.gapinput');\n  const btn=card.querySelector('.gapcheck');\n  const acc=e.answers||[e.answer];\n  function check(){\n    if(st.answered||!inp)return;\n    const ok=acc.some(a=>norm(String(a))===norm(inp.value));\n    st.answered=true;st.correct=ok;\n    inp.disabled=true;if(btn)btn.disabled=true;\n    inp.classList.add(ok?'correct':'wrong');\n    fb(card,ok,e);\n  }\n  if(btn)btn.addEventListener('click',check);\n  if(inp)inp.addEventListener('keydown',ev=>{if(ev.key==='Enter'){ev.preventDefault();check();}});\n  setTimeout(()=>{if(inp&&!st.answered)try{inp.focus();}catch(_){}},60);\n}\nfunction replay(e,st,card){\n  if(e.type===\"clk\"){card.querySelectorAll('.tok').forEach(t=>{if(norm(t.textContent)===norm(e.answerWord))t.classList.add('correct');});}\n  else if(e.type===\"match\"){placeMatch(card,e);}\n  else if(e.type===\"gap\"){const inp=card.querySelector('.gapinput');if(inp){inp.value=(e.answers||[e.answer])[0];inp.disabled=true;inp.classList.add('correct');}card.querySelectorAll('.gapcheck').forEach(b=>b.disabled=true);}\n  else{card.querySelectorAll('.opt').forEach((x,k)=>{x.disabled=true;if(k===e.answer){x.classList.add('correct');x.insertAdjacentHTML('beforeend','<span class=\"mark\">✓<\u002Fspan>');}});}\n  fb(card,st.correct,e);\n}\n\n/* Κάρτα θεωρίας (flip). Μπρος: ορισμός + αναγνωριστικά. Πίσω: πίνακας + σημείωση. */\nfunction renderTheory(item){\n  const c=TH[item.th];\n  if(!c){ host.innerHTML=`<div class=\"card gate intro\"><div class=\"title\">Λείπει η θεωρία<\u002Fdiv>\n    <div class=\"lead\">Δεν βρέθηκε κάρτα θεωρίας με κωδικό ${item.th}.<\u002Fdiv><\u002Fdiv>`; fitCard(); return; }\n  const warn = item.warn\n    ? `<div class=\"thwarn\">Χρειάζεται να ξαναδείς τη θεωρία για το «${c.term}» (${c.sub}).<\u002Fdiv>` : '';\n  const rows=(c.rows||[]).map(r=>`<div class=\"throw\"><div class=\"k\">${r.k}<\u002Fdiv><div class=\"v\">${r.v}<\u002Fdiv><\u002Fdiv>`).join(\"\");\n  const rowsAside=(c.rowsAside||[]).map(r=>`<div class=\"throw\"><div class=\"k\">${r.k}<\u002Fdiv><div class=\"v\">${r.v}<\u002Fdiv><\u002Fdiv>`).join(\"\");\n  host.innerHTML=`<div class=\"thwrap\"><div class=\"thcard\" id=\"thcard\" tabindex=\"0\" role=\"button\" aria-label=\"Κάρτα θεωρίας. Πάτησε για παραδείγματα.\">\n    <div class=\"face front\">\n      <div class=\"col main\"><div class=\"kicker\">${c.cat} · ${c.sub}<\u002Fdiv>${warn}<div class=\"term\">${firstLetter(c.term)}<\u002Fdiv><div class=\"def\">${c.def}<\u002Fdiv><\u002Fdiv>\n      <div class=\"col aside\">${c.means?`<div class=\"scholion\"><div class=\"h\">${c.meansTitle||'Πώς αναγνωρίζεται'}<\u002Fdiv><p>${c.means}<\u002Fp><\u002Fdiv>`:''}<\u002Fdiv>\n      <div class=\"flip-hint\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12a9 9 0 1 1-3-6.7\"/><polyline points=\"21 3 21 9 15 9\"/><\u002Fsvg>Πάτησε για τον πίνακα<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"face back\">\n      <div class=\"col main\"><div class=\"kicker\">${c.rowsTitle||'Πίνακας'}<\u002Fdiv><div class=\"term-small\">${c.term}<\u002Fdiv>\n        <div class=\"thtable\">${rows}<\u002Fdiv><\u002Fdiv>\n      <div class=\"col aside\">${c.rowsAside?`<div class=\"kicker\">${c.rowsAsideTitle||''}<\u002Fdiv><div class=\"thtable\">${rowsAside}<\u002Fdiv>`:''}${c.note?`<div class=\"ex-note\"><div class=\"h\">Σημείωση<\u002Fdiv><span>${c.note}<\u002Fspan><\u002Fdiv>`:''}<\u002Fdiv>\n      <div class=\"flip-hint\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12a9 9 0 1 0 3-6.7\"/><polyline points=\"3 3 3 9 9 9\"/><\u002Fsvg>Επιστροφή στον ορισμό<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>`;\n  flipped=false;\n  fitTheory();\n}\n\n/* Πλοήγηση & ζώνες αφής */\nfunction flipCurrent(){\n  const t=host.querySelector('#thcard'); if(!t) return;\n  flipped=!flipped;\n  t.classList.remove('animBack','animFront');\n  void t.offsetWidth;\n  if(flipped){ t.classList.add('flipped','animBack'); }\n  else { t.classList.remove('flipped'); t.classList.add('animFront'); }\n}\nfunction canGo(dir){\n  if(!__ready || __checking) return false;\n  const it=HIST[p]; if(!it) return false;\n  if(dir<0) return p>0;\n  if(it.kind==='finish') return false;\n  /* Υποχρεωτική απάντηση: αναπάντητη άσκηση δεν προσπερνιέται. */\n  if(it.kind==='ex' && !it.state.answered) return false;\n  /* Οι κάρτες επιλογής προχωρούν μόνο με τα κουμπιά τους. */\n  if(it.kind==='stepdone'||it.kind==='freesetup'||it.kind==='freedone') return false;\n  return true;\n}\nfunction go(dir){\n  if(!canGo(dir)) return;\n  if(dir>0 && p===HIST.length-1){\n    const nx=nextCard(); if(!nx) return;\n    HIST.push(nx);\n  }\n  p+=dir; flipped=false; render(dir);\n}\n\ndocument.getElementById('btnHome').addEventListener('click',()=>{if(!__ready)return;p=0;flipped=false;render(0);});\ndocument.getElementById('btnClose').addEventListener('click',()=>{try{window.close();}catch(e){}if(!window.closed){history.length>1?history.back():location.replace('about:blank');}});\ndocument.getElementById('zLeft').addEventListener('click',()=>go(-1));\ndocument.getElementById('zRight').addEventListener('click',()=>go(1));\ndocument.getElementById('zCenter').addEventListener('click',()=>{ if(__ready&&HIST[p]&&HIST[p].kind==='theory') flipCurrent(); });\n\n/* ── Σύρσιμο καρτών (drag/swipe οριζόντια) ── */\n(function(){\n  const THRESHOLD=8, COMMIT=60;\n  let sx=0, sy=0, dx=0, active=false, dragging=false, didDrag=false, pid=null, downTarget=null;\n  const skipDrag = t => {\n    if(!t || !t.closest) return false;\n    const card=t.closest('.card'); const answered=card && card.dataset.answered==='1';\n    if(answered) return !!t.closest('input, textarea, select, [contenteditable=\"true\"]');\n    return !!t.closest('.mitem, .tok, input, textarea, select, [contenteditable=\"true\"]');\n  };\n  slot.addEventListener('pointerdown',ev=>{\n    if(ev.pointerType==='mouse') return;\n    if(ev.button!==0 && ev.pointerType==='mouse') return;\n    if(skipDrag(ev.target)) return;\n    active=true; dragging=false; didDrag=false; pid=ev.pointerId;\n    sx=ev.clientX; sy=ev.clientY; dx=0; downTarget=ev.target;\n    host.classList.remove('snapback');\n  });\n  window.addEventListener('pointermove',ev=>{\n    if(!active||ev.pointerId!==pid) return;\n    dx=ev.clientX-sx; const dy=ev.clientY-sy;\n    if(!dragging){\n      if(Math.abs(dy)>THRESHOLD && Math.abs(dy)>Math.abs(dx)){ active=false; return; }\n      if(Math.abs(dx)>THRESHOLD){\n        dragging=true; didDrag=true;\n        host.classList.remove('slideR','slideL','fadeIn');\n        host.classList.add('dragging');\n      } else return;\n    }\n    const w=slot.clientWidth||600;\n    host.style.transform=`translateX(${dx}px) rotate(${dx/w*3}deg)`;\n    host.style.opacity=String(Math.max(.45, 1-Math.abs(dx)/(w*.9)));\n    ev.preventDefault();\n  },{passive:false});\n  function end(ev){\n    if(!active||(ev && ev.pointerId!==pid)) return;\n    active=false;\n    if(!dragging){ return; }\n    host.classList.remove('dragging');\n    if(Math.abs(dx)>COMMIT && canGo(dx<0?1:-1)){\n      const dir = dx<0 ? 1 : -1;\n      const w=slot.clientWidth||600;\n      const startDx=dx;\n      /* φτιάχνουμε ghost — η παλιά κάρτα φεύγει */\n      const ghost=document.createElement('div');\n      ghost.className='cardghost';\n      ghost.style.cssText=`position:absolute;inset:0;display:flex;pointer-events:none;z-index:3;will-change:transform,opacity;transition:transform .34s cubic-bezier(.2,.7,.3,1),opacity .34s ease;transform:translateX(${startDx}px) rotate(${startDx/w*3}deg);opacity:${host.style.opacity||1};`;\n      ghost.innerHTML=host.innerHTML;\n      slot.appendChild(ghost);\n      /* τοποθετούμε το host εκτός οθόνης από την αντίθετη μεριά και ρενταρουμε τη νέα */\n      host.classList.remove('snapback','slideR','slideL','fadeIn');\n      host.style.transition='none';\n      host.style.transform=`translateX(${dir>0? w : -w}px)`;\n      host.style.opacity='1';\n      __swipeInProgress=true;\n      go(dir);\n      requestAnimationFrame(()=>{\n        host.style.transition='transform .34s cubic-bezier(.2,.7,.3,1),opacity .34s ease';\n        host.style.transform='translateX(0)';\n        host.style.opacity='1';\n        ghost.style.transform=`translateX(${dir>0? -w*1.05 : w*1.05}px) rotate(${(dir>0?-1:1)*4}deg)`;\n        ghost.style.opacity='0';\n      });\n      setTimeout(()=>{\n        ghost.remove();\n        host.style.transition='';\n        host.style.transform='';\n        host.style.opacity='';\n        __swipeInProgress=false;\n      },360);\n    } else {\n      host.classList.add('snapback');\n      host.style.transform=''; host.style.opacity='';\n      setTimeout(()=>host.classList.remove('snapback'),280);\n    }\n  }\n  window.addEventListener('pointerup',end);\n  window.addEventListener('pointercancel',end);\n  window.addEventListener('click',ev=>{\n    if(didDrag){ didDrag=false; ev.preventDefault(); ev.stopPropagation(); }\n  },true);\n})();\n\ndocument.addEventListener('keydown',ev=>{\n  if(ev.key==='ArrowRight')go(1);\n  else if(ev.key==='ArrowLeft')go(-1);\n  else if((ev.key===' '||ev.key==='Enter') && __ready && HIST[p] && HIST[p].kind==='theory'){ ev.preventDefault(); flipCurrent(); }\n});\nconst __isTh=()=>__ready&&HIST[p]&&HIST[p].kind==='theory';\nwindow.addEventListener('resize',()=>{ if(__isTh())fitTheory(); else fitCard(); });\nwindow.addEventListener('orientationchange',()=>setTimeout(()=>{ if(__isTh())fitTheory(); else fitCard(); },120));\n\n/* ══ Εκκίνηση: φόρτωση ασκήσεων από το Google Sheet ══ */\nfunction statusCard(kicker,title,lead,extra){\n  host.innerHTML=`<div class=\"card gate intro\">\n    <div class=\"head\"><span class=\"eyebrow\">${kicker}<\u002Fspan><span class=\"badge\">Google Sheet<\u002Fspan><\u002Fdiv>\n    <div class=\"title\">${title}<\u002Fdiv>\n    <div class=\"lead\">${lead}<\u002Fdiv>${extra||''}\n  <\u002Fdiv>`;\n  fitCard();\n}\n\nasync function boot(){\n  statusCard('Φόρτωση','Ανάκτηση ασκήσεων','Οι ασκήσεις αντλούνται από το συνδεδεμένο φύλλο. Ένα λεπτό…');\n  try{\n    EX = await loadEX();\n    if(!EX.length) throw new Error('Δεν βρέθηκαν ενεργές ασκήσεις με τα κριτήρια που ζητήθηκαν.');\n    const q=urlParams();\n    const mn=parseInt(q['min'],10); if(mn>0) MIN_PER_SUB=mn;\n    const ck=parseInt(q['check'],10); if(ck>=0) CHECK_MS=ck;\n    ENG.steps=buildEngine(EX); ENG.si=0; ENG.ui=0; loadSub();\n    __ready=true;\n    HIST=[{kind:'intro'}]; p=0; flipped=false; render(0);\n  }catch(err){\n    console.error('[quiz] αποτυχία φόρτωσης:',err);\n    statusCard('Σφάλμα','Οι ασκήσεις δεν φορτώθηκαν',\n      'Δεν κατέστη δυνατή η ανάγνωση του φύλλου: '+(err&&err.message?err.message:err)+\n      '<br><br>Έλεγξε ότι το φύλλο είναι δημοσιευμένο στον ιστό (Αρχείο → Κοινοποίηση → Δημοσίευση στον ιστό, μορφή CSV) και ότι η σελίδα ανοίγει μέσω http(s) και όχι απευθείας από τον δίσκο.',\n      '<div class=\"actions\"><button class=\"reveal-btn\" id=\"retryBtn\">↻ Νέα προσπάθεια<\u002Fbutton>'+\n      '<button class=\"reveal-btn btn-secondary\" id=\"theoryOnlyBtn\">Μόνο θεωρία →<\u002Fbutton><\u002Fdiv>');\n    const rb=host.querySelector('#retryBtn'); if(rb) rb.addEventListener('click',boot);\n    const tb=host.querySelector('#theoryOnlyBtn');\n    if(tb) tb.addEventListener('click',()=>{\n      __ready=true; ENG.steps=[]; ENG.mode='learn';\n      HIST=Object.keys(TH).map(k=>({kind:'theory', th:+k}));\n      p=0; flipped=false; render(1); });\n  }\n}\nboot();\n<\u002Fscript>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
